<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#082008"/>
<meta name="author" content="Thiago Bartulihe"/>
<meta name="description" content="Resultados, grupos e jogos da Copa do Mundo FIFA 2026 — por Thiago Bartulihe"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Copa 2026"/>
<title>⚽ Copa 2026 Tracker</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icon-192.png"/>
<link rel="icon" type="image/png" href="./icon-192.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#040804;color:#ddd;font-family:Georgia,serif;min-height:100vh}

/* ── FUNDO — usa background.jpg se existir; senão fica só a cor escura ────── */
.bg-layer{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background-image:url('./background.jpg');
  background-size:cover;background-position:center;background-repeat:no-repeat;
  z-index:-2;pointer-events:none;
}
/* Camada escura por cima da foto — garante que o texto nunca se perde,
   seja qual for a imagem que colocares */
.bg-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(180deg,rgba(20,30,20,.22) 0%,rgba(16,26,16,.32) 50%,rgba(12,20,12,.45) 100%);
  z-index:-1;pointer-events:none;
}
.header-logo{
  position:absolute;left:14px;top:12px;
  height:38px;width:auto;max-width:70px;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));
}
#app{max-width:640px;margin:0 auto;padding-bottom:24px}
.header{background:linear-gradient(135deg,#082008,#0f3a0f,#082008);padding:14px 16px 10px;text-align:center;border-bottom:2px solid #1a5e1a;position:sticky;top:0;z-index:100}
.header-sub{font-size:9px;letter-spacing:5px;color:#3dbb3d;margin-bottom:3px}
.header-title{font-size:clamp(16px,5vw,24px);font-weight:bold;color:#fff;letter-spacing:2px}
.header-meta{font-size:10px;color:#8a9a88;margin-top:5px;display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap}
.rbtn{background:#0f3a0f;border:1px solid #1a5e1a;color:#3dbb3d;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:10px;font-family:Georgia,serif}
.rbtn:active{background:#1a5e1a}
.live-dot{width:7px;height:7px;background:#ff4444;border-radius:50%;display:inline-block;animation:blink 1.2s infinite}
.fav-dot{width:7px;height:7px;background:#f0c040;border-radius:50%;display:inline-block;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.src-bar{font-size:9px;text-align:center;padding:5px 12px;border-bottom:1px solid #0f0f0f;letter-spacing:1px}
.src-bar.espn{background:#0a1a0a;color:#3dbb3d}
.src-bar.sdb{background:#0a0a1a;color:#4d9dbb}
.src-bar.local{background:#1a0a0a;color:#f87171}
.src-bar.loading{background:#0a0a0a;color:#7a8a78}
.tz-bar{font-size:9px;text-align:center;padding:4px;background:#050805;color:#677a67;border-bottom:1px solid #0a0a0a}
.tabs{display:flex;background:#1c2c1e;border-bottom:1px solid #111;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:1;padding:11px 3px;background:transparent;color:#7a8a78;border:none;cursor:pointer;font-size:10px;font-family:Georgia,serif;white-space:nowrap;border-bottom:2px solid transparent}
.tab.active{background:#0f3a0f;color:#3dbb3d;font-weight:bold;border-bottom:2px solid #1a5e1a}
.tab.ft.active{background:#1a1500;color:#f0c040;border-bottom-color:#f0c040}
.body{padding:12px}
.lbl{font-size:9px;letter-spacing:2px;font-weight:bold;margin-bottom:8px;color:#1a5e1a}
.lbl.mt{margin-top:16px}
.glbl{font-size:9px;letter-spacing:2px;font-weight:bold;margin:10px 0 6px}
/* CARDS */
.card{border-radius:7px;padding:10px 13px;margin-bottom:6px;border:1px solid #111;border-left:3px solid #222;background:#1a2c1c;position:relative}
.card.clive{background:#081808;border-color:#1a5e1a;border-left-color:#3dbb3d}
.card.cfav{border-color:#2a2000;border-left-color:#f0c040;background:#241c10}
.card.cfavlive{background:#0d0c02;border-color:#3a3000;border-left-color:#f0c040}
.cbadge{font-size:9px;font-weight:bold;letter-spacing:1px;margin-bottom:5px}
.cbadge.live{color:#ff4444}
.cbadge.favlive{color:#f0c040}
.cbadge.soon{color:#8c9a8a}
.crow{display:flex;justify-content:space-between;align-items:center}
.cteam{flex:1;font-size:clamp(11px,2.8vw,13px)}
.cteam.win{color:#ddd;font-weight:bold}.cteam.lose{color:#888}.cteam.r{text-align:right}
.cscore{font-weight:bold;padding:3px 10px;background:#162515;border-radius:5px;letter-spacing:2px;margin:0 8px;min-width:54px;text-align:center}
.cscore.done{color:#f0c040;font-size:clamp(15px,4vw,20px)}
.cscore.alive{color:#ff6644;font-size:clamp(15px,4vw,20px)}
.cscore.favalive{color:#f0c040;font-size:clamp(15px,4vw,20px)}
.cscore.vs{color:#2a2a2a;font-size:13px}
.cfoot{font-size:9px;margin-top:4px;display:flex;justify-content:space-between;align-items:center}
.ministar{display:inline-block;cursor:pointer;font-size:11px;opacity:.25;transition:opacity .15s;padding:0 2px}
.ministar.on{opacity:1}
.ministar:active{transform:scale(1.3)}
/* LIVE EVENTS */
.evbox{margin-top:8px;border-top:1px solid #0f180f;padding-top:8px}
.evtitle{font-size:9px;color:#1a5e1a;letter-spacing:2px;margin-bottom:6px;font-weight:bold}
.evrow{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px}
.evmin{color:#f0c040;font-weight:bold;min-width:26px;font-size:10px;padding-top:1px}
.evico{min-width:16px;font-size:12px}
.evtxt{font-size:11px;color:#bbb;line-height:1.4}
.evsub{font-size:9px;color:#7a8a78;margin-top:1px}
.evnone{font-size:10px;color:#5a6a58;font-style:italic;text-align:center;padding:8px 0}
/* TEASER no cartão pequeno, aponta para a tab Minuto a Minuto */
.cteaser{font-size:10px;color:#3dbb3d;text-align:center;margin-top:6px;padding-top:6px;border-top:1px solid #131e14;cursor:pointer;letter-spacing:.5px}
.cteaser:active{opacity:.6}
/* CARTÃO GRANDE — tab Minuto a Minuto */
.minuto-card{background:#1a2c1c;border:1px solid #1a2a1c;border-radius:10px;margin-bottom:14px;overflow:hidden}
.minuto-card.minuto-fav{border-color:#3a3000}
.minuto-head{padding:12px 14px;background:#162515}
.minuto-teams{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:14px;font-weight:bold;color:#f2ecd8}
.minuto-favteam{color:#f0c040}
.minuto-score{font-size:20px;font-weight:bold;color:#f0c040;background:#070c07;border-radius:6px;padding:3px 14px;letter-spacing:2px;flex-shrink:0}
.minuto-meta{font-size:10px;color:#7a8a78;margin-top:6px;display:flex;align-items:center;gap:6px}
.minuto-card .evbox{padding:0 14px 12px;border-top:none;margin-top:0}
.minuto-card .evtitle{padding-top:10px}
/* FAVORITES */
.favsec{background:#221c0e;border:1px solid #2a2000;border-radius:8px;padding:12px;margin-bottom:12px}
.favtitle{font-size:9px;color:#b8860b;letter-spacing:3px;font-weight:bold;margin-bottom:10px}
.favchips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.chip{display:inline-flex;align-items:center;gap:4px;background:#111;border:1px solid #2a2000;border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;color:#f0c040}
.chip .x{color:#8a9a88;font-size:10px}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:6px}
.tbtn{background:#1c2c1e;border:1px solid #111;border-radius:5px;padding:5px 3px;font-size:10px;cursor:pointer;text-align:center;color:#8a9a88;font-family:Georgia,serif}
.tbtn.on{background:#1a1200;border-color:#f0c040;color:#f0c040}
.tgridlbl{font-size:9px;color:#677a67;letter-spacing:1px;margin-top:8px;margin-bottom:4px}
.falert{background:linear-gradient(135deg,#1a1200,#2a1e00);border:1px solid #f0c040;border-radius:8px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.falert-ico{font-size:20px}
.falert-t{font-size:12px;color:#f0c040;font-weight:bold}
.falert-s{font-size:10px;color:#888;margin-top:2px}
/* GROUP TABLE */
.gbtns{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;justify-content:center}
.gbtn{padding:5px 10px;border-radius:4px;cursor:pointer;font-weight:bold;font-family:Georgia,serif;font-size:12px;border:1px solid #1a1a1a;background:#0c100c;color:#7a8a78}
.gbtn.on{color:#fff}
.twrap{border-radius:8px;overflow:hidden;margin-bottom:10px;border:1px solid #111;border-top:3px solid var(--gc)}
.thead2{padding:8px 12px;background:#162515;font-size:9px;letter-spacing:3px;font-weight:bold;border-bottom:1px solid #0e0e0e;color:var(--gc)}
table{width:100%;border-collapse:collapse;background:#1a2c1c}
th{padding:6px 5px;font-size:8px;color:#1e3a1e;letter-spacing:1px;border-bottom:1px solid #0c0c0c;font-family:Georgia,serif;font-weight:normal;text-align:center}
th.tl{text-align:left}
tbody tr{border-bottom:1px solid #0b0b0b}
tbody tr.q{background:rgba(26,94,26,.13)}
td{padding:8px 5px;font-size:11px;text-align:center}
td.tl{text-align:left}
td.pts{font-weight:bold;color:#f0c040;font-size:13px}
td.pos{color:#4ade80;font-weight:bold}td.neg{color:#f87171;font-weight:bold}td.zer{color:#7a8a78}
/* UPCOMING */
.uc{background:#1c2c1e;border:1px solid #111;border-left:3px solid #222;border-radius:7px;padding:10px 13px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.uc.fav{background:#221c0e;border-color:#2a2000;border-left-color:#f0c040}
.uch{font-size:12px;font-weight:bold}
.uca{font-size:11px;color:#7a8a78;margin-top:1px}
.uct{font-size:12px;color:#f0c040;font-weight:bold;text-align:right}
.ucm{font-size:9px;margin-top:2px;text-align:right}
/* BRACKET */
.bracket{padding:4px 0}
.bround{margin-bottom:22px}
.brnd-title{font-size:9px;color:#b8860b;letter-spacing:3px;font-weight:bold;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #1a1500}
.bmatch{background:#1d2e1f;border:1px solid #141a14;border-radius:6px;padding:9px 12px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.bmatch.done{border-left:3px solid #166534}
.bmatch.live-b{border-left:3px solid #ff4444;background:#0a1008}
.bmatch.tbd{opacity:.5}
.bteams{flex:1}
.bt1{font-size:12px;font-weight:bold;color:#ccc}
.bt2{font-size:12px;color:#8c9a8a;margin-top:3px}
.bscore{font-size:16px;font-weight:bold;color:#f0c040;padding:2px 10px;background:#182818;border-radius:4px;letter-spacing:2px;text-align:center;min-width:50px}
.bscore.tbd-s{color:#5a6a58;font-size:12px}
.bscore.live-sc{color:#ff6644}
.binfo{font-size:9px;color:#677a67;margin-top:2px}

/* ── CHAVE VISUAL — caixa de confronto, time de cada lado ──────────────────── */
.bbox{border-radius:10px;overflow:hidden;margin-bottom:6px;background:linear-gradient(160deg,#1f2f21,#182818);border:1px solid #28401f}
.bbox.bbox-live{border-color:#3dbb3d}
.bbox.bbox-done{border-color:#1a3320}
.bbox.bbox-tbd{opacity:.55}
.bbox-head{padding:4px 10px;font-size:8px;letter-spacing:1.5px;color:#557;background:#162515;border-bottom:1px solid #0e140e;display:flex;justify-content:space-between}
.bbox-head.head-live{color:#ff5544}
.bbox-head.head-done{color:#3dbb3d}
.bbox-body{display:flex;align-items:stretch}
.bbox-team{flex:1;display:flex;align-items:center;gap:5px;padding:11px 8px;font-size:12.5px;min-width:0;line-height:1.25}
.bbox-team.bbox-right{flex-direction:row-reverse;text-align:right;justify-content:flex-start}
.bbox-team .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bbox-team.winner{font-weight:bold;color:#f2ecd8}
.bbox-team.loser{color:#7a8a7a}
.bbox-check{color:#3dbb3d;font-size:11px;flex-shrink:0}
.bbox-mid{display:flex;align-items:center;padding:0 7px;flex-shrink:0;border-left:1px solid #101a10;border-right:1px solid #101a10}
.bbox-score{font-size:16px;font-weight:bold;color:#f0c040;letter-spacing:1px;min-width:42px;text-align:center}
.bbox-score.live{color:#ff6644}
.bbox-score.tbd{color:#5e7a5c;font-size:11px;letter-spacing:0}
.bconnector{display:flex;justify-content:center;position:relative;height:16px;margin:-2px 0 4px}
.bconnector::before{content:"";position:absolute;top:0;bottom:0;left:50%;width:1px;background:#162616}
.bconnector span{position:relative;background:#040804;color:#2a4022;font-size:7px;letter-spacing:1.5px;padding:0 8px;align-self:center}
.bremain{font-size:10px;color:#5e7a5c;text-align:center;padding:8px 0 2px}
/* FUNIL entre fases — reforça o afunilamento sem fingir ligações exatas */
.bfunnel{position:relative;height:34px;margin:2px 0 16px;display:flex;align-items:center;justify-content:center}
.bfunnel-tri{width:0;height:0;border-left:55px solid transparent;border-right:55px solid transparent;border-top:16px solid #1a2a1c}
.bfunnel-label{position:absolute;background:#0a120a;padding:3px 10px;font-size:8px;letter-spacing:1.5px;color:#b8860b;border:1px solid #2a2000;border-radius:10px;white-space:nowrap}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#040804}
::-webkit-scrollbar-thumb{background:#1a2a1a;border-radius:2px}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="bg-overlay"></div>
<div id="app">
  <div class="header">
    <img id="logoImg" alt="" class="header-logo" onerror="this.style.display='none'"/>
    <div class="header-sub">COPA DO MUNDO FIFA 2026</div>
    <div class="header-title">⚽WORLD CUP TRACKER - BY TICOBARTU⚽</div>
    <div class="header-meta">
      <span id="li"></span>
      <span id="ts">Carregando...</span>
      <button class="rbtn" onclick="doRefresh()">↺ Refresh</button>
    </div>
  </div>
  <div id="srcbar" class="src-bar loading">⟳ Conectando...</div>
  <div id="tzbar" class="tz-bar">🕐 Detectando fuso...</div>
  <div class="tabs">
    <button class="tab minuto-tab active" onclick="setTab('minuto',this)">🔴 Ao Vivo</button>
    <button class="tab"       onclick="setTab('hoje',this)">📆 Hoje</button>
    <button class="tab"       onclick="setTab('prox',this)">📅 Próximos</button>
    <button class="tab"       onclick="setTab('result',this)">✅ Resultados</button>
    <button class="tab"       onclick="setTab('grupos',this)">🏟 Grupos</button>
    <button class="tab"       onclick="setTab('mm',this)">🏆 Mata-Mata</button>
    <button class="tab"       onclick="setTab('sim',this)">🔮 Simulação</button>
    <button class="tab ft"    onclick="setTab('favs',this)">⭐ Favoritos</button>
  </div>
  <div class="body"><div id="content"></div></div>
  <div style="text-align:center;padding:18px 12px 8px;font-size:9px;color:#5a6a58;letter-spacing:1px">
    ⚽ Copa 2026 Tracker · Criado por <span style="color:#3a5a3a">Thiago Bartulihe</span>
  </div>
</div>
<script>
// ── ASSETS PERSONALIZÁVEIS (logo/fundo) — sempre buscados frescos ────────────
// Cache-buster garante que o browser nunca reutiliza uma versão antiga ou
// um 404 de antes de teres feito upload destes ficheiros.
(function(){
  const v = Date.now();
  document.getElementById("logoImg").src = `./logo.png?v=${v}`;
  const bgLayer = document.querySelector(".bg-layer");
  if (bgLayer) bgLayer.style.backgroundImage = `url('./background.jpg?v=${v}')`;
})();

// ── TIMEZONE ──────────────────────────────────────────────────────────────────
const userTZ=Intl.DateTimeFormat().resolvedOptions().timeZone;
const TZ_NAMES={"America/Sao_Paulo":"Brasil · Brasília","America/Manaus":"Brasil · Manaus","Europe/Lisbon":"Portugal · Lisboa","Europe/London":"UK · Londres","America/New_York":"EUA · Leste","America/Los_Angeles":"EUA · Pacífico","America/Argentina/Buenos_Aires":"Argentina","Europe/Madrid":"Espanha"};
document.getElementById("tzbar").textContent=`🕐 Horários em: ${TZ_NAMES[userTZ]||userTZ}`;
function brOff(){const d=new Date(),b=new Date(d.toLocaleString("en-US",{timeZone:"America/Sao_Paulo"})),u=new Date(d.toLocaleString("en-US",{timeZone:"UTC"}));return(b-u)/3600000;}
function localTime(brTime,brDate){
  try{const h=parseInt(brTime),[day,mon]=brDate.split("/").map(Number),diff=-(new Date().getTimezoneOffset()/60)-brOff();
  let nh=h+diff,ds=0;if(nh>=24){nh-=24;ds=1;}if(nh<0){nh+=24;ds=-1;}
  const nd=new Date(2026,mon-1,day+ds),p=n=>String(n).padStart(2,"0");
  return{time:`${p(nh)}h`,date:`${p(nd.getDate())}/${p(nd.getMonth()+1)}`};}
  catch(e){return{time:brTime,date:brDate};}
}

// ── CORES ──────────────────────────────────────────────────────────────────────
const GC={A:"#7c2d12",B:"#1e3a8a",C:"#166534",D:"#4a1d96",E:"#713f12",F:"#134e4a",G:"#1e1b4b",H:"#7f1d1d",I:"#14532d",J:"#3b0764",K:"#0c4a6e",L:"#1c1917"};
const AT={
  A:["México 🇲🇽","Coreia do Sul 🇰🇷","Rep. Tcheca 🇨🇿","África do Sul 🇿🇦"],
  B:["Canadá 🇨🇦","Bósnia 🇧🇦","Qatar 🇶🇦","Suíça 🇨🇭"],
  C:["Brasil 🇧🇷","Marrocos 🇲🇦","Escócia 🏴󠁧󠁢󠁳󠁣󠁴󠁿","Haiti 🇭🇹"],
  D:["EUA 🇺🇸","Austrália 🇦🇺","Turquia 🇹🇷","Paraguai 🇵🇾"],
  E:["Alemanha 🇩🇪","C. do Marfim 🇨🇮","Equador 🇪🇨","Curaçao 🇨🇼"],
  F:["Suécia 🇸🇪","Holanda 🇳🇱","Japão 🇯🇵","Tunísia 🇹🇳"],
  G:["Bélgica 🇧🇪","Irã 🇮🇷","Egito 🇪🇬","Nova Zelândia 🇳🇿"],
  H:["Espanha 🇪🇸","Cabo Verde 🇨🇻","Arábia Saudita 🇸🇦","Uruguai 🇺🇾"],
  I:["França 🇫🇷","Noruega 🇳🇴","Senegal 🇸🇳","Iraque 🇮🇶"],
  J:["Argentina 🇦🇷","Áustria 🇦🇹","Argélia 🇩🇿","Jordânia 🇯🇴"],
  K:["Portugal 🇵🇹","Colômbia 🇨🇴","RD Congo 🇨🇩","Uzbequistão 🇺🇿"],
  L:["Inglaterra 🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croácia 🇭🇷","Gana 🇬🇭","Panamá 🇵🇦"]
};

// Lookup time → grupo, usado para classificar entradas vindas do results.json
const TEAM_GROUP={};
Object.entries(AT).forEach(([g,teams])=>teams.forEach(t=>{TEAM_GROUP[t.replace(/[^\p{L}\p{N}]/gu,"").toLowerCase()]=g;}));
function groupOf(teamName){
  const k=(teamName||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z0-9]/g,"").toLowerCase();
  return TEAM_GROUP[k]||"?";
}
// Estrela dinâmica — grupo "favorito" é o que contém ao menos uma seleção marcada
function groupHasFav(g){ return (AT[g]||[]).some(t=>isFav(t)); }

// ── FAVORITOS ─────────────────────────────────────────────────────────────────
// tkey: extrai só letras/números para comparação — resolve emojis complexos
function tkey(s){
  return (s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-zA-Z0-9]/g,"").toLowerCase();
}
const DEFAULT_FAVS=["Brasil 🇧🇷","Croácia 🇭🇷"];
let FAVS=[...DEFAULT_FAVS];

function loadFavs(){
  try{
    const raw=JSON.parse(localStorage.getItem("copa_favs")||"null");
    if(!Array.isArray(raw)){FAVS=[...DEFAULT_FAVS];return;}
    // Deduplica hard — remove qualquer duplicado por tkey
    const seen=new Set();
    FAVS=raw.filter(f=>{
      if(!f||typeof f!=="string")return false;
      const k=tkey(f);
      if(!k||seen.has(k))return false;
      seen.add(k);return true;
    });
    if(FAVS.length===0)FAVS=[...DEFAULT_FAVS];
  }catch(e){FAVS=[...DEFAULT_FAVS];}
  saveFavs();
}

function isFav(name){const k=tkey(name);return FAVS.some(f=>tkey(f)===k);}
function toggleFav(name){
  const k=tkey(name);
  const idx=FAVS.findIndex(f=>tkey(f)===k);
  if(idx>=0)FAVS.splice(idx,1);
  else FAVS.push(name);
  // Garante sem duplicados
  const seen=new Set();
  FAVS=FAVS.filter(f=>{const fk=tkey(f);if(seen.has(fk))return false;seen.add(fk);return true;});
  saveFavs();render();
}

function mergeResultsJSON(json){

  let updated=0;
  incoming.forEach(m=>{
    const g=groupOf(m.home);

    if(existing){
      // Preserva nota escrita à mão se a automática não tiver uma melhor
      const keepNote=existing.note;
      Object.assign(existing,{
        date:m.date||existing.date, brTime:m.brTime||existing.brTime,
        venue:m.venue||existing.venue,
        sh:m.sh, sa:m.sa, done:m.done, live:m.live, clock:m.clock||"",
      });
      if(m.events&&m.events.length) existing.events=m.events;
      if(!existing.note && keepNote) existing.note=keepNote;
      updated++;
    } else if(g!=="?"){
      RES.push({
        g, home:m.home, away:m.away, date:m.date, brTime:m.brTime, venue:m.venue,
        sh:m.sh, sa:m.sa, done:m.done, live:m.live, clock:m.clock||"", events:m.events||[]
      });
      updated++;
    }
  });
  return updated;
}

function mapTeam(n){return ESPN_MAP[n]||n;}

function getDateStr(daysAgo){
  const d=new Date();d.setDate(d.getDate()-daysAgo);
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
}

function applyESPNData(data){
  let count=0;
  (data.events||[]).forEach(ev=>{
    const comp=ev.competitions?.[0];
    const h=comp?.competitors?.find(c=>c.homeAway==="home");
    const a=comp?.competitors?.find(c=>c.homeAway==="away");
    if(!h||!a)return;
    const state=ev.status?.type?.state;
    const hs=parseInt(h.score)||0,as=parseInt(a.score)||0;
    const clock=ev.status?.displayClock||"";
    const hName=mapTeam(h.team?.displayName||"");
    const aName=mapTeam(a.team?.displayName||"");
    RES.forEach(r=>{
      if(r.home!==hName||r.away!==aName)return;
      if(state==="post"){r.sh=hs;r.sa=as;r.done=true;r.live=false;r.clock="";count++;}
      else if(state==="in"){r.sh=hs;r.sa=as;r.live=true;r.clock=clock;
        fetchEventDetails(ev.id,h.team?.displayName,a.team?.displayName);}
    });
  });
  return count;
}

async function fetchESPN(){

  let total=0;

    try{
      const r=await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${d}`,{cache:"no-cache"});
      if(r.ok)total+=applyESPNData(await r.json());

}

// Palavras que indicam eventos irrelevantes — filtrar fora
const SKIP_WORDS=["delay","drink","half begins","kick off","kick-off","end of","period begins","weather","var check concluded","attendance","whistle"];
function isRelevantEvent(p){
  const txt=(p.text||p.shortText||"").toLowerCase();
  if(SKIP_WORDS.some(w=>txt.includes(w)))return false;
  const typ=(p.type?.text||p.type?.id||"").toLowerCase();
  // Só incluir se tiver icon relevante OU texto com nome de jogador
  const hasIcon=typ.includes("goal")||typ.includes("card")||typ.includes("sub")||typ.includes("yellow")||typ.includes("red");
  const hasClock=p.clock?.displayValue&&parseInt(p.clock.displayValue)>0;
  return hasIcon||(hasClock&&txt.length>3&&!SKIP_WORDS.some(w=>txt.includes(w)));
}

function getIcon(p){
  const typ=(p.type?.text||p.type?.id||"").toLowerCase();
  const txt=(p.text||"").toLowerCase();
  if(typ.includes("goal")||txt.includes("goal")) return typ.includes("own")||txt.includes("(og)")?"⚽ OG":"⚽";
  if(typ.includes("yellow red")||typ.includes("second yellow"))return"🟥";
  if(typ.includes("yellow"))return"🟨";
  if(typ.includes("red"))return"🟥";
  if(typ.includes("sub"))return"🔄";
  if(typ.includes("penalty")||txt.includes("penalty"))return"⚽🎯";
  return null; // null = skip
}

async function fetchEventDetails(evId,hName,aName){
  try{
    const r=await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${evId}`,{cache:"no-cache"});
    if(!r.ok)return;
    const data=await r.json();
    // ESPN pode devolver em plays ou keyEvents
    const plays=[...(data.keyEvents||[]),(data.plays||[])].flat();
    if(!plays.length)return;
    const events=plays
      .filter(isRelevantEvent)
      .map(p=>{
        const icon=getIcon(p);
        if(!icon)return null;
        const min=p.clock?.displayValue||p.period?.clock||"";
        const txt=p.text||p.participants?.[0]?.athlete?.displayName||p.shortText||"";
        const sub=p.team?.displayName||"";
        return{min,icon,txt,sub};
      })
      .filter(Boolean)
      .reverse(); // mais recente primeiro
    if(!events.length)return;
    RES.forEach(r=>{
      if(!r.live)return;
      const hk=tkey(hName).slice(0,5),ak=tkey(aName).slice(0,5);
      if(tkey(r.home).includes(hk)||tkey(r.away).includes(ak)){
        r.events=events;
      }
    });
    render();
  }catch(e){}
}

async function fetchSDB(){
  const r=await fetch("https://www.thesportsdb.com/api/v1/json/3/eventsseason.php?id=4480&s=2026",{cache:"no-cache"});
  if(!r.ok)throw new Error("sdb");
  const data=await r.json();let c=0;
  (data.events||[]).forEach(ev=>{
    if(!ev.intHomeScore)return;
    const hs=parseInt(ev.intHomeScore)||0,as=parseInt(ev.intAwayScore)||0;
    RES.forEach(r=>{
      if(r.done)return;
      const hm=tkey(r.home).includes(tkey(ev.strHomeTeam||"").slice(0,4));
      const am=tkey(r.away).includes(tkey(ev.strAwayTeam||"").slice(0,4));
      if(hm&&am&&ev.strStatus==="Match Finished"){r.sh=hs;r.sa=as;r.done=true;r.live=false;c++;}
    });
  });return c;
}

function setSrc(cls,txt){const el=document.getElementById("srcbar");el.className=`src-bar ${cls}`;el.textContent=txt;}

// Busca results.json — gerado pelo robô do GitHub Actions a cada ~15 min.
// Same-origin, sem CORS, sem depender do browser falar com a ESPN.
async function fetchResultsJSON(){
  const r=await fetch(`./results.json?t=${Date.now()}`,{cache:"no-store"});
  if(!r.ok) throw new Error("results.json "+r.status);
  const json=await r.json();
  const count=mergeResultsJSON(json);
  LAST_BOT_UPDATE=json.generatedAt?new Date(json.generatedAt):null;
  DATA_SOURCE="actions";
  return count;
}

async function fetchData(){
  autoExpireLiveGames();
  setSrc("loading","⟳ Conectando...");

  // Tenta o robô (results.json) E o fetch direto à ESPN, SEMPRE os dois —
  // nunca mais "se o robô responder, para de procurar". Isto é a correção
  // do bug em que, mesmo com o robô parado/mal configurado, o site ficava
  // travado nos dados antigos porque nunca tentava mais nada.
  const sources=[];

  try{
    const c=await fetchResultsJSON();
    sources.push(`🤖 robô·${c}`);
  }catch(e){}

  try{
    const c=await fetchESPN();
    sources.push(`📡 ESPN·${c}`);
  }catch(e){}

  if(sources.length){
    const when=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    DATA_SOURCE="live";
    setSrc("espn",`✅ ${sources.join(" + ")} · ${when}`);
    adaptRefresh();updateTS();render();return;
  }

  // Último recurso antes dos dados locais: TheSportsDB
  try{const c=await fetchSDB();DATA_SOURCE="sdb";setSrc("sdb",`🔵 TheSportsDB backup · ${c} atualizados`);updateTS();render();return;}catch(e){}

  // Nenhuma fonte respondeu — dados locais embutidos
  DATA_SOURCE="fallback";
  setSrc("local","⚠️ Dados locais · todas as fontes indisponíveis");updateTS();render();
}

function adaptRefresh(){
  if(refreshIv)clearInterval(refreshIv);
  const hasFavLive=RES.some(r=>r.live&&(isFav(r.home)||isFav(r.away)));
  const hasLive=RES.some(r=>r.live);
  const iv=hasFavLive?15000:hasLive?25000:90000;
  refreshIv=setInterval(fetchData,iv);
}

// Salvaguarda: jogos de dias anteriores nunca ficam presos como "live",
// e jogos agendados cuja data já passou sem resultado ficam marcados como
// "pending" — para a UI avisar em vez de mostrar como se fosse futuro.
function autoExpireLiveGames(){
  const today=new Date();
  const todayStr=`${String(today.getDate()).padStart(2,"0")}/${String(today.getMonth()+1).padStart(2,"0")}`;
  const todayKey=dateSortKey(todayStr);
  RES.forEach(r=>{
    if(r.live){
      if(r.date && r.date!==todayStr){
        r.live=false;
        if(!r.done){ r.done=true; r.note=(r.note||"")+" · resultado a atualizar"; }
      }
      return;
    }
    if(!r.done && r.date && dateSortKey(r.date)<todayKey){
      r.pending=true;
    } else {
      r.pending=false;
    }
  });
}

// ── CLASSIFICAÇÃO ──────────────────────────────────────────────────────────────
function calcS(g){
  const teams={};
  (AT[g]||[]).forEach(t=>{teams[t]={t,pts:0,j:0,gf:0,gc:0,dif:0};});
  RES.filter(r=>r.g===g&&r.done&&r.sh!==null).forEach(r=>{
    if(!teams[r.home])teams[r.home]={t:r.home,pts:0,j:0,gf:0,gc:0,dif:0};
    if(!teams[r.away])teams[r.away]={t:r.away,pts:0,j:0,gf:0,gc:0,dif:0};
    teams[r.home].j++;teams[r.away].j++;
    teams[r.home].gf+=r.sh;teams[r.home].gc+=r.sa;
    teams[r.away].gf+=r.sa;teams[r.away].gc+=r.sh;
    if(r.sh>r.sa)teams[r.home].pts+=3;else if(r.sh<r.sa)teams[r.away].pts+=3;else{teams[r.home].pts++;teams[r.away].pts++;}
  });
  Object.values(teams).forEach(t=>{t.dif=t.gf-t.gc;});
  return Object.values(teams).sort((a,b)=>b.pts-a.pts||b.dif-a.dif||b.gf-a.gf);
}

function calcProjection(){
  // Para cada grupo: 1º, 2º, 3º (com dados atuais, mesmo que incompletos)
  const groups="ABCDEFGHIJKL".split("");
  const leaders=[], runners=[], thirds=[];
  groups.forEach(g=>{
    const rows=calcS(g);
    leaders.push({g,...rows[0]});
    runners.push({g,...rows[1]});
    thirds.push({g,...rows[2]});
  });
  // Ranking dos 12 terceiros — mesmo critério: pts, dif, gf
  thirds.sort((a,b)=>b.pts-a.pts||b.dif-a.dif||b.gf-a.gf);
  const bestThirds=thirds.slice(0,8);
  const outThirds=thirds.slice(8);
  return {leaders,runners,bestThirds,outThirds};
}

// ── CAIXA DE CONFRONTO — time de cada lado, vencedor em destaque ─────────────
function bracketBox(homeLabel,awayLabel,sh,sa,status,meta,favHome,favAway){
  const isDone=status==="done", isLive=status==="live";
  const wh=isDone&&sh>sa, wa=isDone&&sa>sh;
  const scoreCls=isLive?"live":!isDone?"tbd":"";
  const scoreTxt=isDone?`${sh}–${sa}`:isLive?`${sh??0}–${sa??0}`:"vs";
  const headCls=isLive?"head-live":isDone?"head-done":"";
  return `<div class="bbox ${isLive?"bbox-live":isDone?"bbox-done":"bbox-tbd"}">
    ${meta?`<div class="bbox-head ${headCls}"><span>${meta}</span></div>`:""}
    <div class="bbox-body">
      <div class="bbox-team ${isDone?(wh?"winner":"loser"):""}">
        <span class="nm">${homeLabel}${favHome?" ⭐":""}</span>
        ${wh?'<span class="bbox-check">✔</span>':""}
      </div>
      <div class="bbox-mid"><div class="bbox-score ${scoreCls}">${scoreTxt}</div></div>
      <div class="bbox-team bbox-right ${isDone?(wa?"winner":"loser"):""}">
        ${wa?'<span class="bbox-check">✔</span>':""}
        <span class="nm">${awayLabel}${favAway?" ⭐":""}</span>
      </div>
    </div>
  </div>`;
}
function connector(text){ return `<div class="bconnector"><span>${text||"VENCEDOR AVANÇA"}</span></div>`; }

function bOficial(){
  let h=groupStageProgress();
  const rounds=[
    {key:"avos",    label:"AVOS DE FINAL — 27 A 30/06",      expected:16},
    {key:"oitavas", label:"OITAVAS DE FINAL — 3 A 6/07",      expected:8},
    {key:"quartas", label:"QUARTAS DE FINAL — 9 A 10/07",     expected:4},
    {key:"semis",   label:"SEMIFINAIS — 14 A 15/07",          expected:2},
    {key:"final",   label:"👑 GRANDE FINAL — 19/07",          expected:1},
  ];

  rounds.forEach(({key,label,expected},roundIdx)=>{
    h+=`<div class="bround"><div class="brnd-title">${label}</div>`;
    const real=(KO_MATCHES||[]).filter(m=>m.round===key)
      .sort((a,b)=>new Date(a.iso||0)-new Date(b.iso||0));

    if(real.length){
      // Jogos reais já confirmados pela ESPN — mostra com nomes e placares de verdade
      real.forEach((m,i)=>{
        const {time,date}=m.brTime?localTime(m.brTime,m.date):{time:"",date:m.date||""};
        const favH=isFav(m.home), favA=isFav(m.away);
        let status, meta;
        if(m.done){ status="done"; meta=`✅ ENCERRADO · ${date}`; }
        else if(m.live){ status="live"; meta=`🔴 AO VIVO · ${m.clock||""}'`; }
        else { status="scheduled"; meta=`⏰ ${date} · ${time}${m.venue?" · "+m.venue:""}`; }
        h+=bracketBox(m.home,m.away,m.sh,m.sa,status,meta,favH,favA);
        if(i%2===1 && i<real.length-1) h+=connector();
      });
      const remaining=Math.max(0,expected-real.length);
      if(remaining>0){
        h+=`<div class="bremain">+ ${remaining} confronto${remaining>1?"s":""} ainda a definir nesta fase</div>`;
      }
    } else {
      // Ainda sem jogos reais nesta fase — mostra estrutura estática como referência
      MM_STRUCTURE[key].forEach((m,i)=>{
        const {time,date}=localTime(m.brTime,m.date);
        const isTBD=m.t1.startsWith("V")||/^[123]º/.test(m.t1);
        const meta=isTBD?`${label.split(" — ")[0]} · a definir`:`⏰ ${date} · ${time}${m.venue?" · "+m.venue:""}`;
        h+=bracketBox(m.t1,m.t2,null,null,"scheduled",meta,false,false);
        if(i%2===1 && i<MM_STRUCTURE[key].length-1) h+=connector();
      });
    }
    h+="</div>";
    if(roundIdx<rounds.length-1){
      h+=`<div class="bfunnel"><div class="bfunnel-tri"></div>
        <div class="bfunnel-label">${expected} CONFRONTOS → ${rounds[roundIdx+1].expected} VENCEDORES</div>
      </div>`;
    }
  });
  return h;
}

function tomorrowStr(){
  const d=new Date();d.setDate(d.getDate()+1);
  return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;
}
// Converte "DD/MM" num número ordenável (assume mesmo ano, sem virada de ano)
function dateSortKey(ddmm){
  if(!ddmm)return 9999;
  const [d,m]=ddmm.split("/").map(Number);
  return m*100+d;
}

function bProx(){
  const today=todayStr(), tom=tomorrowStr(), todayKey=dateSortKey(today);
  const all=RES.filter(r=>!r.done&&!r.live);
  const pending=all.filter(r=>r.pending);
  const upcoming=all.filter(r=>!r.pending).sort((a,b)=>dateSortKey(a.date)-dateSortKey(b.date));

  let h="";

  if(pending.length){
    h+=`<div style="background:#1a1200;border:1px solid #4a3a00;border-radius:7px;padding:10px 14px;margin-bottom:14px;font-size:10px;color:#d4a017">
      ⚠️ <b>Resultado ainda não confirmado</b> — estes jogos já deviam ter terminado, mas a fonte de dados não trouxe o placar ainda. Tenta o Refresh.
    </div>`;
    pending.forEach(r=>{h+=uc(r);});
  }

  if(!upcoming.length && !pending.length){
    return h+`<div class="no-g">Sem jogos futuros cadastrados ainda.<br><span style="font-size:10px;color:#5a6a58">O robô adiciona automaticamente conforme a ESPN confirma novos jogos — tenta o Refresh.</span></div>`;
  }

  let lastDate=null, first=true;
  upcoming.forEach(r=>{
    if(r.date!==lastDate){
      lastDate=r.date;
      let label=r.date||"DATA A CONFIRMAR";
      if(r.date===today)label=`HOJE — ${r.date}`;
      else if(r.date===tom)label=`AMANHÃ — ${r.date}`;
      h+=lbl(label,!first||pending.length>0);
      first=false;
    }
    h+=uc(r);
  });
  return h;
}

function buildTable(g){
  const rows=calcS(g),hasG=rows.some(r=>r.j>0),col=GC[g]||"#1a5e1a";
  let h=`<div class="twrap" style="--gc:${col}"><div class="thead2">GRUPO ${g}${groupHasFav(g)?" ⭐":""}</div>
    <table><thead><tr><th></th><th class="tl">SELEÇÃO</th><th>PTS</th><th>J</th><th>GF</th><th>GC</th><th>SD</th></tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    const q=i<2&&hasG,fv=isFav(r.t);
    h+=`<tr class="${q?"q":""}"><td style="${q?`color:${col}`:""};font-size:10px">${q?"✔":"✗"}</td>
      <td class="tl" style="color:${q?"#ddd":"#555"};font-weight:${q?"bold":"normal"}">${r.t}${fv?' <span style="color:#f0c040;font-size:9px">⭐</span>':""}</td>
      <td class="pts">${r.pts}</td><td style="color:#7a8a78">${r.j}</td>
      <td style="color:#777">${r.gf}</td><td style="color:#7a8a78">${r.gc}</td>
      <td class="${r.dif>0?"pos":r.dif<0?"neg":"zer"}">${r.dif>0?"+"+r.dif:r.dif}</td></tr>`;
  });
  return h+"</tbody></table></div>";
}

// ── HTML HELPERS ──────────────────────────────────────────────────────────────
function lbl(t,mt){return `<div class="lbl${mt?" mt":""}">${t}</div>`;}
function glbl(g,mt){
  const fav=groupHasFav(g);
  const favTeams=fav?(AT[g]||[]).filter(t=>isFav(t)).join(", "):"";
  return `<div class="glbl${mt?" mt":""}" style="color:${GC[g]||"#444"}">▸ GRUPO ${g}${fav?" ⭐ "+favTeams:""}</div>`;
}
function ft(r){if(!r.brTime)return{time:"",date:r.date||""};return localTime(r.brTime,r.date);}

// ── MINUTO A MINUTO — tab própria, jogos ao vivo em formato espaçoso ────────
function bMinuto(){
  const live=RES.filter(r=>r.live);
  if(!live.length){
    return `<div class="no-g">📻 Nenhum jogo ao vivo neste momento.<br>
      <span style="font-size:10px;color:#5e7a5c">Quando houver jogo a decorrer, os eventos minuto a minuto aparecem aqui automaticamente — gols, cartões e substituições.</span></div>`;
  }
  let h=lbl(`🔴 ${live.length} JOGO${live.length>1?"S":""} AO VIVO AGORA`);
  live.forEach(r=>{
    const fv=isFav(r.home)||isFav(r.away);
    const col=GC[r.g]||"#3dbb3d";
    h+=`<div class="minuto-card${fv?" minuto-fav":""}">
      <div class="minuto-head" style="border-left:3px solid ${fv?"#f0c040":col}">
        <div class="minuto-teams">
          <span class="${isFav(r.home)?"minuto-favteam":""}">${r.home}</span>
          <span class="minuto-score">${r.sh??0} – ${r.sa??0}</span>
          <span class="${isFav(r.away)?"minuto-favteam":""}">${r.away}</span>
        </div>
        <div class="minuto-meta"><span class="live-dot"></span> ${r.clock?r.clock+"'":"AO VIVO"} · GRUPO ${r.g}${fv?" · ⭐ FAVORITO":""}</div>
      </div>
      ${buildEvBox(r)}
    </div>`;
  });
  return h;
}

function buildEvBox(r){
  const evs=(r.events||[]).filter(e=>e.icon&&e.icon!=="•");
  if(!evs.length)return `<div class="evbox"><div class="evnone">Sem gols ou cartões até ao momento</div></div>`;
  const rows=evs.slice(0,10).map(e=>`<div class="evrow">
    <div class="evmin">${e.min?e.min+"'":""}</div>
    <div class="evico">${e.icon}</div>
    <div><div class="evtxt">${e.txt}</div>${e.sub?`<div class="evsub">${e.sub}</div>`:""}</div>
  </div>`).join("");
  return `<div class="evbox"><div class="evtitle">EVENTOS AO VIVO</div>${rows}</div>`;
}

function card(r,live,upcoming){
  const col=GC[r.g]||"#222";
  const fv=isFav(r.home)||isFav(r.away);
  const wh=r.done&&r.sh>r.sa,wa=r.done&&r.sa>r.sh;
  const {time,date}=ft(r);
  let badge="";
  if(live&&fv)badge=`<div class="cbadge favlive"><span class="fav-dot"></span> ⭐ FAVORITO AO VIVO · ${r.clock?r.clock+"' · ":""}GRP ${r.g}</div>`;
  else if(live)badge=`<div class="cbadge live"><span class="live-dot"></span> AO VIVO · ${r.clock?r.clock+"' · ":""}GRP ${r.g}</div>`;
  else if(upcoming)badge=`<div class="cbadge soon">⏰ ${date} · ${time}${r.venue?" · "+r.venue:""}</div>`;
  let score="";
  if(r.done)score=`<div class="cscore done">${r.sh} – ${r.sa}</div>`;
  else if(live)score=`<div class="cscore ${fv?"favalive":"alive"}">${r.sh??0} – ${r.sa??0}</div>`;
  else score=`<div class="cscore vs">· vs ·</div>`;
  let foot="";
  if(r.done)foot=`<div class="cfoot"><span style="color:${col};font-size:9px">GRP ${r.g} · ${date}</span>${r.note?`<span style="color:#3dbb3d;font-style:italic;font-size:9px;max-width:58%;text-align:right">${r.note}</span>`:""}</div>`;
  const hOn=isFav(r.home), aOn=isFav(r.away);
  // Eventos completos saíram daqui — vivem na tab 🎙 Minuto a Minuto.
  // Aqui fica só um link curto, sem poluir o cartão.
  const liveTeaser=live?`<div class="cteaser" onclick="setTab('minuto',document.querySelector('.tab.minuto-tab'))">🎙 Ver minuto a minuto →</div>`:"";
  return `<div class="card${live&&fv?" cfavlive":live?" clive":fv&&r.done?" cfav":""}" style="${r.done&&!live?"border-left-color:"+col:""}">
    ${badge}
    <div class="crow">
      <div class="cteam ${wh?"win":r.done?"lose":""}">${r.home} <span class="ministar${hOn?" on":""}" onclick="toggleFav('${r.home}')">⭐</span></div>
      ${score}
      <div class="cteam r ${wa?"win":r.done?"lose":""}"><span class="ministar${aOn?" on":""}" onclick="toggleFav('${r.away}')">⭐</span> ${r.away}</div>
    </div>
    ${foot}${liveTeaser}
  </div>`;
}

function uc(r,fav){
  const col=GC[r.g]||"#222",f=fav||isFav(r.home)||isFav(r.away);
  const {time,date}=ft(r);
  return `<div class="uc${f?" fav":""}" style="border-left-color:${f?"#f0c040":col}">
    <div><div class="uch">${r.home}</div><div class="uca">vs ${r.away}</div></div>
    <div><div class="uct">${date} · ${time}</div><div class="ucm" style="color:${f?"#b8860b":col}">GRP ${r.g}${r.venue?" · "+r.venue:""}</div></div>
  </div>`;
}

// ── CONTROLES ─────────────────────────────────────────────────────────────────
function updateTS(){
  document.getElementById("ts").textContent=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  const hasFavLive=RES.some(r=>r.live&&(isFav(r.home)||isFav(r.away)));
  const hasLive=RES.some(r=>r.live);
  document.getElementById("li").innerHTML=hasFavLive?`<span class="fav-dot"></span> `:hasLive?`<span class="live-dot"></span> `:"";
}
function setTab(id,btn){TAB=id;document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));if(btn)btn.classList.add("active");render();}
function setGrp(g){GRP=g;render();}
function doRefresh(){document.getElementById("ts").textContent="Atualizando...";fetchData();}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();fetchData();adaptRefresh();
if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js",{scope:"./"}).catch(()=>{});
</script>
</body>
