<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>

<meta name="description" content="Resultados, grupos e jogos da Copa do Mundo FIFA 2026 вҖ” por Thiago Bartulihe"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#040804;color:#ddd;font-family:Georgia,serif;min-height:100vh}

/* в”Җв”Җ FUNDO вҖ” usa background.jpg se existir; senГЈo fica sГі a cor escura в”Җв”Җв”Җв”Җв”Җв”Җ */
.bg-layer{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background-image:url('./background.jpg');
  background-size:cover;background-position:center;background-repeat:no-repeat;
  z-index:-2;pointer-events:none;
}
/* Camada escura por cima da foto вҖ” garante que o texto nunca se perde,
   seja qual for a imagem que colocares */
.bg-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(180deg,rgba(44, 45, 44, 0.486) 0%,rgba(44, 45, 44, 0.486) 45%,rgba(44, 45, 44, 0.486) 100%);
  z-index:-1;pointer-events:none;
}
.header-logo{
  display:block;max-height:46px;max-width:120px;margin:0 auto 6px;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));
}
#app{max-width:640px;margin:0 auto;padding-bottom:24px}
.header{background:linear-gradient(135deg,#082008,#0f3a0f,#082008);padding:14px 16px 10px;text-align:center;border-bottom:2px solid #1a5e1a;position:sticky;top:0;z-index:100}
.header-sub{font-size:9px;letter-spacing:5px;color:#3dbb3d;margin-bottom:3px}
.header-title{font-size:clamp(16px,5vw,24px);font-weight:bold;color:#fff;letter-spacing:2px}
.header-meta{font-size:10px;color:#555;margin-top:5px;display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap}
.rbtn{background:#0f3a0f;border:1px solid #1a5e1a;color:#3dbb3d;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:10px;font-family:Georgia,serif}
.rbtn:active{background:#1a5e1a}
.live-dot{width:7px;height:7px;background:#ff4444;border-radius:50%;display:inline-block;animation:blink 1.2s infinite}
.fav-dot{width:7px;height:7px;background:#f0c040;border-radius:50%;display:inline-block;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.src-bar{font-size:9px;text-align:center;padding:5px 12px;border-bottom:1px solid #0f0f0f;letter-spacing:1px}
.src-bar.espn{background:#0a1a0a;color:#3dbb3d}
.src-bar.sdb{background:#0a0a1a;color:#4d9dbb}
.src-bar.local{background:#1a0a0a;color:#f87171}
.src-bar.loading{background:#0a0a0a;color:#444}
.tz-bar{font-size:9px;text-align:center;padding:4px;background:#050805;color:#333;border-bottom:1px solid #0a0a0a}
.tabs{display:flex;background:#080d08;border-bottom:1px solid #111;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:1;padding:11px 3px;background:transparent;color:#444;border:none;cursor:pointer;font-size:10px;font-family:Georgia,serif;white-space:nowrap;border-bottom:2px solid transparent}
.tab.active{background:#0f3a0f;color:#3dbb3d;font-weight:bold;border-bottom:2px solid #1a5e1a}
.tab.ft.active{background:#1a1500;color:#f0c040;border-bottom-color:#f0c040}
.body{padding:12px}
.lbl{font-size:9px;letter-spacing:2px;font-weight:bold;margin-bottom:8px;color:#1a5e1a}
.lbl.mt{margin-top:16px}
.glbl{font-size:9px;letter-spacing:2px;font-weight:bold;margin:10px 0 6px}
/* CARDS */
.card{border-radius:7px;padding:10px 13px;margin-bottom:6px;border:1px solid #111;border-left:3px solid #222;background:#070c07;position:relative}
.card.clive{background:#081808;border-color:#1a5e1a;border-left-color:#3dbb3d}
.card.cfav{border-color:#2a2000;border-left-color:#f0c040;background:#080700}
.card.cfavlive{background:#0d0c02;border-color:#3a3000;border-left-color:#f0c040}
.cbadge{font-size:9px;font-weight:bold;letter-spacing:1px;margin-bottom:5px}
.cbadge.live{color:#ff4444}
.cbadge.favlive{color:#f0c040}
.cbadge.soon{color:#666}
.crow{display:flex;justify-content:space-between;align-items:center}
.cteam{flex:1;font-size:clamp(11px,2.8vw,13px)}
.cteam.win{color:#ddd;font-weight:bold}.cteam.lose{color:#555}.cteam.r{text-align:right}
.cscore{font-weight:bold;padding:3px 10px;background:#050905;border-radius:5px;letter-spacing:2px;margin:0 8px;min-width:54px;text-align:center}
.cscore.done{color:#f0c040;font-size:clamp(15px,4vw,20px)}
.cscore.alive{color:#ff6644;font-size:clamp(15px,4vw,20px)}
.cscore.favalive{color:#f0c040;font-size:clamp(15px,4vw,20px)}
.cscore.vs{color:#2a2a2a;font-size:13px}
.cfoot{font-size:9px;margin-top:4px;display:flex;justify-content:space-between;align-items:center}
.ministar{display:inline-block;cursor:pointer;font-size:11px;opacity:.25;transition:opacity .15s;padding:0 2px}
.ministar.on{opacity:1}
.ministar:active{transform:scale(1.3)}
/* LIVE EVENTS */
.evbox{margin-top:8px;border-top:1px solid #0f180f;padding-top:8px}
.evtitle{font-size:9px;color:#1a5e1a;letter-spacing:2px;margin-bottom:6px;font-weight:bold}
.evrow{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px}
.evmin{color:#f0c040;font-weight:bold;min-width:26px;font-size:10px;padding-top:1px}
.evico{min-width:16px;font-size:12px}
.evtxt{font-size:11px;color:#bbb;line-height:1.4}
.evsub{font-size:9px;color:#444;margin-top:1px}
.evnone{font-size:10px;color:#222;font-style:italic;text-align:center;padding:8px 0}
/* FAVORITES */
.favsec{background:#090800;border:1px solid #2a2000;border-radius:8px;padding:12px;margin-bottom:12px}
.favtitle{font-size:9px;color:#b8860b;letter-spacing:3px;font-weight:bold;margin-bottom:10px}
.favchips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.chip{display:inline-flex;align-items:center;gap:4px;background:#111;border:1px solid #2a2000;border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;color:#f0c040}
.chip .x{color:#555;font-size:10px}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:6px}
.tbtn{background:#080d08;border:1px solid #111;border-radius:5px;padding:5px 3px;font-size:10px;cursor:pointer;text-align:center;color:#555;font-family:Georgia,serif}
.tbtn.on{background:#1a1200;border-color:#f0c040;color:#f0c040}
.tgridlbl{font-size:9px;color:#333;letter-spacing:1px;margin-top:8px;margin-bottom:4px}
.falert{background:linear-gradient(135deg,#1a1200,#2a1e00);border:1px solid #f0c040;border-radius:8px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.falert-ico{font-size:20px}
.falert-t{font-size:12px;color:#f0c040;font-weight:bold}
.falert-s{font-size:10px;color:#888;margin-top:2px}
/* GROUP TABLE */
.gbtns{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;justify-content:center}
.gbtn{padding:5px 10px;border-radius:4px;cursor:pointer;font-weight:bold;font-family:Georgia,serif;font-size:12px;border:1px solid #1a1a1a;background:#0c100c;color:#444}
.gbtn.on{color:#fff}
.twrap{border-radius:8px;overflow:hidden;margin-bottom:10px;border:1px solid #111;border-top:3px solid var(--gc)}
.thead2{padding:8px 12px;background:#050905;font-size:9px;letter-spacing:3px;font-weight:bold;border-bottom:1px solid #0e0e0e;color:var(--gc)}
table{width:100%;border-collapse:collapse;background:#070c07}
th{padding:6px 5px;font-size:8px;color:#1e3a1e;letter-spacing:1px;border-bottom:1px solid #0c0c0c;font-family:Georgia,serif;font-weight:normal;text-align:center}
th.tl{text-align:left}
tbody tr{border-bottom:1px solid #0b0b0b}
tbody tr.q{background:rgba(26,94,26,.13)}
td{padding:8px 5px;font-size:11px;text-align:center}
td.tl{text-align:left}
td.pts{font-weight:bold;color:#f0c040;font-size:13px}
td.pos{color:#4ade80;font-weight:bold}td.neg{color:#f87171;font-weight:bold}td.zer{color:#444}
/* UPCOMING */
.uc{background:#080d08;border:1px solid #111;border-left:3px solid #222;border-radius:7px;padding:10px 13px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.uc.fav{background:#090800;border-color:#2a2000;border-left-color:#f0c040}
.uch{font-size:12px;font-weight:bold}
.uca{font-size:11px;color:#444;margin-top:1px}
.uct{font-size:12px;color:#f0c040;font-weight:bold;text-align:right}
.ucm{font-size:9px;margin-top:2px;text-align:right}
/* BRACKET */
.bracket{padding:4px 0}
.bround{margin-bottom:22px}
.brnd-title{font-size:9px;color:#b8860b;letter-spacing:3px;font-weight:bold;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #1a1500}
.bmatch{background:#090e09;border:1px solid #141a14;border-radius:6px;padding:9px 12px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.bmatch.done{border-left:3px solid #166534}
.bmatch.live-b{border-left:3px solid #ff4444;background:#0a1008}
.bmatch.tbd{opacity:.5}
.bteams{flex:1}
.bt1{font-size:12px;font-weight:bold;color:#ccc}
.bt2{font-size:12px;color:#666;margin-top:3px}
.bscore{font-size:16px;font-weight:bold;color:#f0c040;padding:2px 10px;background:#060b06;border-radius:4px;letter-spacing:2px;text-align:center;min-width:50px}
.bscore.tbd-s{color:#222;font-size:12px}
.bscore.live-sc{color:#ff6644}
.binfo{font-size:9px;color:#333;margin-top:2px}

/* в”Җв”Җ CHAVE VISUAL вҖ” caixa de confronto, time de cada lado в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.bbox{border-radius:10px;overflow:hidden;margin-bottom:6px;background:linear-gradient(160deg,#0a0f0a,#060a06);border:1px solid #131d13}
.bbox.bbox-live{border-color:#3dbb3d}
.bbox.bbox-done{border-color:#1a3320}
.bbox.bbox-tbd{opacity:.55}
.bbox-head{padding:4px 10px;font-size:8px;letter-spacing:1.5px;color:#557;background:#050905;border-bottom:1px solid #0e140e;display:flex;justify-content:space-between}
.bbox-head.head-live{color:#ff5544}
.bbox-head.head-done{color:#3dbb3d}
.bbox-body{display:flex;align-items:stretch}
.bbox-team{flex:1;display:flex;align-items:center;gap:5px;padding:11px 8px;font-size:12.5px;min-width:0;line-height:1.25}
.bbox-team.bbox-right{flex-direction:row-reverse;text-align:right;justify-content:flex-start}
.bbox-team .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bbox-team.winner{font-weight:bold;color:#f2ecd8}
.bbox-team.loser{color:#4a5a4a}
.bbox-check{color:#3dbb3d;font-size:11px;flex-shrink:0}
.bbox-mid{display:flex;align-items:center;padding:0 7px;flex-shrink:0;border-left:1px solid #101a10;border-right:1px solid #101a10}
.bbox-score{font-size:16px;font-weight:bold;color:#f0c040;letter-spacing:1px;min-width:42px;text-align:center}
.bbox-score.live{color:#ff6644}
.bbox-score.tbd{color:#2a3a2a;font-size:11px;letter-spacing:0}
.bconnector{display:flex;justify-content:center;position:relative;height:16px;margin:-2px 0 4px}
.bconnector::before{content:"";position:absolute;top:0;bottom:0;left:50%;width:1px;background:#162616}
.bconnector span{position:relative;background:#040804;color:#2a4022;font-size:7px;letter-spacing:1.5px;padding:0 8px;align-self:center}
.bremain{font-size:10px;color:#2a3a2a;text-align:center;padding:8px 0 2px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#040804}
::-webkit-scrollbar-thumb{background:#1a2a1a;border-radius:2px}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="bg-overlay"></div>
<div id="app">
  <div class="header">
    <img src="./logo.png" alt="" class="header-logo" onerror="this.style.display='none'"/>
    <div class="header-sub">COPA DO MUNDO FIFA 2026</div>
    <div class="header-title">вҡҪWORLD CUP TRACKER - BY TICOBARTUвҡҪ</div>
    <div class="header-meta">
      <span id="li"></span>
      <span id="ts">Carregando...</span>
      <button class="rbtn" onclick="doRefresh()">вҶә Refresh</button>
    </div>
  </div>
  <div id="srcbar" class="src-bar loading">вҹі Conectando...</div>
  <div id="tzbar" class="tz-bar">рҹ•җ Detectando fuso...</div>
  <div class="tabs">
    <button class="tab active" onclick="setTab('hoje',this)">рҹ”ҙ Hoje</button>
    <button class="tab ft"    onclick="setTab('favs',this)">вӯҗ Favoritos</button>
    <button class="tab"       onclick="setTab('result',this)">вң… Resultados</button>
    <button class="tab"       onclick="setTab('grupos',this)">рҹҸҹ Grupos</button>
    <button class="tab"       onclick="setTab('mm',this)">рҹҸҶ Mata-Mata</button>
    <button class="tab"       onclick="setTab('prox',this)">рҹ“… PrГіximos</button>
  </div>
  <div class="body"><div id="content"></div></div>
  <div style="text-align:center;padding:18px 12px 8px;font-size:9px;color:#222;letter-spacing:1px">
    вҡҪ Copa 2026 Tracker В· Criado por <span style="color:#3a5a3a">Thiago Bartulihe</span>
  </div>
</div>
<script>
// в”Җв”Җ TIMEZONE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const userTZ=Intl.DateTimeFormat().resolvedOptions().timeZone;
const TZ_NAMES={"America/Sao_Paulo":"Brasil В· BrasГӯlia","America/Manaus":"Brasil В· Manaus","Europe/Lisbon":"Portugal В· Lisboa","Europe/London":"UK В· Londres","America/New_York":"EUA В· Leste","America/Los_Angeles":"EUA В· PacГӯfico","America/Argentina/Buenos_Aires":"Argentina","Europe/Madrid":"Espanha"};
document.getElementById("tzbar").textContent=`рҹ•җ HorГЎrios em: ${TZ_NAMES[userTZ]||userTZ}`;
function brOff(){const d=new Date(),b=new Date(d.toLocaleString("en-US",{timeZone:"America/Sao_Paulo"})),u=new Date(d.toLocaleString("en-US",{timeZone:"UTC"}));return(b-u)/3600000;}
function localTime(brTime,brDate){
  try{const h=parseInt(brTime),[day,mon]=brDate.split("/").map(Number),diff=-(new Date().getTimezoneOffset()/60)-brOff();
  let nh=h+diff,ds=0;if(nh>=24){nh-=24;ds=1;}if(nh<0){nh+=24;ds=-1;}
  const nd=new Date(2026,mon-1,day+ds),p=n=>String(n).padStart(2,"0");
  return{time:`${p(nh)}h`,date:`${p(nd.getDate())}/${p(nd.getMonth()+1)}`};}
  catch(e){return{time:brTime,date:brDate};}
}

// в”Җв”Җ CORES в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const GC={A:"#7c2d12",B:"#1e3a8a",C:"#166534",D:"#4a1d96",E:"#713f12",F:"#134e4a",G:"#1e1b4b",H:"#7f1d1d",I:"#14532d",J:"#3b0764",K:"#0c4a6e",L:"#1c1917"};
const AT={
  A:["MГ©xico рҹҮІрҹҮҪ","Coreia do Sul рҹҮ°рҹҮ·","Rep. Tcheca рҹҮЁрҹҮҝ","ГҒfrica do Sul рҹҮҝрҹҮҰ"],
  B:["CanadГЎ рҹҮЁрҹҮҰ","BГіsnia рҹҮ§рҹҮҰ","Qatar рҹҮ¶рҹҮҰ","SuГӯГ§a рҹҮЁрҹҮӯ"],
  C:["Brasil рҹҮ§рҹҮ·","Marrocos рҹҮІрҹҮҰ","EscГіcia рҹҸҙу Ғ§у Ғўу Ғіу ҒЈу Ғҙу Ғҝ","Haiti рҹҮӯрҹҮ№"],
  D:["EUA рҹҮәрҹҮё","AustrГЎlia рҹҮҰрҹҮә","Turquia рҹҮ№рҹҮ·","Paraguai рҹҮөрҹҮҫ"],
  E:["Alemanha рҹҮ©рҹҮӘ","C. do Marfim рҹҮЁрҹҮ®","Equador рҹҮӘрҹҮЁ","CuraГ§ao рҹҮЁрҹҮј"],
  F:["SuГ©cia рҹҮёрҹҮӘ","Holanda рҹҮірҹҮұ","JapГЈo рҹҮҜрҹҮө","TunГӯsia рҹҮ№рҹҮі"],
  G:["BГ©lgica рҹҮ§рҹҮӘ","IrГЈ рҹҮ®рҹҮ·","Egito рҹҮӘрҹҮ¬","Nova ZelГўndia рҹҮірҹҮҝ"],
  H:["Espanha рҹҮӘрҹҮё","Cabo Verde рҹҮЁрҹҮ»","ArГЎbia Saudita рҹҮёрҹҮҰ","Uruguai рҹҮәрҹҮҫ"],
  I:["FranГ§a рҹҮ«рҹҮ·","Noruega рҹҮірҹҮҙ","Senegal рҹҮёрҹҮі","Iraque рҹҮ®рҹҮ¶"],
  J:["Argentina рҹҮҰрҹҮ·","ГҒustria рҹҮҰрҹҮ№","ArgГ©lia рҹҮ©рҹҮҝ","JordГўnia рҹҮҜрҹҮҙ"],
  K:["Portugal рҹҮөрҹҮ№","ColГҙmbia рҹҮЁрҹҮҙ","RD Congo рҹҮЁрҹҮ©","UzbequistГЈo рҹҮәрҹҮҝ"],
  L:["Inglaterra рҹҸҙу Ғ§у Ғўу ҒҘу Ғ®у Ғ§у Ғҝ","CroГЎcia рҹҮӯрҹҮ·","Gana рҹҮ¬рҹҮӯ","PanamГЎ рҹҮөрҹҮҰ"]
};

// Lookup time вҶ’ grupo, usado para classificar entradas vindas do results.json
const TEAM_GROUP={};
Object.entries(AT).forEach(([g,teams])=>teams.forEach(t=>{TEAM_GROUP[t.replace(/[^\p{L}\p{N}]/gu,"").toLowerCase()]=g;}));
function groupOf(teamName){
  const k=(teamName||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z0-9]/g,"").toLowerCase();
  return TEAM_GROUP[k]||"?";
}
// Estrela dinГўmica вҖ” grupo "favorito" Г© o que contГ©m ao menos uma seleГ§ГЈo marcada
function groupHasFav(g){ return (AT[g]||[]).some(t=>isFav(t)); }

// tkey: extrai sГі letras/nГәmeros para comparaГ§ГЈo вҖ” resolve emojis complexos
function tkey(s){
  return (s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-zA-Z0-9]/g,"").toLowerCase();
}
const DEFAULT_FAVS=["Brasil рҹҮ§рҹҮ·","CroГЎcia рҹҮӯрҹҮ·"];
let FAVS=[...DEFAULT_FAVS];

function loadFavs(){
  try{
    const raw=JSON.parse(localStorage.getItem("copa_favs")||"null");
    if(!Array.isArray(raw)){FAVS=[...DEFAULT_FAVS];return;}
    // Deduplica hard вҖ” remove qualquer duplicado por tkey
    const seen=new Set();
    FAVS=raw.filter(f=>{
      if(!f||typeof f!=="string")return false;
      const k=tkey(f);
      if(!k||seen.has(k))return false;
      seen.add(k);return true;
    });
    if(FAVS.length===0)FAVS=[...DEFAULT_FAVS];
  }catch(e){FAVS=[...DEFAULT_FAVS];}
  saveFavs();
}
function saveFavs(){try{localStorage.setItem("copa_favs",JSON.stringify(FAVS));}catch(e){}}
function clearFavs(){FAVS=[];saveFavs();render();}
function isFav(name){const k=tkey(name);return FAVS.some(f=>tkey(f)===k);}
function toggleFav(name){
  const k=tkey(name);
  const idx=FAVS.findIndex(f=>tkey(f)===k);
  if(idx>=0)FAVS.splice(idx,1);
  else FAVS.push(name);
  // Garante sem duplicados
  const seen=new Set();
  FAVS=FAVS.filter(f=>{const fk=tkey(f);if(seen.has(fk))return false;seen.add(fk);return true;});
  saveFavs();render();
}
loadFavs();

function mergeResultsJSON(json){
  if(Array.isArray(json.knockout)) KO_MATCHES=json.knockout;
  const incoming=json.matches||[];
  let updated=0;
  incoming.forEach(m=>{
    const g=groupOf(m.home);
    let existing=RES.find(r=>tkey(r.home)===tkey(m.home)&&tkey(r.away)===tkey(m.away));
    if(existing){
      // Preserva nota escrita Г  mГЈo se a automГЎtica nГЈo tiver uma melhor
      const keepNote=existing.note;
      Object.assign(existing,{
        date:m.date||existing.date, brTime:m.brTime||existing.brTime,
        venue:m.venue||existing.venue,
        sh:m.sh, sa:m.sa, done:m.done, live:m.live, clock:m.clock||"",
      });
      if(m.events&&m.events.length) existing.events=m.events;
      if(!existing.note && keepNote) existing.note=keepNote;
      updated++;
    } else if(g!=="?"){
      RES.push({
        g, home:m.home, away:m.away, date:m.date, brTime:m.brTime, venue:m.venue,
        sh:m.sh, sa:m.sa, done:m.done, live:m.live, clock:m.clock||"", events:m.events||[]
      });
      updated++;
    }
  });
  return updated;
}

function applyESPNData(data){
  let count=0;
  (data.events||[]).forEach(ev=>{
    const comp=ev.competitions?.[0];
    const h=comp?.competitors?.find(c=>c.homeAway==="home");
    const a=comp?.competitors?.find(c=>c.homeAway==="away");
    if(!h||!a)return;
    const state=ev.status?.type?.state;
    const hs=parseInt(h.score)||0,as=parseInt(a.score)||0;
    const clock=ev.status?.displayClock||"";
    const hName=mapTeam(h.team?.displayName||"");
    const aName=mapTeam(a.team?.displayName||"");
    RES.forEach(r=>{
      if(r.home!==hName||r.away!==aName)return;
      if(state==="post"){r.sh=hs;r.sa=as;r.done=true;r.live=false;r.clock="";count++;}
      else if(state==="in"){r.sh=hs;r.sa=as;r.live=true;r.clock=clock;
        fetchEventDetails(ev.id,h.team?.displayName,a.team?.displayName);}
    });
  });
  return count;
}

// Palavras que indicam eventos irrelevantes вҖ” filtrar fora
const SKIP_WORDS=["delay","drink","half begins","kick off","kick-off","end of","period begins","weather","var check concluded","attendance","whistle"];
function isRelevantEvent(p){
  const txt=(p.text||p.shortText||"").toLowerCase();
  if(SKIP_WORDS.some(w=>txt.includes(w)))return false;
  const typ=(p.type?.text||p.type?.id||"").toLowerCase();
  // SГі incluir se tiver icon relevante OU texto com nome de jogador
  const hasIcon=typ.includes("goal")||typ.includes("card")||typ.includes("sub")||typ.includes("yellow")||typ.includes("red");
  const hasClock=p.clock?.displayValue&&parseInt(p.clock.displayValue)>0;
  return hasIcon||(hasClock&&txt.length>3&&!SKIP_WORDS.some(w=>txt.includes(w)));
}

function getIcon(p){
  const typ=(p.type?.text||p.type?.id||"").toLowerCase();
  const txt=(p.text||"").toLowerCase();
  if(typ.includes("goal")||txt.includes("goal")) return typ.includes("own")||txt.includes("(og)")?"вҡҪ OG":"вҡҪ";
  if(typ.includes("yellow red")||typ.includes("second yellow"))return"рҹҹҘ";
  if(typ.includes("yellow"))return"рҹҹЁ";
  if(typ.includes("red"))return"рҹҹҘ";
  if(typ.includes("sub"))return"рҹ”„";
  if(typ.includes("penalty")||txt.includes("penalty"))return"вҡҪрҹҺҜ";
  return null; // null = skip
}

async function fetchEventDetails(evId,hName,aName){
  try{
    const r=await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${evId}`,{cache:"no-cache"});
    if(!r.ok)return;
    const data=await r.json();
    // ESPN pode devolver em plays ou keyEvents
    const plays=[...(data.keyEvents||[]),(data.plays||[])].flat();
    if(!plays.length)return;
    const events=plays
      .filter(isRelevantEvent)
      .map(p=>{
        const icon=getIcon(p);
        if(!icon)return null;
        const min=p.clock?.displayValue||p.period?.clock||"";
        const txt=p.text||p.participants?.[0]?.athlete?.displayName||p.shortText||"";
        const sub=p.team?.displayName||"";
        return{min,icon,txt,sub};
      })
      .filter(Boolean)
      .reverse(); // mais recente primeiro
    if(!events.length)return;
    RES.forEach(r=>{
      if(!r.live)return;
      const hk=tkey(hName).slice(0,5),ak=tkey(aName).slice(0,5);
      if(tkey(r.home).includes(hk)||tkey(r.away).includes(ak)){
        r.events=events;
      }
    });
    render();
  }catch(e){}
}

async function fetchSDB(){
  const r=await fetch("https://www.thesportsdb.com/api/v1/json/3/eventsseason.php?id=4480&s=2026",{cache:"no-cache"});
  if(!r.ok)throw new Error("sdb");
  const data=await r.json();let c=0;
  (data.events||[]).forEach(ev=>{
    if(!ev.intHomeScore)return;
    const hs=parseInt(ev.intHomeScore)||0,as=parseInt(ev.intAwayScore)||0;
    RES.forEach(r=>{
      if(r.done)return;
      const hm=tkey(r.home).includes(tkey(ev.strHomeTeam||"").slice(0,4));
      const am=tkey(r.away).includes(tkey(ev.strAwayTeam||"").slice(0,4));
      if(hm&&am&&ev.strStatus==="Match Finished"){r.sh=hs;r.sa=as;r.done=true;r.live=false;c++;}
    });
  });return c;
}

function calcS(g){
  const teams={};
  (AT[g]||[]).forEach(t=>{teams[t]={t,pts:0,j:0,gf:0,gc:0,dif:0};});
  RES.filter(r=>r.g===g&&r.done&&r.sh!==null).forEach(r=>{
    if(!teams[r.home])teams[r.home]={t:r.home,pts:0,j:0,gf:0,gc:0,dif:0};
    if(!teams[r.away])teams[r.away]={t:r.away,pts:0,j:0,gf:0,gc:0,dif:0};
    teams[r.home].j++;teams[r.away].j++;
    teams[r.home].gf+=r.sh;teams[r.home].gc+=r.sa;
    teams[r.away].gf+=r.sa;teams[r.away].gc+=r.sh;
    if(r.sh>r.sa)teams[r.home].pts+=3;else if(r.sh<r.sa)teams[r.away].pts+=3;else{teams[r.home].pts++;teams[r.away].pts++;}
  });
  Object.values(teams).forEach(t=>{t.dif=t.gf-t.gc;});
  return Object.values(teams).sort((a,b)=>b.pts-a.pts||b.dif-a.dif||b.gf-a.gf);
}

function calcProjection(){
  // Para cada grupo: 1Вә, 2Вә, 3Вә (com dados atuais, mesmo que incompletos)
  const groups="ABCDEFGHIJKL".split("");
  const leaders=[], runners=[], thirds=[];
  groups.forEach(g=>{
    const rows=calcS(g);
    leaders.push({g,...rows[0]});
    runners.push({g,...rows[1]});
    thirds.push({g,...rows[2]});
  });
  // Ranking dos 12 terceiros вҖ” mesmo critГ©rio: pts, dif, gf
  thirds.sort((a,b)=>b.pts-a.pts||b.dif-a.dif||b.gf-a.gf);
  const bestThirds=thirds.slice(0,8);
  const outThirds=thirds.slice(8);
  return {leaders,runners,bestThirds,outThirds};
}

  const {leaders,runners,bestThirds,outThirds}=calcProjection();
  let h=`<div style="background:#0a0f00;border:1px solid #2a3a00;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:10px;color:#9ab;line-height:1.5">
    рҹ”® <b style="color:#b8c43d">ProjeГ§ГЈo baseada nos resultados de agora.</b> Mostra quem se classificaria se a fase de grupos parasse neste momento вҖ” muda conforme os jogos acontecem.<br><br>
    вҡ пёҸ Os <b>confrontos exatos</b> do mata-mata com terceiros colocados sГі saem da FIFA apГіs o fim da fase de grupos вҖ” existem 495 combinaГ§Гөes possГӯveis. Aqui mostro sГі <b>quem se classifica</b>, nГЈo quem joga contra quem.
  </div>`;

  h+=lbl("рҹҘҮ LГҚDERES DOS GRUPOS (1Вә lugar)");
  leaders.forEach(t=>{
    const fav=isFav(t.t);
    h+=`<div class="uc" style="border-left-color:${GC[t.g]}${fav?";background:#090800":""}">
      <div><div class="uch">${t.t}${fav?" вӯҗ":""}</div><div class="uca">Grupo ${t.g} В· ${t.pts} pts В· ${t.j} jogos</div></div>
      <div style="text-align:right"><div class="uct" style="color:${GC[t.g]}">${t.dif>0?"+":""}${t.dif}</div><div class="ucm">saldo</div></div>
    </div>`;
  });

  h+=lbl("рҹҘҲ VICE-LГҚDERES (2Вә lugar)",true);
  runners.forEach(t=>{
    const fav=isFav(t.t);
    h+=`<div class="uc" style="border-left-color:${GC[t.g]}${fav?";background:#090800":""}">
      <div><div class="uch">${t.t}${fav?" вӯҗ":""}</div><div class="uca">Grupo ${t.g} В· ${t.pts} pts В· ${t.j} jogos</div></div>
      <div style="text-align:right"><div class="uct" style="color:${GC[t.g]}">${t.dif>0?"+":""}${t.dif}</div><div class="ucm">saldo</div></div>
    </div>`;
  });

  h+=lbl("рҹҘү MELHORES TERCEIROS вҖ” top 8 entram",true);
  bestThirds.forEach((t,i)=>{
    const fav=isFav(t.t);
    h+=`<div class="uc fav" style="border-left-color:#3dbb3d${fav?";background:#090800":""}">
      <div><div class="uch">${i+1}Вә В· ${t.t}${fav?" вӯҗ":""}</div><div class="uca">Grupo ${t.g} В· ${t.pts} pts В· ${t.j} jogos</div></div>
      <div style="text-align:right"><div class="uct" style="color:#3dbb3d">${t.dif>0?"+":""}${t.dif}</div><div class="ucm">вң” classificado</div></div>
    </div>`;
  });

  if(outThirds.length){
    h+=lbl("вқҢ TERCEIROS FORA вҖ” por enquanto",true);
    outThirds.forEach((t,i)=>{
      const fav=isFav(t.t);
      h+=`<div class="uc" style="border-left-color:#3a1a1a;opacity:.6${fav?";background:#090800":""}">
        <div><div class="uch">${i+9}Вә В· ${t.t}${fav?" вӯҗ":""}</div><div class="uca">Grupo ${t.g} В· ${t.pts} pts В· ${t.j} jogos</div></div>
        <div style="text-align:right"><div class="uct" style="color:#664">${t.dif>0?"+":""}${t.dif}</div><div class="ucm">eliminado</div></div>
      </div>`;
    });
  }
  return h;
}

// в”Җв”Җ CAIXA DE CONFRONTO вҖ” time de cada lado, vencedor em destaque в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function bracketBox(homeLabel,awayLabel,sh,sa,status,meta,favHome,favAway){
  const isDone=status==="done", isLive=status==="live";
  const wh=isDone&&sh>sa, wa=isDone&&sa>sh;
  const scoreCls=isLive?"live":!isDone?"tbd":"";
  const scoreTxt=isDone?`${sh}вҖ“${sa}`:isLive?`${sh??0}вҖ“${sa??0}`:"vs";
  const headCls=isLive?"head-live":isDone?"head-done":"";
  return `<div class="bbox ${isLive?"bbox-live":isDone?"bbox-done":"bbox-tbd"}">
    ${meta?`<div class="bbox-head ${headCls}"><span>${meta}</span></div>`:""}
    <div class="bbox-body">
      <div class="bbox-team ${isDone?(wh?"winner":"loser"):""}">
        <span class="nm">${homeLabel}${favHome?" вӯҗ":""}</span>
        ${wh?'<span class="bbox-check">вң”</span>':""}
      </div>
      <div class="bbox-mid"><div class="bbox-score ${scoreCls}">${scoreTxt}</div></div>
      <div class="bbox-team bbox-right ${isDone?(wa?"winner":"loser"):""}">
        ${wa?'<span class="bbox-check">вң”</span>':""}
        <span class="nm">${awayLabel}${favAway?" вӯҗ":""}</span>
      </div>
    </div>
  </div>`;
}
function connector(text){ return `<div class="bconnector"><span>${text||"VENCEDOR AVANГҮA"}</span></div>`; }

function bOficial(){
  let h="";
  const rounds=[
    {key:"avos",    label:"AVOS DE FINAL вҖ” 27 A 30/06",      expected:16},
    {key:"oitavas", label:"OITAVAS DE FINAL вҖ” 3 A 6/07",      expected:8},
    {key:"quartas", label:"QUARTAS DE FINAL вҖ” 9 A 10/07",     expected:4},
    {key:"semis",   label:"SEMIFINAIS вҖ” 14 A 15/07",          expected:2},
    {key:"final",   label:"рҹ‘‘ GRANDE FINAL вҖ” 19/07",          expected:1},
  ];

  rounds.forEach(({key,label,expected})=>{
    h+=`<div class="bround"><div class="brnd-title">${label}</div>`;
    const real=(KO_MATCHES||[]).filter(m=>m.round===key)
      .sort((a,b)=>new Date(a.iso||0)-new Date(b.iso||0));

    if(real.length){
      // Jogos reais jГЎ confirmados pela ESPN вҖ” mostra com nomes e placares de verdade
      real.forEach((m,i)=>{
        const {time,date}=m.brTime?localTime(m.brTime,m.date):{time:"",date:m.date||""};
        const favH=isFav(m.home), favA=isFav(m.away);
        let status, meta;
        if(m.done){ status="done"; meta=`вң… ENCERRADO В· ${date}`; }
        else if(m.live){ status="live"; meta=`рҹ”ҙ AO VIVO В· ${m.clock||""}'`; }
        else { status="scheduled"; meta=`вҸ° ${date} В· ${time}${m.venue?" В· "+m.venue:""}`; }
        h+=bracketBox(m.home,m.away,m.sh,m.sa,status,meta,favH,favA);
        if(i%2===1 && i<real.length-1) h+=connector();
      });
      const remaining=Math.max(0,expected-real.length);
      if(remaining>0){
        h+=`<div class="bremain">+ ${remaining} confronto${remaining>1?"s":""} ainda a definir nesta fase</div>`;
      }
    } else {
      // Ainda sem jogos reais nesta fase вҖ” mostra estrutura estГЎtica como referГӘncia
      MM_STRUCTURE[key].forEach((m,i)=>{
        const {time,date}=localTime(m.brTime,m.date);
        const isTBD=m.t1.startsWith("V")||/^[123]Вә/.test(m.t1);
        const meta=isTBD?`${label.split(" вҖ” ")[0]} В· a definir`:`вҸ° ${date} В· ${time}${m.venue?" В· "+m.venue:""}`;
        h+=bracketBox(m.t1,m.t2,null,null,"scheduled",meta,false,false);
        if(i%2===1 && i<MM_STRUCTURE[key].length-1) h+=connector();
      });
    }
    h+="</div>";
  });
  return h;
}

function tomorrowStr(){
  const d=new Date();d.setDate(d.getDate()+1);
  return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;
}
// Converte "DD/MM" num nГәmero ordenГЎvel (assume mesmo ano, sem virada de ano)
function dateSortKey(ddmm){
  if(!ddmm)return 9999;
  const [d,m]=ddmm.split("/").map(Number);
  return m*100+d;
}

function bProx(){
  const today=todayStr(), tom=tomorrowStr();
  const upcoming=RES.filter(r=>!r.done&&!r.live).sort((a,b)=>dateSortKey(a.date)-dateSortKey(b.date));

  if(!upcoming.length){
    return `<div class="no-g">Sem jogos futuros cadastrados ainda.<br><span style="font-size:10px;color:#222">O robГҙ adiciona automaticamente conforme a ESPN confirma novos jogos вҖ” tenta o Refresh.</span></div>`;
  }

  let h="", lastDate=null, first=true;
  upcoming.forEach(r=>{
    if(r.date!==lastDate){
      lastDate=r.date;
      let label=r.date||"DATA A CONFIRMAR";
      if(r.date===today)label=`HOJE вҖ” ${r.date}`;
      else if(r.date===tom)label=`AMANHГғ вҖ” ${r.date}`;
      h+=lbl(label,!first);
      first=false;
    }
    h+=uc(r);
  });
  return h;
}

function buildTable(g){
  const rows=calcS(g),hasG=rows.some(r=>r.j>0),col=GC[g]||"#1a5e1a";
  let h=`<div class="twrap" style="--gc:${col}"><div class="thead2">GRUPO ${g}${groupHasFav(g)?" вӯҗ":""}</div>
    <table><thead><tr><th></th><th class="tl">SELEГҮГғO</th><th>PTS</th><th>J</th><th>GF</th><th>GC</th><th>SD</th></tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    const q=i<2&&hasG,fv=isFav(r.t);
    h+=`<tr class="${q?"q":""}"><td style="${q?`color:${col}`:""};font-size:10px">${q?"вң”":"вң—"}</td>
      <td class="tl" style="color:${q?"#ddd":"#555"};font-weight:${q?"bold":"normal"}">${r.t}${fv?' <span style="color:#f0c040;font-size:9px">вӯҗ</span>':""}</td>
      <td class="pts">${r.pts}</td><td style="color:#444">${r.j}</td>
      <td style="color:#777">${r.gf}</td><td style="color:#444">${r.gc}</td>
      <td class="${r.dif>0?"pos":r.dif<0?"neg":"zer"}">${r.dif>0?"+"+r.dif:r.dif}</td></tr>`;
  });
  return h+"</tbody></table></div>";
}

// в”Җв”Җ HTML HELPERS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function lbl(t,mt){return `<div class="lbl${mt?" mt":""}">${t}</div>`;}
function glbl(g,mt){
  const fav=groupHasFav(g);
  const favTeams=fav?(AT[g]||[]).filter(t=>isFav(t)).join(", "):"";
  return `<div class="glbl${mt?" mt":""}" style="color:${GC[g]||"#444"}">в–ё GRUPO ${g}${fav?" вӯҗ "+favTeams:""}</div>`;
}
function ft(r){if(!r.brTime)return{time:"",date:r.date||""};return localTime(r.brTime,r.date);}

function buildEvBox(r){
  const evs=(r.events||[]).filter(e=>e.icon&&e.icon!=="вҖў");
  if(!evs.length)return `<div class="evbox"><div class="evnone">Sem golos ou cartГөes atГ© ao momento</div></div>`;
  const rows=evs.slice(0,10).map(e=>`<div class="evrow">
    <div class="evmin">${e.min?e.min+"'":""}</div>
    <div class="evico">${e.icon}</div>
    <div><div class="evtxt">${e.txt}</div>${e.sub?`<div class="evsub">${e.sub}</div>`:""}</div>
  </div>`).join("");
  return `<div class="evbox"><div class="evtitle">EVENTOS AO VIVO</div>${rows}</div>`;
}

function card(r,live,upcoming){
  const col=GC[r.g]||"#222";
  const fv=isFav(r.home)||isFav(r.away);
  const wh=r.done&&r.sh>r.sa,wa=r.done&&r.sa>r.sh;
  const {time,date}=ft(r);
  let badge="";
  if(live&&fv)badge=`<div class="cbadge favlive"><span class="fav-dot"></span> вӯҗ FAVORITO AO VIVO В· ${r.clock?r.clock+"' В· ":""}GRP ${r.g}</div>`;
  else if(live)badge=`<div class="cbadge live"><span class="live-dot"></span> AO VIVO В· ${r.clock?r.clock+"' В· ":""}GRP ${r.g}</div>`;
  else if(upcoming)badge=`<div class="cbadge soon">вҸ° ${date} В· ${time}${r.venue?" В· "+r.venue:""}</div>`;
  let score="";
  if(r.done)score=`<div class="cscore done">${r.sh} вҖ“ ${r.sa}</div>`;
  else if(live)score=`<div class="cscore ${fv?"favalive":"alive"}">${r.sh??0} вҖ“ ${r.sa??0}</div>`;
  else score=`<div class="cscore vs">В· vs В·</div>`;
  let foot="";
  if(r.done)foot=`<div class="cfoot"><span style="color:${col};font-size:9px">GRP ${r.g} В· ${date}</span>${r.note?`<span style="color:#3dbb3d;font-style:italic;font-size:9px;max-width:58%;text-align:right">${r.note}</span>`:""}</div>`;
  const hOn=isFav(r.home), aOn=isFav(r.away);
  return `<div class="card${live&&fv?" cfavlive":live?" clive":fv&&r.done?" cfav":""}" style="${r.done&&!live?"border-left-color:"+col:""}">
    ${badge}
    <div class="crow">
      <div class="cteam ${wh?"win":r.done?"lose":""}">${r.home} <span class="ministar${hOn?" on":""}" onclick="toggleFav('${r.home}')">вӯҗ</span></div>
      ${score}
      <div class="cteam r ${wa?"win":r.done?"lose":""}"><span class="ministar${aOn?" on":""}" onclick="toggleFav('${r.away}')">вӯҗ</span> ${r.away}</div>
    </div>
    ${foot}${live?buildEvBox(r):""}
  </div>`;
}

function uc(r,fav){
  const col=GC[r.g]||"#222",f=fav||isFav(r.home)||isFav(r.away);
  const {time,date}=ft(r);
  return `<div class="uc${f?" fav":""}" style="border-left-color:${f?"#f0c040":col}">
    <div><div class="uch">${r.home}</div><div class="uca">vs ${r.away}</div></div>
    <div><div class="uct">${date} В· ${time}</div><div class="ucm" style="color:${f?"#b8860b":col}">GRP ${r.g}${r.venue?" В· "+r.venue:""}</div></div>
  </div>`;
}

// в”Җв”Җ CONTROLES в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function updateTS(){
  document.getElementById("ts").textContent=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  const hasFavLive=RES.some(r=>r.live&&(isFav(r.home)||isFav(r.away)));
  const hasLive=RES.some(r=>r.live);
  document.getElementById("li").innerHTML=hasFavLive?`<span class="fav-dot"></span> `:hasLive?`<span class="live-dot"></span> `:"";
}
function setTab(id,btn){TAB=id;document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));if(btn)btn.classList.add("active");render();}
function setGrp(g){GRP=g;render();}
function doRefresh(){document.getElementById("ts").textContent="Atualizando...";fetchData();}

// в”Җв”Җ INIT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
render();fetchData();adaptRefresh();
if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js",{scope:"./"}).catch(()=>{});
</script>
