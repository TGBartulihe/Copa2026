<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#082008"/>
<meta name="author" content="Thiago Bartulihe"/>
<meta name="description" content="Resultados, grupos e jogos da Copa do Mundo FIFA 2026 — por Thiago Bartulihe"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Copa 2026"/>
<title>⚽ Copa 2026 Tracker</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icon-192.png"/>
<link rel="icon" type="image/png" href="./icon-192.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#040804;color:#ddd;font-family:Georgia,serif;min-height:100vh}

/* ── FUNDO — usa background.jpg se existir; senão fica só a cor escura ────── */
.bg-layer{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background-image:url('./background.jpg');
  background-size:cover;background-position:center;background-repeat:no-repeat;
  z-index:-2;pointer-events:none;
}
/* Camada escura por cima da foto — garante que o texto nunca se perde,
   seja qual for a imagem que colocares */
.bg-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(180deg,rgba(20,30,20,.22) 0%,rgba(16,26,16,.32) 50%,rgba(12,20,12,.45) 100%);
  z-index:-1;pointer-events:none;
}
.header-main{display:flex;align-items:center;justify-content:center;gap:12px}
.header-logo-wrap{
  background:#f4f1ea;border-radius:10px;padding:4px 7px;
  display:flex;align-items:center;flex-shrink:0;
}
.header-logo{
  height:50px;width:auto;max-width:80px;display:block;
}
.header-main .header-title{text-align:left}
#app{max-width:640px;margin:0 auto;padding-bottom:24px}
.header{background:linear-gradient(135deg,#082008,#0f3a0f,#082008);padding:14px 16px 10px;text-align:center;border-bottom:2px solid #1a5e1a;position:sticky;top:0;z-index:100}
.header-sub{font-size:9px;letter-spacing:5px;color:#3dbb3d;margin-bottom:3px}
.header-title{font-size:clamp(16px,5vw,24px);font-weight:bold;color:#fff;letter-spacing:2px}
.header-meta{font-size:10px;color:#8a9a88;margin-top:5px;display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap}
.rbtn{background:#0f3a0f;border:1px solid #1a5e1a;color:#3dbb3d;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:10px;font-family:Georgia,serif}
.rbtn:active{background:#1a5e1a}
.live-dot{width:7px;height:7px;background:#ff4444;border-radius:50%;display:inline-block;animation:blink 1.2s infinite}
.fav-dot{width:7px;height:7px;background:#f0c040;border-radius:50%;display:inline-block;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.src-bar{font-size:9px;text-align:center;padding:5px 12px;border-bottom:1px solid #0f0f0f;letter-spacing:1px}
.src-bar.espn{background:#0a1a0a;color:#3dbb3d}
.src-bar.sdb{background:#0a0a1a;color:#4d9dbb}
.src-bar.local{background:#1a0a0a;color:#f87171}
.src-bar.loading{background:#0a0a0a;color:#7a8a78}
.tz-bar{font-size:9px;text-align:center;padding:4px;background:#050805;color:#677a67;border-bottom:1px solid #0a0a0a}
.tabs{display:flex;background:#1c2c1e;border-bottom:1px solid #111;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:1;padding:11px 3px;background:transparent;color:#7a8a78;border:none;cursor:pointer;font-size:10px;font-family:Georgia,serif;white-space:nowrap;border-bottom:2px solid transparent}
.tab.active{background:#0f3a0f;color:#3dbb3d;font-weight:bold;border-bottom:2px solid #1a5e1a}
.tab.ft.active{background:#1a1500;color:#f0c040;border-bottom-color:#f0c040}
.body{padding:12px}
.lbl{font-size:9px;letter-spacing:2px;font-weight:bold;margin-bottom:8px;color:#1a5e1a}
.lbl.mt{margin-top:16px}
.glbl{font-size:9px;letter-spacing:2px;font-weight:bold;margin:10px 0 6px}
/* CARDS */
.card{border-radius:7px;padding:10px 13px;margin-bottom:6px;border:1px solid #111;border-left:3px solid #222;background:#1a2c1c;position:relative}
.card.clive{background:#081808;border-color:#1a5e1a;border-left-color:#3dbb3d}
.card.cfav{border-color:#2a2000;border-left-color:#f0c040;background:#241c10}
.card.cfavlive{background:#0d0c02;border-color:#3a3000;border-left-color:#f0c040}
.cbadge{font-size:9px;font-weight:bold;letter-spacing:1px;margin-bottom:5px}
.cbadge.live{color:#ff4444}
.cbadge.favlive{color:#f0c040}
.cbadge.soon{color:#8c9a8a}
.crow{display:flex;justify-content:space-between;align-items:center}
.cteam{flex:1;font-size:clamp(11px,2.8vw,13px)}
.cteam.win{color:#ddd;font-weight:bold}.cteam.lose{color:#888}.cteam.r{text-align:right}
.cscore{font-weight:bold;padding:3px 10px;background:#162515;border-radius:5px;letter-spacing:2px;margin:0 8px;min-width:54px;text-align:center}
.cscore.done{color:#f0c040;font-size:clamp(15px,4vw,20px)}
.cscore.alive{color:#ff6644;font-size:clamp(15px,4vw,20px)}
.cscore.favalive{color:#f0c040;font-size:clamp(15px,4vw,20px)}
.cscore.vs{color:#2a2a2a;font-size:13px}
.cfoot{font-size:9px;margin-top:4px;display:flex;justify-content:space-between;align-items:center}
.ministar{display:inline-block;cursor:pointer;font-size:11px;opacity:.25;transition:opacity .15s;padding:0 2px}
.ministar.on{opacity:1}
.ministar:active{transform:scale(1.3)}
/* LIVE EVENTS */
.evbox{margin-top:8px;border-top:1px solid #0f180f;padding-top:8px}
.evtitle{font-size:9px;color:#1a5e1a;letter-spacing:2px;margin-bottom:6px;font-weight:bold}
.evrow{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;padding:4px 6px;border-radius:5px}
.evrow-goal{background:#1a1500;border:1px solid #4a3a00}
.evrow-goal .evtxt{color:#f0c040;font-weight:bold}
.evmin{color:#f0c040;font-weight:bold;min-width:26px;font-size:10px;padding-top:1px}
.evico{min-width:16px;font-size:12px}
.evtxt{font-size:11px;color:#bbb;line-height:1.4}
.evsub{font-size:9px;color:#7a8a78;margin-top:1px}
.evnone{font-size:10px;color:#5a6a58;font-style:italic;text-align:center;padding:8px 0}
/* ESCALAÇÃO / CAMPO */
.lineup-box{margin-top:10px;border-top:1px solid #0f180f;padding-top:10px}
.lineup-theme{text-align:center;font-size:22px;letter-spacing:10px}
.pitch-wrap{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.pitch-half{background:linear-gradient(180deg,#0d2a10,#0a210c);border:1px solid #1a3a1c;border-radius:8px;padding:10px 6px}
.pitch-label{font-size:9px;letter-spacing:1.5px;font-weight:bold;text-align:center;margin-bottom:8px}
.pitch-rows{display:flex;flex-direction:column;gap:10px}
.pitch-row{display:flex;justify-content:space-around;align-items:center}
.pitch-player{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0}
.pitch-dot{width:10px;height:10px;border-radius:50%;background:#fff;border:1.5px solid #166534}
.pitch-name{font-size:7.5px;color:#cde;white-space:nowrap;max-width:54px;overflow:hidden;text-overflow:ellipsis}
.pitch-empty{font-size:10px;color:#5a6a58;text-align:center;padding:10px 0;font-style:italic}
/* ESTATÍSTICAS DO JOGO */
.stats-box{margin-top:10px;border-top:1px solid #0f180f;padding-top:10px}
.stat-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:5px 0;font-size:11px}
.stat-val{font-weight:bold;color:#f2ecd8}
.stat-left{text-align:right}
.stat-right{text-align:left}
.stat-label{font-size:9px;color:#7a8a78;text-align:center;letter-spacing:.5px;white-space:nowrap}
.poss-bar{height:5px;background:#1a2a1c;border-radius:3px;overflow:hidden;margin:2px 0 8px}
.poss-bar-fill{height:100%;background:#3dbb3d}
/* TEASER no cartão pequeno, aponta para a tab Minuto a Minuto */
.cteaser{font-size:10px;color:#3dbb3d;text-align:center;margin-top:6px;padding-top:6px;border-top:1px solid #131e14;cursor:pointer;letter-spacing:.5px}
.cteaser:active{opacity:.6}
/* CARTÃO GRANDE — tab Minuto a Minuto */
.minuto-card{background:#1a2c1c;border:1px solid #1a2a1c;border-radius:10px;margin-bottom:14px;overflow:hidden}
.minuto-card.minuto-fav{border-color:#3a3000}
.minuto-head{padding:12px 14px;background:#162515}
.minuto-teams{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:14px;font-weight:bold;color:#f2ecd8}
.minuto-favteam{color:#f0c040}
.minuto-score{font-size:20px;font-weight:bold;color:#f0c040;background:#070c07;border-radius:6px;padding:3px 14px;letter-spacing:2px;flex-shrink:0}
.minuto-meta{font-size:10px;color:#7a8a78;margin-top:6px;display:flex;align-items:center;gap:6px}
.minuto-card .evbox{padding:0 14px 12px;border-top:none;margin-top:0}
.minuto-card .evtitle{padding-top:10px}
/* FAVORITES */
.favsec{background:#221c0e;border:1px solid #2a2000;border-radius:8px;padding:12px;margin-bottom:12px}
.favtitle{font-size:9px;color:#b8860b;letter-spacing:3px;font-weight:bold;margin-bottom:10px}
.favchips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.chip{display:inline-flex;align-items:center;gap:4px;background:#111;border:1px solid #2a2000;border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;color:#f0c040}
.chip .x{color:#8a9a88;font-size:10px}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:6px}
.tbtn{background:#1c2c1e;border:1px solid #111;border-radius:5px;padding:5px 3px;font-size:10px;cursor:pointer;text-align:center;color:#8a9a88;font-family:Georgia,serif}
.tbtn.on{background:#1a1200;border-color:#f0c040;color:#f0c040}
.tgridlbl{font-size:9px;color:#677a67;letter-spacing:1px;margin-top:8px;margin-bottom:4px}
.falert{background:linear-gradient(135deg,#1a1200,#2a1e00);border:1px solid #f0c040;border-radius:8px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.falert-ico{font-size:20px}
.falert-t{font-size:12px;color:#f0c040;font-weight:bold}
.falert-s{font-size:10px;color:#888;margin-top:2px}
/* GROUP TABLE */
.gbtns{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;justify-content:center}
.gbtn{padding:5px 10px;border-radius:4px;cursor:pointer;font-weight:bold;font-family:Georgia,serif;font-size:12px;border:1px solid #1a1a1a;background:#0c100c;color:#7a8a78}
.gbtn.on{color:#fff}
.twrap{border-radius:8px;overflow:hidden;margin-bottom:10px;border:1px solid #111;border-top:3px solid var(--gc)}
.thead2{padding:8px 12px;background:#050905;font-size:9px;letter-spacing:3px;font-weight:bold;border-bottom:1px solid #0e0e0e;color:var(--gc)}
table{width:100%;border-collapse:collapse;background:#070c07}
th{padding:6px 5px;font-size:8px;color:#1e3a1e;letter-spacing:1px;border-bottom:1px solid #0c0c0c;font-family:Georgia,serif;font-weight:normal;text-align:center}
th.tl{text-align:left}
tbody tr{border-bottom:1px solid #0b0b0b}
tbody tr.q{background:rgba(26,94,26,.13)}
td{padding:8px 5px;font-size:11px;text-align:center}
td.tl{text-align:left}
td.pts{font-weight:bold;color:#f0c040;font-size:13px}
td.pos{color:#4ade80;font-weight:bold}td.neg{color:#f87171;font-weight:bold}td.zer{color:#7a8a78}
/* UPCOMING */
.uc{background:#1c2c1e;border:1px solid #111;border-left:3px solid #222;border-radius:7px;padding:10px 13px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.uc.fav{background:#221c0e;border-color:#2a2000;border-left-color:#f0c040}
.uch{font-size:12px;font-weight:bold}
.uca{font-size:11px;color:#7a8a78;margin-top:1px}
.uc-fav-team{color:#f0c040!important;font-weight:bold}
.uct{font-size:12px;color:#f0c040;font-weight:bold;text-align:right}
.ucm{font-size:9px;margin-top:2px;text-align:right}
/* BRACKET */
.bracket{padding:4px 0}
.bround{margin-bottom:22px}
.brnd-title{font-size:9px;color:#b8860b;letter-spacing:3px;font-weight:bold;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #1a1500}
.bmatch{background:#1d2e1f;border:1px solid #141a14;border-radius:6px;padding:9px 12px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.bmatch.done{border-left:3px solid #166534}
.bmatch.live-b{border-left:3px solid #ff4444;background:#0a1008}
.bmatch.tbd{opacity:.5}
.bteams{flex:1}
.bt1{font-size:12px;font-weight:bold;color:#ccc}
.bt2{font-size:12px;color:#8c9a8a;margin-top:3px}
.bscore{font-size:16px;font-weight:bold;color:#f0c040;padding:2px 10px;background:#182818;border-radius:4px;letter-spacing:2px;text-align:center;min-width:50px}
.bscore.tbd-s{color:#5a6a58;font-size:12px}
.bscore.live-sc{color:#ff6644}
.binfo{font-size:9px;color:#677a67;margin-top:2px}

/* ── CHAVE VISUAL — caixa de confronto, time de cada lado ──────────────────── */
.bbox{border-radius:10px;overflow:hidden;margin-bottom:6px;background:linear-gradient(160deg,#1f2f21,#182818);border:1px solid #28401f}
.bbox.bbox-live{border-color:#3dbb3d}
.bbox.bbox-done{border-color:#1a3320}
.bbox.bbox-tbd{opacity:.55}
.bbox.bbox-scheduled{opacity:1}
.bbox-head{padding:4px 10px;font-size:8px;letter-spacing:1.5px;color:#557;background:#162515;border-bottom:1px solid #0e140e;display:flex;justify-content:space-between}
.bbox-head.head-live{color:#ff5544}
.bbox-head.head-done{color:#3dbb3d}
.bbox-body{display:flex;align-items:stretch}
.bbox-team{flex:1;display:flex;align-items:center;gap:5px;padding:11px 8px;font-size:12.5px;min-width:0;line-height:1.25;color:#fff}
.bbox-team.bbox-right{flex-direction:row-reverse;text-align:right;justify-content:flex-start}
.bbox-team .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bbox-team.winner{font-weight:bold;color:#fff}
.bbox-team.loser{color:#fff}
.bbox-check{color:#3dbb3d;font-size:11px;flex-shrink:0}
.tcode{background:#0a120a;color:#b8860b;font-size:9px;font-weight:bold;letter-spacing:1px;padding:2px 5px;border-radius:4px;flex-shrink:0}
.bbox-mid{display:flex;align-items:center;padding:0 8px;flex-shrink:0;background:#0a120a;border-radius:6px;margin:8px 4px}
.bbox-score{font-size:16px;font-weight:bold;color:#f0c040;letter-spacing:1px;min-width:42px;text-align:center}
.bbox-score.live{color:#ff6644}
.bbox-score.tbd{color:#5e7a5c;font-size:11px;letter-spacing:0}
.bconnector{display:flex;justify-content:center;position:relative;height:16px;margin:-2px 0 4px}
.bconnector::before{content:"";position:absolute;top:0;bottom:0;left:50%;width:1px;background:#162616}
.bconnector span{position:relative;background:#040804;color:#2a4022;font-size:7px;letter-spacing:1.5px;padding:0 8px;align-self:center}
.bremain{font-size:10px;color:#5e7a5c;text-align:center;padding:8px 0 2px}
/* FUNIL entre fases — reforça o afunilamento sem fingir ligações exatas */
.bfunnel{position:relative;height:34px;margin:2px 0 16px;display:flex;align-items:center;justify-content:center}
.bfunnel-tri{width:0;height:0;border-left:55px solid transparent;border-right:55px solid transparent;border-top:16px solid #1a2a1c}
.bfunnel-label{position:absolute;background:#0a120a;padding:3px 10px;font-size:8px;letter-spacing:1.5px;color:#b8860b;border:1px solid #2a2000;border-radius:10px;white-space:nowrap}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#040804}
::-webkit-scrollbar-thumb{background:#1a2a1a;border-radius:2px}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="bg-overlay"></div>
<div id="app">
  <div class="header">
    <div class="header-sub">COPA DO MUNDO FIFA 2026</div>
    <div class="header-main">
      <div class="header-logo-wrap"><img id="logoImg" alt="" class="header-logo" onerror="this.parentElement.style.display='none'"/></div>
      <div class="header-title">⚽WORLD CUP TRACKER⚽</div>
    </div>
    <div class="header-meta">
      <span id="li"></span>
      <span id="ts">Carregando...</span>
      <button class="rbtn" onclick="doRefresh()">↺ Refresh</button>
    </div>
  </div>
  <div id="srcbar" class="src-bar loading">⟳ Conectando...</div>
  <div id="tzbar" class="tz-bar">🕐 Detectando fuso...</div>
  <div class="tabs">
    <button class="tab minuto-tab active" onclick="setTab('minuto',this)">🔴 Ao Vivo</button>
    <button class="tab"       onclick="setTab('hoje',this)">📆 Hoje</button>
    <button class="tab"       onclick="setTab('prox',this)">📅 Próximos</button>
    <button class="tab"       onclick="setTab('result',this)">✅ Resultados</button>
    <button class="tab"       onclick="setTab('grupos',this)">🏟 Grupos</button>
    <button class="tab"       onclick="setTab('mm',this)">🏆 Mata-Mata</button>
    <button class="tab"       onclick="setTab('sim',this)">🔮 Simulação</button>
    <button class="tab ft"    onclick="setTab('favs',this)">⭐ Favoritos</button>
  </div>
  <div class="body"><div id="content"></div></div>
  <div style="text-align:center;padding:18px 12px 8px;font-size:9px;color:#5a6a58;letter-spacing:1px">
    ⚽ Copa 2026 Tracker · Criado por <span style="color:#3a5a3a">Thiago Bartulihe</span>
  </div>
</div>
<script>
// ── ASSETS PERSONALIZÁVEIS (logo/fundo) — sempre buscados frescos ────────────
// Cache-buster garante que o browser nunca reutiliza uma versão antiga ou
// um 404 de antes de teres feito upload destes ficheiros.
(function(){
  const v = Date.now();
  document.getElementById("logoImg").src = `./logo.png?v=${v}`;
  const bgLayer = document.querySelector(".bg-layer");
  if (bgLayer) bgLayer.style.backgroundImage = `url('./background.jpg?v=${v}')`;
})();

// ── TIMEZONE ──────────────────────────────────────────────────────────────────
const userTZ=Intl.DateTimeFormat().resolvedOptions().timeZone;
const TZ_NAMES={"America/Sao_Paulo":"Brasil · Brasília","America/Manaus":"Brasil · Manaus","Europe/Lisbon":"Portugal · Lisboa","Europe/London":"UK · Londres","America/New_York":"EUA · Leste","America/Los_Angeles":"EUA · Pacífico","America/Argentina/Buenos_Aires":"Argentina","Europe/Madrid":"Espanha"};
document.getElementById("tzbar").textContent=`🕐 Horários em: ${TZ_NAMES[userTZ]||userTZ}`;
function brOff(){const d=new Date(),b=new Date(d.toLocaleString("en-US",{timeZone:"America/Sao_Paulo"})),u=new Date(d.toLocaleString("en-US",{timeZone:"UTC"}));return(b-u)/3600000;}
function localTime(brTime,brDate){
  try{const h=parseInt(brTime),[day,mon]=brDate.split("/").map(Number),diff=-(new Date().getTimezoneOffset()/60)-brOff();
  let nh=h+diff,ds=0;if(nh>=24){nh-=24;ds=1;}if(nh<0){nh+=24;ds=-1;}
  const nd=new Date(2026,mon-1,day+ds),p=n=>String(n).padStart(2,"0");
  return{time:`${p(nh)}h`,date:`${p(nd.getDate())}/${p(nd.getMonth()+1)}`};}
  catch(e){return{time:brTime,date:brDate};}
}

// ── CORES ──────────────────────────────────────────────────────────────────────
const GC={A:"#7c2d12",B:"#1e3a8a",C:"#166534",D:"#4a1d96",E:"#713f12",F:"#134e4a",G:"#1e1b4b",H:"#7f1d1d",I:"#14532d",J:"#3b0764",K:"#0c4a6e",L:"#1c1917"};
const AT={
  A:["México 🇲🇽","Coreia do Sul 🇰🇷","Rep. Tcheca 🇨🇿","África do Sul 🇿🇦"],
  B:["Canadá 🇨🇦","Bósnia 🇧🇦","Qatar 🇶🇦","Suíça 🇨🇭"],
  C:["Brasil 🇧🇷","Marrocos 🇲🇦","Escócia 🏴󠁧󠁢󠁳󠁣󠁴󠁿","Haiti 🇭🇹"],

function groupOf(teamName){
  const k=(teamName||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z0-9]/g,"").toLowerCase();
  return TEAM_GROUP[k]||"?";
}

// tkey: extrai só letras/números para comparação — resolve emojis complexos
function tkey(s){
  return (s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-zA-Z0-9]/g,"").toLowerCase();
}
const DEFAULT_FAVS=["Brasil 🇧🇷","Croácia 🇭🇷"];
let FAVS=[...DEFAULT_FAVS];

function loadFavs(){
  try{
    const raw=JSON.parse(localStorage.getItem("copa_favs")||"null");
    if(!Array.isArray(raw)){FAVS=[...DEFAULT_FAVS];return;}
    // Deduplica hard — remove qualquer duplicado por tkey
    const seen=new Set();
    FAVS=raw.filter(f=>{
      if(!f||typeof f!=="string")return false;
      const k=tkey(f);
      if(!k||seen.has(k))return false;
      seen.add(k);return true;
    });
    if(FAVS.length===0)FAVS=[...DEFAULT_FAVS];
  }catch(e){FAVS=[...DEFAULT_FAVS];}
  saveFavs();
}
function saveFavs(){try{localStorage.setItem("copa_favs",JSON.stringify(FAVS));}catch(e){}}
function clearFavs(){FAVS=[];saveFavs();render();}
function isFav(name){const k=tkey(name);return FAVS.some(f=>tkey(f)===k);}
function toggleFav(name){
  const k=tkey(name);
  const idx=FAVS.findIndex(f=>tkey(f)===k);
  if(idx>=0)FAVS.splice(idx,1);
  else FAVS.push(name);
  // Garante sem duplicados
  const seen=new Set();
  FAVS=FAVS.filter(f=>{const fk=tkey(f);if(seen.has(fk))return false;seen.add(fk);return true;});
  saveFavs();render();
  if(PUSH_STATUS==="subscribed") resyncPushFavorites(); // mantém o Cloudflare atualizado, sem pedir nada
}

function urlBase64ToUint8Array(base64String){
  const padding="=".repeat((4-base64String.length%4)%4);
  const base64=(base64String+padding).replace(/-/g,"+").replace(/_/g,"/");
  const rawData=atob(base64);
  const out=new Uint8Array(rawData.length);
  for(let i=0;i<rawData.length;++i) out[i]=rawData.charCodeAt(i);
  return out;
}

async function enablePush(){

// Rede de segurança genérica — junta entradas que são claramente o mesmo jogo
// (mesma fase, nomes que se sobrepõem em qualquer ordem), mesmo que tenham
// chegado com pequenas variações de grafia ou casa/fora trocados.
function dedupeRES(){
  const kept=[];
  const meta=[];
  RES.forEach(r=>{
    const k1=tkey(r.home), k2=tkey(r.away);
    const dupIdx=meta.findIndex(s=>{
      // só rejeita por grupo diferente se AMBOS já tiverem grupo resolvido
      if(s.g!=="?" && r.g!=="?" && s.g!==r.g) return false;
      const direct=(s.k1===k1&&s.k2===k2)||(s.k1===k2&&s.k2===k1);
      const overlapA=(s.k1.includes(k1)||k1.includes(s.k1))&&(s.k2.includes(k2)||k2.includes(s.k2));
      const overlapB=(s.k1.includes(k2)||k2.includes(s.k1))&&(s.k2.includes(k1)||k1.includes(s.k2));
      return direct||overlapA||overlapB;
    });
    if(dupIdx===-1){
      meta.push({k1,k2,g:r.g});
      kept.push(r);
    } else {
      // Mantém a versão mais completa — a que já tem placar/resultado ganha
      const existing=kept[dupIdx];
      if(existing.g==="?" && r.g!=="?") existing.g=r.g; // aproveita o grupo resolvido
      if((r.done&&!existing.done)||(r.sh!==null&&existing.sh===null)){
        Object.assign(existing,r);
      }
    }
  });
  RES=kept;
}

function mergeResultsJSON(json){
  if(Array.isArray(json.knockout)) KO_MATCHES=json.knockout;
  const incoming=json.matches||[];
  let updated=0;
  incoming.forEach(m=>{
    let g=groupOf(m.home);
    if(g==="?") g=groupOf(m.away); // segunda tentativa — o adversário pode resolver
    let existing=RES.find(r=>tkey(r.home)===tkey(m.home)&&tkey(r.away)===tkey(m.away));
    let reversed=false;
    if(!existing){
      // a ESPN pode devolver casa/fora trocados num dia diferente — tenta ao contrário
      existing=RES.find(r=>tkey(r.home)===tkey(m.away)&&tkey(r.away)===tkey(m.home));
      if(existing) reversed=true;
    }
    if(existing){
      // Preserva nota escrita à mão se a automática não tiver uma melhor
      const keepNote=existing.note;
      Object.assign(existing,{
        date:m.date||existing.date, brTime:m.brTime||existing.brTime,
        venue:m.venue||existing.venue,
        sh: reversed?m.sa:m.sh, sa: reversed?m.sh:m.sa,
        done:m.done, live:m.live, clock:m.clock||"",
      });
      if(m.events&&m.events.length) existing.events=m.events;
      if(m.lineups) existing.lineups = reversed ? {home:m.lineups.away, away:m.lineups.home} : m.lineups;
      if(m.stats) existing.stats = reversed ? {home:m.stats.away, away:m.stats.home} : m.stats;
      if(!existing.note && keepNote) existing.note=keepNote;
      updated++;
    } else {
      // Nunca descarta — mesmo sem grupo resolvido, fica visível por data
      RES.push({
        g:g, home:m.home, away:m.away, date:m.date, brTime:m.brTime, venue:m.venue,
        sh:m.sh, sa:m.sa, done:m.done, live:m.live, clock:m.clock||"", events:m.events||[],
        lineups:m.lineups||undefined, stats:m.stats||undefined
      });
      updated++;
    }
  });
  // Restaura notas históricas direto da fonte original, sempre — mais
  // robusto do que depender só da cadeia de merge para preservar isto
  // (se o nome mudar ligeiramente, o merge normal pode falhar a comparação
  // e criar uma entrada nova sem a nota original)
  FALLBACK_RES.forEach(fb=>{
    if(!fb.note) return;
    const match=RES.find(r=>tkey(r.home)===tkey(fb.home)&&tkey(r.away)===tkey(fb.away));
    if(match && !match.note) match.note=fb.note;
  });
  dedupeRES();
  return updated;

function getDateStr(daysAgo){

  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;

function applyESPNData(data){
  let count=0;
  (data.events||[]).forEach(ev=>{
    const comp=ev.competitions?.[0];
    const h=comp?.competitors?.find(c=>c.homeAway==="home");
    const a=comp?.competitors?.find(c=>c.homeAway==="away");
    if(!h||!a)return;
    const state=ev.status?.type?.state;
    const hs=parseInt(h.score)||0,as=parseInt(a.score)||0;
    const clock=ev.status?.displayClock||"";
    const hName=mapTeam(h.team?.displayName||"");
    const aName=mapTeam(a.team?.displayName||"");
    RES.forEach(r=>{
      if(r.home!==hName||r.away!==aName)return;
      if(state==="post"){r.sh=hs;r.sa=as;r.done=true;r.live=false;r.clock="";count++;}
      else if(state==="in"){r.sh=hs;r.sa=as;r.live=true;r.clock=clock;
        fetchEventDetails(ev.id,h.team?.displayName,a.team?.displayName);}
    });
  });
  return count;
}

// Palavras que indicam eventos irrelevantes — filtrar fora
// Filtra só ruído puramente administrativo — cobertura completa do resto
// Confirmado por teste real — ESPN não regista cantos/faltas/remates para
// este tipo de jogo. Mostra tudo o que existe: kickoff, intervalo,
// paralisações, gols, substituições.
const SKIP_WORDS=["weather","attendance","var check concluded"];
function isRelevantEvent(p){
  const txt=(p.text||p.shortText||"").toLowerCase();
  if(SKIP_WORDS.some(w=>txt.includes(w)))return false;
  return true;
}

function getIcon(p){
  const typ=(p.type?.text||p.type?.id||"").toLowerCase();
  const txt=(p.text||"").toLowerCase();
  if(typ.includes("goal")) return typ.includes("own")||txt.includes("(og)")?"⚽ OG":"⚽";
  if(typ.includes("yellow red")||typ.includes("second yellow"))return"🟥";
  if(typ.includes("yellow"))return"🟨";
  if(typ.includes("red"))return"🟥";
  if(typ.includes("sub"))return"🔄";
  if(typ.includes("penalty"))return"⚽🎯";
  if(typ.includes("start delay"))return txt.includes("injury")?"🩹":"⏸️";
  if(typ.includes("end delay"))return"▶️";
  if(typ.includes("halftime"))return"⏱️";
  if(typ.includes("start 2nd half"))return"▶️";
  if(typ.includes("kickoff"))return"🏁";
  if(typ.includes("corner"))return"🚩";
  if(typ.includes("offside"))return"🚫";
  if(typ.includes("foul"))return"⚠️";
  if(typ.includes("var"))return"📺";
  if(typ.includes("injury"))return"🩹";
  if(typ.includes("free kick"))return"🥅";
  if(typ.includes("save")||txt.includes("saved"))return"🧤";
  if(typ.includes("block")||txt.includes("blocked"))return"🛡️";
  if(typ.includes("shot")||txt.includes("shot")||txt.includes("attempt"))return"🎯";
  return"•";
}

async function fetchEventDetails(evId,hName,aName){
  try{
    const r=await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${evId}`,{cache:"no-cache"});
    if(!r.ok)return;
    const data=await r.json();
    // ESPN pode devolver em plays ou keyEvents
    const plays=[...(data.keyEvents||[]),(data.plays||[])].flat();
    const events=plays.length?plays
      .filter(isRelevantEvent)
      .map(p=>{
        const icon=getIcon(p);
        if(!icon)return null;
        const min=p.clock?.displayValue||p.period?.clock||"";
        const txt=describeEventPT(icon,p.participants?.[0]?.athlete?.displayName);
        const sub=teamFlag(mapTeam(p.team?.displayName||""));
        return{min,icon,txt,sub};
      })
      .filter(Boolean)
      .reverse():null; // mais recente primeiro

    // Escalação confirmada via teste real — vem em data.rosters
    const lineups=extractLineups(data);
    // Estatísticas do jogo — confirmado via teste real em data.boxscore
    const stats=extractBoxscoreStats(data);

    if(!events?.length && !lineups && !stats) return;

    RES.forEach(r=>{
      if(!r.live)return;
      const hk=tkey(hName).slice(0,5),ak=tkey(aName).slice(0,5);
      if(tkey(r.home).includes(hk)||tkey(r.away).includes(ak)){
        if(events?.length) r.events=events;
        if(lineups) r.lineups=lineups;
        if(stats) r.stats=stats;
      }
    });
    render();
  }catch(e){}
}

// Agrupa por linha no campo, usando a posição real da ESPN
function positionRow(abbr){
  const a=(abbr||"").toUpperCase();
  if(a==="G"||a==="GK") return 0;
  if(a==="D"||a.startsWith("CD")||a==="LB"||a==="RB"||a.startsWith("WB")||a.includes("CB")) return 1;
  if(a==="M"||a.startsWith("DM")||a.startsWith("CM")||a.startsWith("LM")||a.startsWith("RM")) return 2;
  if(a.startsWith("AM")) return 2.5;
  return 3;
}
function extractBoxscoreStats(data){
  const teams=data.boxscore?.teams;
  if(!Array.isArray(teams)||teams.length<2) return null;
  function parseSide(t){
    if(!Array.isArray(t?.statistics)) return null;
    const stats={};
    t.statistics.forEach(s=>{ stats[s.name]=s.displayValue; });
    return stats;
  }
  const home=parseSide(teams.find(t=>t.homeAway==="home"));
  const away=parseSide(teams.find(t=>t.homeAway==="away"));
  if(!home&&!away) return null;
  return{home,away};
}
function colorLuminance(hex){
  if(!hex||hex.length<6) return 999;
  const r=parseInt(hex.slice(0,2),16), g=parseInt(hex.slice(2,4),16), b=parseInt(hex.slice(4,6),16);
  if(isNaN(r)||isNaN(g)||isNaN(b)) return 999;
  return 0.299*r+0.587*g+0.114*b;
}
function pickVisibleColor(color,alternateColor){
  if(color&&colorLuminance(color)<200) return "#"+color;
  if(alternateColor) return "#"+alternateColor;
  return color?"#"+color:null;
}
function extractLineups(data){
  const src=data.rosters;
  if(!Array.isArray(src)||src.length<2) return null;
  function parseSide(side){
    if(!side?.roster?.length) return null;
    const toPlayer=p=>({
      name:p.athlete?.displayName||p.athlete?.shortName||"?",
      pos:p.position?.abbreviation||"",
      row:positionRow(p.position?.abbreviation),
    });
    const starters=side.roster.filter(p=>p.starter).map(toPlayer).sort((a,b)=>a.row-b.row);
    const subs=side.roster.filter(p=>!p.starter).map(toPlayer);
    if(!starters.length) return null;
    const dotColor=pickVisibleColor(side.team?.color,side.team?.alternateColor);
    return{starters,subs,formation:side.formation||null,dotColor};
  }
  const home=parseSide(src.find(r=>r.homeAway==="home"));
  const away=parseSide(src.find(r=>r.homeAway==="away"));
  if(!home&&!away) return null;
  return{home,away};
}

async function fetchSDB(){
  const r=await fetch("https://www.thesportsdb.com/api/v1/json/3/eventsseason.php?id=4480&s=2026",{cache:"no-cache"});
  if(!r.ok)throw new Error("sdb");
  const data=await r.json();let c=0;

    });

}

// Salvaguarda: jogos de dias anteriores nunca ficam presos como "live",
// e jogos agendados cuja data já passou sem resultado ficam marcados como
// "pending" — para a UI avisar em vez de mostrar como se fosse futuro.
function autoExpireLiveGames(){
  const today=new Date();
  const todayStr=`${String(today.getDate()).padStart(2,"0")}/${String(today.getMonth()+1).padStart(2,"0")}`;
  const todayKey=dateSortKey(todayStr);
  RES.forEach(r=>{
    if(r.live){
      if(r.date && r.date!==todayStr){
        r.live=false;
        if(!r.done){ r.done=true; r.note=(r.note||"")+" · resultado a atualizar"; }
      }
      return;
    }
    if(!r.done && r.date && dateSortKey(r.date)<todayKey){
      r.pending=true;
    } else {
      r.pending=false;
    }
  });
}

// ── CLASSIFICAÇÃO ──────────────────────────────────────────────────────────────
function calcS(g){
  const teams={};
  (AT[g]||[]).forEach(t=>{teams[t]={t,pts:0,j:0,gf:0,gc:0,dif:0};});
  RES.filter(r=>r.g===g&&r.done&&r.sh!==null).forEach(r=>{
    if(!teams[r.home])teams[r.home]={t:r.home,pts:0,j:0,gf:0,gc:0,dif:0};
    if(!teams[r.away])teams[r.away]={t:r.away,pts:0,j:0,gf:0,gc:0,dif:0};
    teams[r.home].j++;teams[r.away].j++;
    teams[r.home].gf+=r.sh;teams[r.home].gc+=r.sa;
    teams[r.away].gf+=r.sa;teams[r.away].gc+=r.sh;
    if(r.sh>r.sa)teams[r.home].pts+=3;else if(r.sh<r.sa)teams[r.away].pts+=3;else{teams[r.home].pts++;teams[r.away].pts++;}
  });
  Object.values(teams).forEach(t=>{t.dif=t.gf-t.gc;});
  return Object.values(teams).sort((a,b)=>b.pts-a.pts||b.dif-a.dif||b.gf-a.gf);
}

// Data dinâmica — nunca mais hardcoded
function todayStr(){
  const d=new Date();
  return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;
}
function yesterdayStr(){
  const d=new Date();d.setDate(d.getDate()-1);
  return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;
}

function bHoje(){
  const today=todayStr(), yest=yesterdayStr();
  const real=RES.filter(r=>r._demoIdx===undefined); // a demonstração não entra aqui
  const live=real.filter(r=>r.live);
  const tDone=real.filter(r=>r.date===today&&r.done);
  const tNext=real.filter(r=>r.date===today&&!r.done&&!r.live);
  const yestGames=real.filter(r=>r.date===yest&&r.done);

  // Mata-mata também conta como "hoje"/"ontem" — sem isto, um confronto
  // agendado para hoje (ex: avos) não aparecia em lado nenhum desta tab,
  // mesmo já aparecendo certo em Próximos/Mata-Mata
  const ko=KO_MATCHES||[];
  const koLive=ko.filter(k=>k.live);
  const koTDone=ko.filter(k=>k.date===today&&k.done);
  const koTNext=ko.filter(k=>k.date===today&&!k.done&&!k.live);
  const koYest=ko.filter(k=>k.date===yest&&k.done);

  let h="";
  if(live.length||koLive.length){
    h+=lbl("🔴 AO VIVO AGORA");
    live.forEach(r=>{h+=card(r,true);});
    koLive.forEach(k=>{h+=bracketBox(k.home,k.away,k.sh,k.sa,"live",`🔴 AO VIVO · ${k.clock||""}'`,isFav(k.home),isFav(k.away));});
  }
  if(tDone.length||koTDone.length){
    h+=lbl(`✅ HOJE ENCERRADOS — ${today}`,true);
    tDone.forEach(r=>{h+=card(r);});
    koTDone.forEach(k=>{h+=bracketBox(k.home,k.away,k.sh,k.sa,"done",`✅ ${k.round||""}`,isFav(k.home),isFav(k.away));});
  }
  if(tNext.length||koTNext.length){
    h+=lbl(`⏰ MAIS TARDE HOJE — ${today}`,true);
    tNext.forEach(r=>{h+=card(r,false,true);});
    koTNext.forEach(k=>{h+=bracketBox(k.home,k.away,k.sh,k.sa,"scheduled",`⏰ ${k.brTime||""} · ${k.venue||""}`,isFav(k.home),isFav(k.away));});
  }
  if(!live.length&&!tDone.length&&!tNext.length&&!koLive.length&&!koTDone.length&&!koTNext.length){
    h+=`<div style="background:#1d2e1f;border:1px solid #111;border-radius:7px;padding:16px;text-align:center;color:#677a67;font-size:12px;margin-bottom:12px">
      Sem jogos hoje (${today})<br><span style="font-size:10px;margin-top:4px;display:block">Ver aba 📅 Próximos para os próximos jogos</span></div>`;
  }
  if(yestGames.length||koYest.length){
    h+=lbl(`📋 ONTEM — ${yest}`,true);
    yestGames.forEach(r=>{h+=card(r);});
    koYest.forEach(k=>{h+=bracketBox(k.home,k.away,k.sh,k.sa,"done",`✅ ${k.round||""}`,isFav(k.home),isFav(k.away));});
  }
  return h;
}

// Swipe lateral entre grupos — A↔B↔C...↔L. Os botões continuam a funcionar
// exatamente como antes; isto é só um atalho adicional por gesto.
let _grpSwipeStartX=null;
function grpSwipeStart(e){ _grpSwipeStartX=(e.touches?e.touches[0].clientX:e.clientX); }
function grpSwipeEnd(e){
  if(_grpSwipeStartX===null) return;
  const endX=(e.changedTouches?e.changedTouches[0].clientX:e.clientX);
  const dx=endX-_grpSwipeStartX;
  _grpSwipeStartX=null;
  if(Math.abs(dx)<50) return; // arrasto pequeno demais, ignora (pode ter sido scroll vertical)
  const groups="ABCDEFGHIJKL".split("");
  const idx=groups.indexOf(GRP);
  if(dx<0 && idx<groups.length-1) setGrp(groups[idx+1]);
  else if(dx>0 && idx>0) setGrp(groups[idx-1]);
}

  return `<div ontouchstart="grpSwipeStart(event)" ontouchend="grpSwipeEnd(event)">${h}</div>`;
}

function calcProjection(){
  // Para cada grupo: 1º, 2º, 3º (com dados atuais, mesmo que incompletos)
  const groups="ABCDEFGHIJKL".split("");
  const leaders=[], runners=[], thirds=[];
  groups.forEach(g=>{
    const rows=calcS(g);
    leaders.push({g,...rows[0]});
    runners.push({g,...rows[1]});
    thirds.push({g,...rows[2]});
  });
  // Ranking dos 12 terceiros — mesmo critério: pts, dif, gf
  thirds.sort((a,b)=>b.pts-a.pts||b.dif-a.dif||b.gf-a.gf);
  const bestThirds=thirds.slice(0,8);
  const outThirds=thirds.slice(8);
  return {leaders,runners,bestThirds,outThirds};
}

// Resolve os 32 nomes dos avos usando a projeção atual (líderes, vices,
// melhor terceiro disponível entre os grupos elegíveis de cada vaga)
function buildSimR32(){
  const thirdByGroup={};
  "ABCDEFGHIJKL".split("").forEach(g=>{ thirdByGroup[g]=calcS(g)[2]; });
  const allThirdsRanked=Object.entries(thirdByGroup).map(([g,t])=>({g,...t}))
    .sort((a,b)=>b.pts-a.pts||b.dif-a.dif||b.gf-a.gf);

  // 1º/2º não têm conflito possível — cada um pertence a um grupo único
  const resolved=MM_STRUCTURE.avos.map(m=>({t1:null,t2:null}));
  const thirdSlots=[]; // {idx, slot, groups, label}
  MM_STRUCTURE.avos.forEach((m,i)=>{
    [["t1",m.t1],["t2",m.t2]].forEach(([slot,label])=>{
      if(label.startsWith("1º")) resolved[i][slot]=calcS(label.slice(3,4))[0]?.t||label;
      else if(label.startsWith("2º")) resolved[i][slot]=calcS(label.slice(3,4))[1]?.t||label;
      else if(label.startsWith("3º")) thirdSlots.push({i,slot,groups:label.slice(3).split("/"),label});
    });
  });

  // Para os "melhor 3º" — uma vaga processada antes pode "roubar" um grupo
  // que só uma vaga posterior ainda tinha disponível, deixando-a vazia
  // mesmo havendo resposta certa possível. Backtracking tenta todas as
  // combinações e garante encontrar uma atribuição válida quando existe.
  const candidatesFor=thirdSlots.map(s=>allThirdsRanked.filter(t=>s.groups.includes(t.g)));
  const assignment=new Array(thirdSlots.length).fill(null);
  const usedGroups=new Set();
  function backtrack(idx){
    if(idx===thirdSlots.length) return true;
    for(const cand of candidatesFor[idx]){
      if(usedGroups.has(cand.g)) continue;
      usedGroups.add(cand.g);
      assignment[idx]=cand.t;
      if(backtrack(idx+1)) return true;
      usedGroups.delete(cand.g);
      assignment[idx]=null;
    }
    return false;
  }
  backtrack(0);
  thirdSlots.forEach((s,k)=>{ resolved[s.i][s.slot]=assignment[k]||s.label; });

  return MM_STRUCTURE.avos.map((m,i)=>({ id:"avos-"+i, home:resolved[i].t1, away:resolved[i].t2 }));
}

// Limpa escolhas "órfãs" — se a classificação mudou e o time escolhido já não
// está numa das duas vagas daquele jogo, a escolha (e tudo o que dependia dela)
// é invalidada automaticamente. Corre sempre antes de desenhar a Simulação.
function validateSimPicks(){
  const rounds=["avos","oitavas","quartas","semis","final"];
  let current=buildSimR32();
  let changed=false;
  rounds.forEach(key=>{
    const winners=[];
    current.forEach((m,i)=>{
      const mk=key+"-"+i;
      const pick=SIM_PICKS[mk];
      if(pick && pick!==m.home && pick!==m.away){
        delete SIM_PICKS[mk];
        changed=true;
      }
      winners.push(SIM_PICKS[mk]||null);
    });
    const next=[];
    for(let i=0;i<winners.length;i+=2){
      next.push({home:winners[i]||"⏳ A definir",away:winners[i+1]||"⏳ A definir"});
    }
    current=next;
  });
  if(changed) saveSimPicks();
  return changed;
}

function bSimulacao(){
  const invalidated=validateSimPicks();
  let h=groupStageProgress();
  if(invalidated){
    h+=`<div style="background:#1a1200;border:1px solid #4a3a00;border-radius:7px;padding:10px 14px;margin-bottom:12px;font-size:10px;color:#d4a017">
      ⚠️ A classificação mudou desde a tua última escolha — alguma seleção já não está na mesma vaga. Limpei as escolhas afetadas, refaz a partir daí.
    </div>`;

// ── CAIXA DE CONFRONTO — time de cada lado, vencedor em destaque ─────────────
// A ESPN usa texto em inglês para vagas do mata-mata ainda não decididas
// ("Group H Winner", "Group J 2nd Place", "Third Place Group A/C/D") —
// traduz isso para português, sem tentar resolver o nome real (isso já é
// feito à parte para os avos, via buildSimR32)
function translateBracketPlaceholder(name){
  if(!name) return name;
  let m=name.match(/^Group ([A-L]) Winner$/i);
  if(m) return `Vencedor Grupo ${m[1]}`;
  m=name.match(/^Group ([A-L]) (?:2nd|Runner-?up) ?Place?$/i);
  if(m) return `2º Grupo ${m[1]}`;
  m=name.match(/^(?:3rd|Third) Place Group(?:s)? ([A-L/]+)$/i);
  if(m) return `Melhor 3º (${m[1]})`;
  return name;
}

function bracketBox(homeLabel,awayLabel,sh,sa,status,meta,favHome,favAway){
  homeLabel=translateBracketPlaceholder(homeLabel);
  awayLabel=translateBracketPlaceholder(awayLabel);
  const isDone=status==="done", isLive=status==="live";
  const wh=isDone&&sh>sa, wa=isDone&&sa>sh;
  // Esmaece só quando as PRÓPRIAS equipas ainda não estão definidas — uma
  // seleção real tem sempre bandeira; um placeholder ("Vencedor Grupo H")
  // nunca tem. Um jogo agendado com as duas equipas já confirmadas NÃO
  // deve ficar esmaecido só por ainda não ter sido jogado.
  const hasFlag=n=>/\p{Regional_Indicator}{2}/u.test(n||"")||/\u{1F3F4}/u.test(n||"");
  const teamsResolved=hasFlag(homeLabel)&&hasFlag(awayLabel);
  const scoreCls=isLive?"live":!isDone?"tbd":"";
  const scoreTxt=isDone?`${sh}–${sa}`:isLive?`${sh??0}–${sa??0}`:"vs";
  const headCls=isLive?"head-live":isDone?"head-done":"";
  const boxCls=isLive?"bbox-live":isDone?"bbox-done":teamsResolved?"bbox-scheduled":"bbox-tbd";
  return `<div class="bbox ${boxCls}">
    ${meta?`<div class="bbox-head ${headCls}"><span>${meta}</span></div>`:""}
    <div class="bbox-body">
      <div class="bbox-team ${isDone?(wh?"winner":"loser"):""}">
        <span class="nm">${homeLabel}${favHome?" ⭐":""}</span>
        ${wh?'<span class="bbox-check">✔</span>':""}
      </div>
      <div class="bbox-mid"><div class="bbox-score ${scoreCls}">${scoreTxt}</div></div>
      <div class="bbox-team bbox-right ${isDone?(wa?"winner":"loser"):""}">
        ${wa?'<span class="bbox-check">✔</span>':""}
        <span class="nm">${awayLabel}${favAway?" ⭐":""}</span>
      </div>
    </div>
  </div>`;
}
function connector(text){ return `<div class="bconnector"><span>${text||"VENCEDOR AVANÇA"}</span></div>`; }

// Resolve uma referência "VN" (Vencedor do confronto N) para o nome real da
// equipa, se esse confronto já tiver um resultado real confirmado pela ESPN.
// Funciona para qualquer fase — avos (via buildSimR32) ou fases seguintes
// (recursivamente, através do próprio KO_MATCHES de cada ronda).
function resolveVSlot(label, avosComputed){
  const m=(label||"").match(/^V(\d+)$/);
  if(!m) return null;
  const id=parseInt(m[1]);
  // Encontra a que fase/jogo este id pertence, e os seus dois lados (que
  // podem ser "1º X", "3º X/Y/Z", ou outro "VN" de uma fase anterior)
  let slotDef=null, slotRound=null;
  for(const r of ["avos","oitavas","quartas","semis","final"]){
    const found=MM_STRUCTURE[r].find(s=>s.id===id);
    if(found){ slotDef=found; slotRound=r; break; }
  }
  if(!slotDef) return null;

  let home,away;
  if(slotRound==="avos"){
    const slot=avosComputed[id-1];
    if(!slot) return null;
    home=slot.home; away=slot.away;
  } else {
    home=resolveVSlot(slotDef.t1,avosComputed)||slotDef.t1;
    away=resolveVSlot(slotDef.t2,avosComputed)||slotDef.t2;
    if(home.startsWith("V")||away.startsWith("V")) return null; // ainda não resolvido
  }

  const real=(KO_MATCHES||[]).find(k=>k.round===slotRound&&
    ((tkey(k.home)===tkey(home)&&tkey(k.away)===tkey(away))||
     (tkey(k.home)===tkey(away)&&tkey(k.away)===tkey(home))));
  if(real&&real.done) return real.sh>real.sa?real.home:real.away;
  return null; // confronto ainda não decidido
}

function bOficial(){
  const groupStageDone=RES.filter(r=>r.done).length>=72;
  let h=groupStageProgress();
  const rounds=[
    {key:"avos",    label:"AVOS DE FINAL — 27 A 30/06",      expected:16},
    {key:"oitavas", label:"OITAVAS DE FINAL — 3 A 6/07",      expected:8},
    {key:"quartas", label:"QUARTAS DE FINAL — 9 A 10/07",     expected:4},
    {key:"semis",   label:"SEMIFINAIS — 14 A 15/07",          expected:2},
    {key:"final",   label:"👑 GRANDE FINAL — 19/07",          expected:1},
  ];

  rounds.forEach(({key,label,expected},roundIdx)=>{
    h+=`<div class="bround"><div class="brnd-title">${label}</div>`;

    if(key==="avos" && !groupStageDone){
      // Avos dependem só da classificação dos grupos — por isso recalculamos
      // sempre ao vivo a partir do RES atual, em vez de confiar num palpite
      // estático da ESPN que só atualiza quando o robô voltar a correr.
      const computed=buildSimR32();
      computed.forEach((slot,i)=>{
        const m=MM_STRUCTURE.avos[i];
        const {time,date}=localTime(m.brTime,m.date);
        // Se este confronto já estiver mesmo a decorrer/encerrado na ESPN
        // (pelos nomes batidos), usa esses dados reais por cima do cálculo
        const liveMatch=(KO_MATCHES||[]).find(k=>k.round==="avos"&&
          ((tkey(k.home)===tkey(slot.home)&&tkey(k.away)===tkey(slot.away))||
           (tkey(k.home)===tkey(slot.away)&&tkey(k.away)===tkey(slot.home))));
        const favH=isFav(slot.home), favA=isFav(slot.away);
        if(liveMatch&&(liveMatch.done||liveMatch.live)){
          const status=liveMatch.done?"done":"live";
          const meta=liveMatch.done?`✅ ENCERRADO · ${date}`:`🔴 AO VIVO · ${liveMatch.clock||""}'`;
          h+=bracketBox(liveMatch.home,liveMatch.away,liveMatch.sh,liveMatch.sa,status,meta,favH,favA);
        } else {
          const meta=`🔄 ${date} · ${time}${m.venue?" · "+m.venue:""} · classificação atual`;
          h+=bracketBox(slot.home,slot.away,null,null,"scheduled",meta,favH,favA);
        }
        if(i%2===1 && i<computed.length-1) h+=connector();
      });
    } else {
      const real=(KO_MATCHES||[]).filter(m=>m.round===key)
        .sort((a,b)=>new Date(a.iso||0)-new Date(b.iso||0));

      if(real.length){
        // Jogos reais já confirmados pela ESPN — mostra com nomes e placares de verdade
        real.forEach((m,i)=>{
          const {time,date}=m.brTime?localTime(m.brTime,m.date):{time:"",date:m.date||""};
          const favH=isFav(m.home), favA=isFav(m.away);
          let status, meta;
          if(m.done){ status="done"; meta=`✅ ENCERRADO · ${date}`; }
          else if(m.live){ status="live"; meta=`🔴 AO VIVO · ${m.clock||""}'`; }
          else { status="scheduled"; meta=`⏰ ${date} · ${time}${m.venue?" · "+m.venue:""}`; }
          h+=bracketBox(m.home,m.away,m.sh,m.sa,status,meta,favH,favA);
          if(i%2===1 && i<real.length-1) h+=connector();
        });
        const remaining=Math.max(0,expected-real.length);
        if(remaining>0){
          h+=`<div class="bremain">+ ${remaining} confronto${remaining>1?"s":""} ainda a definir nesta fase</div>`;
        }
      } else {
        // Ainda sem jogos reais nesta fase — tenta resolver os "VN" a partir
        // dos resultados reais já confirmados; só usa estrutura genérica
        // ("Vencedor confronto N") para o que ainda não foi decidido
        const avosComputed=buildSimR32();
        MM_STRUCTURE[key].forEach((m,i)=>{
          const {time,date}=localTime(m.brTime,m.date);
          const r1=resolveVSlot(m.t1,avosComputed), r2=resolveVSlot(m.t2,avosComputed);
          const home=r1||(m.t1.match(/^V(\d+)$/)?`Vencedor Confronto ${m.t1.slice(1)}`:m.t1);
          const away=r2||(m.t2.match(/^V(\d+)$/)?`Vencedor Confronto ${m.t2.slice(1)}`:m.t2);
          const isTBD=!r1||!r2;
          const meta=isTBD?`${label.split(" — ")[0]} · a definir`:`⏰ ${date} · ${time}${m.venue?" · "+m.venue:""}`;
          h+=bracketBox(home,away,null,null,"scheduled",meta,r1?isFav(r1):false,r2?isFav(r2):false);
          if(i%2===1 && i<MM_STRUCTURE[key].length-1) h+=connector();
        });
      }
    }
    h+="</div>";
    if(roundIdx<rounds.length-1){
      h+=`<div class="bfunnel"><div class="bfunnel-tri"></div>
        <div class="bfunnel-label">${expected} CONFRONTOS → ${rounds[roundIdx+1].expected} VENCEDORES</div>
      </div>`;
    }
  });
  return h;
}

function tomorrowStr(){
  const d=new Date();d.setDate(d.getDate()+1);
  return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;
}
// Converte "DD/MM" num número ordenável (assume mesmo ano, sem virada de ano)
function dateSortKey(ddmm){
  if(!ddmm)return 9999;
  const [d,m]=ddmm.split("/").map(Number);
  return m*100+d;
}

let PROX_MODE="dia", PROX_FAV_ONLY=false;
function setProxMode(m){PROX_MODE=m;render();}
function toggleProxFav(){PROX_FAV_ONLY=!PROX_FAV_ONLY;render();}

function bProx(){
  const today=todayStr(), tom=tomorrowStr();

  let h=filterBar([
    {label:"📅 Por Dia",active:PROX_MODE==="dia",onclick:"setProxMode('dia')"},
    {label:"🏟 Por Grupo",active:PROX_MODE==="grupo",onclick:"setProxMode('grupo')"},
    {label:"🏆 Mata-Mata",active:PROX_MODE==="matamata",onclick:"setProxMode('matamata')"},
  ],PROX_FAV_ONLY,"toggleProxFav()");

  if(PROX_MODE==="matamata"){
    let koUpcoming=(KO_MATCHES||[]).filter(k=>!k.done).sort((a,b)=>new Date(a.iso||0)-new Date(b.iso||0));
    if(PROX_FAV_ONLY) koUpcoming=koUpcoming.filter(k=>isFav(k.home)||isFav(k.away));
    if(!koUpcoming.length) return h+`<div class="no-g">Nenhum jogo de mata-mata agendado ainda.</div>`;
    koUpcoming.forEach(k=>{
      const d=k.iso?new Date(k.iso):null;
      const meta=d?`⏰ ${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")} · ${k.venue||""}`:(k.round||"");
      h+=bracketBox(k.home,k.away,k.sh,k.sa,k.live?"live":"scheduled",meta,isFav(k.home),isFav(k.away));
    });
    return h;
  }

  let all=RES.filter(r=>!r.done&&!r.live);
  if(PROX_FAV_ONLY) all=all.filter(r=>isFav(r.home)||isFav(r.away));

  const pending=all.filter(r=>r.pending);
  const upcoming=all.filter(r=>!r.pending).sort((a,b)=>dateSortKey(a.date)-dateSortKey(b.date));

  // Mata-mata também conta como "próximo jogo" no modo Por Dia — sem isto,
  // esta vista ficava vazia assim que a fase de grupos terminasse, mesmo
  // havendo confrontos por vir (só visíveis manualmente no filtro Mata-Mata)
  let koUp=(KO_MATCHES||[]).filter(k=>!k.done);
  if(PROX_FAV_ONLY) koUp=koUp.filter(k=>isFav(k.home)||isFav(k.away));

  if(!upcoming.length && !pending.length && !koUp.length){
    return h+`<div class="no-g">${PROX_FAV_ONLY?"Nenhum jogo futuro das tuas seleções favoritas cadastrado ainda.":"Sem jogos futuros cadastrados ainda."}<br><span style="font-size:10px;color:#5a6a58">O robô adiciona automaticamente conforme a ESPN confirma novos jogos — tenta o Refresh.</span></div>`;
  }

  if(pending.length){
    h+=`<div style="background:#1a1200;border:1px solid #4a3a00;border-radius:7px;padding:10px 14px;margin-bottom:14px;font-size:10px;color:#d4a017">
      ⚠️ <b>Resultado ainda não confirmado</b> — estes jogos já deviam ter terminado, mas a fonte de dados não trouxe o placar ainda. Tenta o Refresh.
    </div>`;
    pending.forEach(r=>{h+=uc(r);});
  }

  if(PROX_MODE==="grupo"){
    "ABCDEFGHIJKL".split("").forEach(g=>{
      const gs=upcoming.filter(r=>r.g===g);if(!gs.length)return;
      h+=glbl(g);gs.forEach(r=>{h+=uc(r);});
    });
    const uncat=upcoming.filter(r=>r.g==="?");
    if(uncat.length){
      h+=`<div class="glbl" style="color:#8a9a88;margin-top:10px">▸ NÃO CATEGORIZADO</div>`;
      uncat.forEach(r=>{h+=uc(r);});
    }
  } else {
    const combined=[
      ...upcoming.map(r=>({...r,_ko:false})),
      ...koUp.map(k=>({...k,_ko:true})),
    ].sort((a,b)=>dateSortKey(a.date)-dateSortKey(b.date));

    let lastDate=null, first=true;
    combined.forEach(r=>{
      if(r.date!==lastDate){
        lastDate=r.date;
        let label=r.date||"DATA A CONFIRMAR";
        if(r.date===today)label=`HOJE — ${r.date}`;
        else if(r.date===tom)label=`AMANHÃ — ${r.date}`;
        h+=lbl(label,!first||pending.length>0);
        first=false;
      }
      if(r._ko){
        h+=bracketBox(r.home,r.away,r.sh,r.sa,r.live?"live":"scheduled",`⏰ ${r.brTime||""} · ${r.venue||""}`,isFav(r.home),isFav(r.away));
      } else {
        h+=uc(r);
      }
    });
  }
  return h;
}

  const rows=calcS(g),hasG=rows.some(r=>r.j>0),col=GC[g]||"#1a5e1a";
  let h=`<div class="twrap" style="--gc:${col}"><div class="thead2">GRUPO ${g}${groupHasFav(g)?" ⭐":""}</div>
    <table><thead><tr><th></th><th class="tl">SELEÇÃO</th><th>PTS</th><th>J</th><th>GF</th><th>GC</th><th>SD</th></tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    const q=i<2&&hasG,fv=isFav(r.t);
    h+=`<tr class="${q?"q":""}"><td style="${q?`color:${col}`:""};font-size:10px">${q?"✔":"✗"}</td>
      <td class="tl" style="color:${q?"#ddd":"#555"};font-weight:${q?"bold":"normal"}">${r.t}${fv?' <span style="color:#f0c040;font-size:9px">⭐</span>':""}</td>

  return h+"</tbody></table></div>";
}

    </div>`;
  });
  return h;
}

// Bandeira em destaque + mini-campo com a formação, se a ESPN devolver
function teamFlag(name){
  const m=(name||"").match(/\p{Regional_Indicator}{2}/u);
  return m?m[0]:"🏳️";
}

function pitchHalf(side,label,accent){
  if(!side||!side.starters?.length){
    return `<div class="pitch-half">
      <div class="pitch-label" style="color:${accent}">${label}</div>
      <div class="pitch-empty">Escalação não disponível</div>
    </div>`;
  }
  // Agrupa pela linha já calculada (0=goleiro, 1=defesa, 2=meio, 2.5=meio-ofensivo, 3=ataque)
  const grouped={};
  side.starters.forEach(p=>{
    const r=p.row??3;
    if(!grouped[r]) grouped[r]=[];
    grouped[r].push(p);
  });
  const rows=Object.keys(grouped).sort((a,b)=>a-b).map(r=>grouped[r]);
  const dotStyle=side.dotColor?` style="background:${side.dotColor}"`:"";
  const rowsHtml=rows.map(row=>`<div class="pitch-row">${row.map(p=>
    `<div class="pitch-player"><div class="pitch-dot"${dotStyle}></div><div class="pitch-name">${(p.name||"?").split(" ").pop()}</div></div>`
  ).join("")}</div>`).join("");
  return `<div class="pitch-half">
    <div class="pitch-label" style="color:${accent}">${label}${side.formation?` · ${side.formation}`:""}</div>
    <div class="pitch-rows">${rowsHtml}</div>
  </div>`;
}

// Estatísticas do jogo — confirmado em data.boxscore, vem de graça no mesmo
// pedido que já fazemos. A ESPN mistura formatos (possessionPct já vem em
// % tipo "61.1", mas outros campos "Pct" vêm como fração tipo "0.9") — por
// isso só uso os campos sem essa ambiguidade, para nunca mostrar errado.
function buildStatsBox(r){
  const s=r.stats;
  if(!s||(!s.home&&!s.away)) return "";
  const h=s.home||{}, a=s.away||{};
  function statRow(label,key){
    const hv=h[key], av=a[key];
    if(hv===undefined&&av===undefined) return "";
    return `<div class="stat-row">
      <div class="stat-val stat-left">${hv??"-"}</div>
      <div class="stat-label">${label}</div>
      <div class="stat-val stat-right">${av??"-"}</div>
    </div>`;
  }
  let possBar="";
  if(h.possessionPct!==undefined&&a.possessionPct!==undefined){
    const hp=parseFloat(h.possessionPct)||50;
    possBar=`<div class="stat-row">
      <div class="stat-val stat-left">${h.possessionPct}%</div>
      <div class="stat-label">Posse de Bola</div>
      <div class="stat-val stat-right">${a.possessionPct}%</div>
    </div>
    <div class="poss-bar"><div class="poss-bar-fill" style="width:${hp}%"></div></div>`;
  }
  return `<div class="stats-box">
    <div class="evtitle">ESTATÍSTICAS DO JOGO</div>
    ${possBar}
    ${statRow("Finalizações","totalShots")}
    ${statRow("Chutes a Gol","shotsOnTarget")}
    ${statRow("Escanteios","wonCorners")}
    ${statRow("Faltas","foulsCommitted")}
    ${statRow("Cartões Amarelos","yellowCards")}
    ${statRow("Cartões Vermelhos","redCards")}
    ${statRow("Passes Certos","accuratePasses")}
  </div>`;
}

function buildLineupBox(r){
  const l=r.lineups;
  const homeFlag=teamFlag(r.home), awayFlag=teamFlag(r.away);
  let body;
  if(!l){
    body=`<div class="pitch-empty" style="padding:18px 0">⚽ Escalação não disponível para este jogo<br>
      <span style="font-size:9px;color:#5e7a5c">A ESPN não devolveu dados de formação — pode não estar disponível para esta competição.</span></div>`;
  } else {
    body=`<div class="pitch-wrap">${pitchHalf(l.home,r.home,"#3dbb3d")}${pitchHalf(l.away,r.away,"#f0c040")}</div>`;
  }
  return `<div class="lineup-box">
    <div class="lineup-theme">${homeFlag} <span style="color:#444">vs</span> ${awayFlag}</div>
    <div class="evtitle" style="margin-top:6px">ESCALAÇÃO</div>
    ${body}
  </div>`;
}

function buildEvBox(r){
  const evs=(r.events||[]).filter(e=>e.icon);
  if(!evs.length)return `<div class="evbox"><div class="evnone">Sem eventos registados até ao momento</div></div>`;
  const rows=evs.map(e=>{
    const isGoal=e.icon==="⚽"||e.icon==="⚽ OG"||e.icon==="⚽🎯";
    return `<div class="evrow${isGoal?" evrow-goal":""}">
    <div class="evmin">${e.min?e.min+"'":""}</div>
    <div class="evico">${e.icon}</div>
    <div><div class="evtxt">${e.txt}</div>${e.sub?`<div class="evsub">${e.sub}</div>`:""}</div>
  </div>`;}).join("");
  return `<div class="evbox"><div class="evtitle">EVENTOS AO VIVO</div>${rows}</div>`;
}

function card(r,live,upcoming){
  const col=GC[r.g]||"#222";
  const fv=isFav(r.home)||isFav(r.away);
  const wh=r.done&&r.sh>r.sa,wa=r.done&&r.sa>r.sh;
  const {time,date}=ft(r);
  let badge="";
  if(live&&fv)badge=`<div class="cbadge favlive"><span class="fav-dot"></span> ⭐ FAVORITO AO VIVO · ${r.clock?r.clock+"' · ":""}GRP ${r.g}</div>`;
  else if(live)badge=`<div class="cbadge live"><span class="live-dot"></span> AO VIVO · ${r.clock?r.clock+"' · ":""}GRP ${r.g}</div>`;
  else if(upcoming)badge=`<div class="cbadge soon">⏰ ${date} · ${time}${r.venue?" · "+r.venue:""}</div>`;
  let score="";
  if(r.done)score=`<div class="cscore done">${r.sh} – ${r.sa}</div>`;
  else if(live)score=`<div class="cscore ${fv?"favalive":"alive"}">${r.sh??0} – ${r.sa??0}</div>`;
  else score=`<div class="cscore vs">· vs ·</div>`;
  let foot="";
  if(r.done)foot=`<div class="cfoot"><span style="color:${col};font-size:9px">GRP ${r.g} · ${date}</span>${r.note?`<span style="color:#3dbb3d;font-style:italic;font-size:9px;max-width:58%;text-align:right">${r.note}</span>`:""}</div>`;
  const hOn=isFav(r.home), aOn=isFav(r.away);
  // Eventos completos saíram daqui — vivem na tab 🎙 Minuto a Minuto.
  // Aqui fica só um link curto, sem poluir o cartão.
  const liveTeaser=live?`<div class="cteaser" onclick="setTab('minuto',document.querySelector('.tab.minuto-tab'))">🎙 Ver minuto a minuto →</div>`:"";
  return `<div class="card${live&&fv?" cfavlive":live?" clive":fv&&r.done?" cfav":""}" style="${r.done&&!live?"border-left-color:"+col:""}">
    ${badge}
    <div class="crow">
      <div class="cteam ${wh?"win":r.done?"lose":""}">${r.home} <span class="ministar${hOn?" on":""}" onclick="toggleFav('${r.home}')">⭐</span></div>
      ${score}
      <div class="cteam r ${wa?"win":r.done?"lose":""}"><span class="ministar${aOn?" on":""}" onclick="toggleFav('${r.away}')">⭐</span> ${r.away}</div>
    </div>
    ${foot}${liveTeaser}
  </div>`;
}

function uc(r,fav){
  const col=GC[r.g]||"#222";
  const favH=isFav(r.home), favA=isFav(r.away);
  const f=fav||favH||favA;
  const grpLabel=r.g&&r.g!=="?"?`GRP ${r.g}`:"";
  const {time,date}=ft(r);
  return `<div class="uc${f?" fav":""}" style="border-left-color:${f?"#f0c040":col}">
    <div>
      <div class="uch${favH?" uc-fav-team":""}">${r.home}${favH?" ⭐":""}</div>
      <div class="uca${favA?" uc-fav-team":""}">vs ${r.away}${favA?" ⭐":""}</div>
    </div>
    <div><div class="uct">${date} · ${time}</div><div class="ucm" style="color:${f?"#b8860b":col}">${grpLabel}${r.venue?(grpLabel?" · ":"")+r.venue:""}</div></div>
  </div>`;
}

// ── CONTROLES ─────────────────────────────────────────────────────────────────
function updateTS(){
  document.getElementById("ts").textContent=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  const hasFavLive=RES.some(r=>r.live&&(isFav(r.home)||isFav(r.away)));
  const hasLive=RES.some(r=>r.live);
  document.getElementById("li").innerHTML=hasFavLive?`<span class="fav-dot"></span> `:hasLive?`<span class="live-dot"></span> `:"";
}
function setTab(id,btn){TAB=id;document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));if(btn)btn.classList.add("active");render();}
function setGrp(g){GRP=g;render();}
function doRefresh(){document.getElementById("ts").textContent="Atualizando...";fetchData();}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();fetchData();adaptRefresh();
if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js",{scope:"./"}).catch(()=>{});
</script>
