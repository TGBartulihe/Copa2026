<script>
// ── TIMEZONE ─────────────────────────────────────────────────────────────────
const userTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
const tzNames = {
  "America/Sao_Paulo":"Brasil (Brasília)",
  "America/Manaus":"Brasil (Manaus)",
  "America/Belem":"Brasil (Belém)",
  "Europe/Lisbon":"Portugal (Lisboa)",
  "Europe/Madrid":"Espanha",
  "America/New_York":"EUA (Leste)",
  "America/Los_Angeles":"EUA (Pacífico)",
  "America/Argentina/Buenos_Aires":"Argentina",
  "America/Bogota":"Colômbia",
};
const tzLabel = tzNames[userTZ] || userTZ;

// Base UTC offsets for known TZs (simplified, no DST for demo)
function getBrasiliaOffset() {
  // Get current offset from UTC in hours for Brasilia
  const d = new Date();
  const brt = new Date(d.toLocaleString("en-US",{timeZone:"America/Sao_Paulo"}));
  const utc = new Date(d.toLocaleString("en-US",{timeZone:"UTC"}));
  return (brt - utc) / 3600000;
}

function convertFromBrasilia(brTimeStr, brDateStr) {
  // brTimeStr = "19h", brDateStr = "13/06"
  const hour = parseInt(brTimeStr);
  const [day,month] = brDateStr.split("/").map(Number);
  const year = 2026;
  const brOffset = getBrasiliaOffset(); // e.g. -3
  const userOffset = -(new Date().getTimezoneOffset()/60);
  const diff = userOffset - brOffset;
  let newHour = hour + diff;
  let dayShift = 0;
  if (newHour >= 24) { newHour -= 24; dayShift = 1; }
  if (newHour < 0)   { newHour += 24; dayShift = -1; }
  const pad = n => String(n).padStart(2,"0");
  const newDate = new Date(year, month-1, day+dayShift);
  const newDay = pad(newDate.getDate());
  const newMonth = pad(newDate.getMonth()+1);
  return { time: `${pad(newHour)}h`, date: `${newDay}/${newMonth}` };
}

function localTime(brTime, brDate) {
  if (!brTime) return { time:"", date: brDate||"" };
  try { return convertFromBrasilia(brTime, brDate||"15/06"); }
  catch(e) { return { time: brTime, date: brDate||"" }; }
}

document.getElementById("tz-bar").textContent = `🕐 Horários em: ${tzLabel}`;

// ── CORES DOS GRUPOS ──────────────────────────────────────────────────────────
const GC = {

  E:"#713f12",F:"#134e4a",G:"#1e1b4b",H:"#7f1d1d",

const ALL_TEAMS = {

  D:["EUA 🇺🇸","Austrália 🇦🇺","Turquia 🇹🇷","Paraguai 🇵🇾"],
  E:["Alemanha 🇩🇪","C. do Marfim 🇨🇮","Equador 🇪🇨","Curaçao 🇨🇼"],
  F:["Suécia 🇸🇪","Holanda 🇳🇱","Japão 🇯🇵","Tunísia 🇹🇳"],
  G:["Bélgica 🇧🇪","Irã 🇮🇷","Egito 🇪🇬","Nova Zelândia 🇳🇿"],
  H:["Espanha 🇪🇸","Cabo Verde 🇨🇻","Arábia Saudita 🇸🇦","Uruguai 🇺🇾"],
  I:["França 🇫🇷","Noruega 🇳🇴","Senegal 🇸🇳","Iraque 🇮🇶"],
  J:["Argentina 🇦🇷","Áustria 🇦🇹","Argélia 🇩🇿","Jordânia 🇯🇴"],
  K:["Portugal 🇵🇹","Colômbia 🇨🇴","RD Congo 🇨🇩","Uzbequistão 🇺🇿"],
  L:["Inglaterra 🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croácia 🇭🇷","Gana 🇬🇭","Panamá 🇵🇦"]
};

// ── DADOS BASE ────────────────────────────────────────────────────────────────
let RESULTS = [
  {g:"A",home:"México 🇲🇽",away:"África do Sul 🇿🇦",sh:2,sa:0,date:"11/06",brTime:"16h",done:true,note:"Gol duplo mexicano · Azteca"},
  {g:"A",home:"Coreia do Sul 🇰🇷",away:"Rep. Tcheca 🇨🇿",sh:2,sa:1,date:"11/06",brTime:"23h",done:true,note:"Coreia vira no 2T · Guadalajara"},
  {g:"B",home:"Canadá 🇨🇦",away:"Bósnia 🇧🇦",sh:1,sa:1,date:"12/06",brTime:"16h",done:true,note:"Empate justo · Toronto"},
  {g:"B",home:"Qatar 🇶🇦",away:"Suíça 🇨🇭",sh:1,sa:1,date:"13/06",brTime:"16h",done:true,note:"Suíça empata no fim · San Francisco"},
  {g:"C",home:"Brasil 🇧🇷",away:"Marrocos 🇲🇦",sh:1,sa:1,date:"13/06",brTime:"19h",done:true,note:"Partida intensa no MetLife"},
  {g:"C",home:"Haiti 🇭🇹",away:"Escócia 🏴󠁧󠁢󠁳󠁣󠁴󠁿",sh:0,sa:1,date:"13/06",brTime:"22h",done:true,note:"McGinn 28' · Boston"},
  {g:"D",home:"EUA 🇺🇸",away:"Paraguai 🇵🇾",sh:4,sa:1,date:"12/06",brTime:"22h",done:true,note:"Goleada americana · Los Angeles"},
  {g:"D",home:"Austrália 🇦🇺",away:"Turquia 🇹🇷",sh:2,sa:0,date:"14/06",brTime:"01h",done:true,note:"Irankunda 27' · Metcalfe 75' — SURPRESA"},
  {g:"E",home:"Alemanha 🇩🇪",away:"Curaçao 🇨🇼",sh:7,sa:1,date:"14/06",brTime:"14h",done:true,note:"Havertz 2x · Musiala · Goleada histórica"},
  {g:"E",home:"C. do Marfim 🇨🇮",away:"Equador 🇪🇨",sh:1,sa:0,date:"14/06",brTime:"20h",done:true,note:"Elefantes vencem no susto · Filadélfia"},
  {g:"F",home:"Holanda 🇳🇱",away:"Japão 🇯🇵",sh:2,sa:2,date:"14/06",brTime:"17h",done:true,note:"Japão empata no 2T · Dallas"},
  {g:"F",home:"Suécia 🇸🇪",away:"Tunísia 🇹🇳",sh:5,sa:1,date:"14/06",brTime:"23h",done:true,note:"Isak decisivo · goleada escandinava"},
  {g:"G",home:"Bélgica 🇧🇪",away:"Egito 🇪🇬",sh:null,sa:null,date:"15/06",brTime:"16h",done:false,venue:"Seattle",live:true},
  {g:"G",home:"Irã 🇮🇷",away:"Nova Zelândia 🇳🇿",sh:null,sa:null,date:"15/06",brTime:"22h",done:false,venue:"Los Angeles"},
  {g:"H",home:"Espanha 🇪🇸",away:"Cabo Verde 🇨🇻",sh:0,sa:0,date:"15/06",brTime:"13h",done:true,note:"⚡ SURPRESA! Cabo Verde segura Espanha · Atlanta"},
  {g:"H",home:"Arábia Saudita 🇸🇦",away:"Uruguai 🇺🇾",sh:null,sa:null,date:"15/06",brTime:"19h",done:false,venue:"Nova York"},
  {g:"I",home:"França 🇫🇷",away:"Senegal 🇸🇳",sh:null,sa:null,date:"16/06",brTime:"16h",done:false,venue:"Los Angeles"},
  {g:"I",home:"Iraque 🇮🇶",away:"Noruega 🇳🇴",sh:null,sa:null,date:"16/06",brTime:"19h",done:false,venue:"Boston"},
  {g:"J",home:"Argentina 🇦🇷",away:"Argélia 🇩🇿",sh:null,sa:null,date:"16/06",brTime:"22h",done:false,venue:"Miami"},
  {g:"J",home:"Áustria 🇦🇹",away:"Jordânia 🇯🇴",sh:null,sa:null,date:"17/06",brTime:"01h",done:false,venue:"Kansas City"},
  {g:"K",home:"Portugal 🇵🇹",away:"RD Congo 🇨🇩",sh:null,sa:null,date:"17/06",brTime:"14h",done:false,venue:"Boston"},
  {g:"K",home:"Uzbequistão 🇺🇿",away:"Colômbia 🇨🇴",sh:null,sa:null,date:"17/06",brTime:"21h",done:false,venue:"Seattle"},
  {g:"L",home:"Inglaterra 🏴󠁧󠁢󠁥󠁮󠁧󠁿",away:"Croácia 🇭🇷",sh:null,sa:null,date:"17/06",brTime:"17h",done:false,venue:"Nova York"},
  {g:"L",home:"Gana 🇬🇭",away:"Panamá 🇵🇦",sh:null,sa:null,date:"17/06",brTime:"20h",done:false,venue:"Filadélfia"}
];

// ── ESTADO ────────────────────────────────────────────────────────────────────
let currentTab="hoje", currentGrp="C", currentSource="loading", refreshIv=null;

// ── FONTES DE DADOS ───────────────────────────────────────────────────────────
const SOURCES = {
  espn: {
    label:"✅ ESPN API — ao vivo",
    cls:"espn",
    fetch: async () => {
      const r = await fetch("https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard",{cache:"no-cache"});
      if(!r.ok) throw new Error("ESPN failed");
      return await r.json();
    },
    parse: (data) => {
      const events = data.events||[];
      events.forEach(ev=>{
        const comp=ev.competitions?.[0];
        const h=comp?.competitors?.find(c=>c.homeAway==="home");
        const a=comp?.competitors?.find(c=>c.homeAway==="away");
        if(!h||!a) return;
        const state=ev.status?.type?.state;
        const hs=parseInt(h.score)||0, as=parseInt(a.score)||0;
        const clock=ev.status?.displayClock||"";
        RESULTS.forEach(r=>{
          const hn=h.team?.displayName||"", an=a.team?.displayName||"";
          const hm=r.home.includes(hn.split(" ")[0])||hn.includes(r.home.replace(/\p{Emoji}/gu,"").trim().split(" ")[0]);
          const am=r.away.includes(an.split(" ")[0])||an.includes(r.away.replace(/\p{Emoji}/gu,"").trim().split(" ")[0]);
          if(hm&&am){
            if(state==="post"){ r.sh=hs;r.sa=as;r.done=true;r.live=false; }
            if(state==="in"){ r.sh=hs;r.sa=as;r.live=true;r.clock=clock; }
            if(state==="post") r.live=false;
          }
        });
      });
      return events.length;
    }
  },
  sportsdb: {
    label:"🔵 TheSportsDB — backup",
    cls:"sdb",
    fetch: async () => {
      const r = await fetch("https://www.thesportsdb.com/api/v1/json/3/eventsseason.php?id=4480&s=2026",{cache:"no-cache"});
      if(!r.ok) throw new Error("SDB failed");
      return await r.json();
    },
    parse: (data) => {
      const events = data.events||[];
      let count=0;
      events.forEach(ev=>{
        if(!ev.intHomeScore&&!ev.intAwayScore) return;
        const hs=parseInt(ev.intHomeScore)||0, as=parseInt(ev.intAwayScore)||0;
        const hName=ev.strHomeTeam||"", aName=ev.strAwayTeam||"";
        RESULTS.forEach(r=>{
          if(r.done) return;
          const hm=r.home.replace(/\p{Emoji}/gu,"").trim().toLowerCase().includes(hName.toLowerCase().split(" ")[0]);
          const am=r.away.replace(/\p{Emoji}/gu,"").trim().toLowerCase().includes(aName.toLowerCase().split(" ")[0]);
          if(hm&&am&&ev.strStatus==="Match Finished"){
            r.sh=hs;r.sa=as;r.done=true;r.live=false;count++;
          }
        });
      });
      return count;
    }
  }
};

async function fetchData() {
  setSource("loading","⟳ Conectando...");
  for(const [key,src] of Object.entries(SOURCES)){
    try{
      const data=await src.fetch();
      const count=src.parse(data);
      setSource(src.cls,`${src.label} · ${count} jogos`);
      updateTS();render();return;
    }catch(e){ /* tenta próxima */ }
  }
  setSource("local","⚠️ Dados locais · ESPN e TheSportsDB indisponíveis");
  updateTS();render();
}

function setSource(cls,label){
  currentSource=cls;
  const el=document.getElementById("source-bar");
  el.className=`source-bar ${cls}`;
  el.textContent=label;
}

// ── CLASSIFICAÇÃO ─────────────────────────────────────────────────────────────
function calcStandings(g){
  const teams={};
  (ALL_TEAMS[g]||[]).forEach(t=>{teams[t]={t,pts:0,j:0,gf:0,gc:0,dif:0};});
  RESULTS.filter(r=>r.g===g&&r.done&&r.sh!==null).forEach(r=>{
    if(!teams[r.home])teams[r.home]={t:r.home,pts:0,j:0,gf:0,gc:0,dif:0};
    if(!teams[r.away])teams[r.away]={t:r.away,pts:0,j:0,gf:0,gc:0,dif:0};
    teams[r.home].j++;teams[r.away].j++;
    teams[r.home].gf+=r.sh;teams[r.home].gc+=r.sa;
    teams[r.away].gf+=r.sa;teams[r.away].gc+=r.sh;
    if(r.sh>r.sa)teams[r.home].pts+=3;
    else if(r.sh<r.sa)teams[r.away].pts+=3;
    else{teams[r.home].pts++;teams[r.away].pts++;}
  });
  Object.values(teams).forEach(t=>{t.dif=t.gf-t.gc;});
  return Object.values(teams).sort((a,b)=>b.pts-a.pts||b.dif-a.dif||b.gf-a.gf);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){document.getElementById("content").innerHTML=buildContent();}

function buildContent(){
  if(currentTab==="hoje")   return buildHoje();
  if(currentTab==="result") return buildResult();
  if(currentTab==="grupos") return buildGrupos();
  if(currentTab==="prox")   return buildProx();
  return "";
}

function buildHoje(){
  const live=RESULTS.filter(r=>r.live);
  const tDone=RESULTS.filter(r=>r.date==="15/06"&&r.done);
  const tNext=RESULTS.filter(r=>r.date==="15/06"&&!r.done&&!r.live);
  const yest=RESULTS.filter(r=>r.date==="14/06"&&r.done);
  let h="";
  if(live.length){h+=lbl("🔴 AO VIVO AGORA");live.forEach(r=>{h+=card(r,true);});}
  if(tDone.length){h+=lbl("✅ HOJE ENCERRADOS — 15/06",true);tDone.forEach(r=>{h+=card(r);});}
  if(tNext.length){h+=lbl("⏰ HOJE MAIS TARDE",true);tNext.forEach(r=>{h+=card(r,false,true);});}
  h+=lbl("📋 ONTEM — 14/06",true);
  yest.forEach(r=>{h+=card(r);});
  return h;
}

function buildResult(){
  const done=RESULTS.filter(r=>r.done);
  let h=lbl(`${done.length} JOGOS ENCERRADOS`);
  "ABCDEFGH".split("").forEach(g=>{
    const gs=RESULTS.filter(r=>r.g===g&&r.done);
    if(!gs.length)return;
    h+=glbl(g);gs.forEach(r=>{h+=card(r);});
  });
  return h;
}

function buildGrupos(){
  const btns="ABCDEFGHIJKL".split("").map(g=>{
    const act=g===currentGrp;
    const col=GC[g]||"#333";
    return `<button class="gbtn${act?" active":""}" 
      style="${act?`background:${col};border-color:${col};color:#fff`:""}"
      onclick="setGrp('${g}')">${g}${g==="C"?"⭐":""}</button>`;
  }).join("");
  let h=`<div class="group-btns">${btns}</div>`;
  h+=buildTable(currentGrp);
  h+=glbl(currentGrp,true);
  RESULTS.filter(r=>r.g===currentGrp).forEach(r=>{h+=card(r,r.live,!r.done&&!r.live);});
  return h;
}

  const tNext=RESULTS.filter(r=>r.date==="15/06"&&!r.done&&!r.live);
  const r16=RESULTS.filter(r=>r.date==="16/06"&&!r.done);
  const r17=RESULTS.filter(r=>r.date==="17/06"&&!r.done);
  let h="";
  if(tNext.length){h+=lbl("HOJE AINDA — 15/06");tNext.forEach(r=>{h+=uc(r);});}
  h+=lbl("AMANHÃ — 16/06",true);r16.forEach(r=>{h+=uc(r);});
  h+=lbl("17 DE JUNHO",true);r17.forEach(r=>{h+=uc(r);});
  h+=lbl("2ª RODADA — GRANDES JOGOS",true);
  [
    {g:"C",home:"Brasil 🇧🇷",away:"Haiti 🇭🇹",date:"19/06",brTime:"22h",venue:"Filadélfia"},
    {g:"C",home:"Marrocos 🇲🇦",away:"Escócia 🏴󠁧󠁢󠁳󠁣󠁴󠁿",date:"19/06",brTime:"19h",venue:"Vancouver"},
    {g:"H",home:"Espanha 🇪🇸",away:"Uruguai 🇺🇾",date:"20/06",brTime:"19h",venue:"Dallas"},
    {g:"J",home:"Argentina 🇦🇷",away:"Áustria 🇦🇹",date:"21/06",brTime:"22h",venue:"Houston"},
    {g:"E",home:"Alemanha 🇩🇪",away:"C. do Marfim 🇨🇮",date:"21/06",brTime:"19h",venue:"Toronto"},
    {g:"I",home:"França 🇫🇷",away:"Iraque 🇮🇶",date:"21/06",brTime:"16h",venue:"Filadélfia"},
    {g:"F",home:"Holanda 🇳🇱",away:"Suécia 🇸🇪",date:"20/06",brTime:"22h",venue:"Los Angeles"},
    {g:"K",home:"Portugal 🇵🇹",away:"Colômbia 🇨🇴",date:"22/06",brTime:"22h",venue:"Boston"},
    {g:"L",home:"Inglaterra 🏴󠁧󠁢󠁥󠁮󠁧󠁿",away:"Gana 🇬🇭",date:"22/06",brTime:"16h",venue:"Atlanta"},

function buildTable(g){
  const rows=calcStandings(g);
  const hasG=rows.some(r=>r.j>0);
  const col=GC[g]||"#1a5e1a";
  let h=`<div class="table-wrap" style="--gc:${col}">
    <div class="table-head">GRUPO ${g}${g==="C"?" ⭐ BRASIL":""}${!hasG?" — sem jogos ainda":""}</div>
    <table><thead><tr>
      <th></th><th class="tl">SELEÇÃO</th><th>PTS</th><th>J</th><th>GF</th><th>GC</th><th>SD</th>
    </tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    const q=i<2&&hasG;
    h+=`<tr class="${q?"q":""}">
      <td class="${q?"iq":"in"}" style="${q?`color:${col}`:""}"><b>${q?"✔":"✗"}</b></td>
      <td class="tl ${q?"tq":"tn"}">${r.t}</td>
      <td class="pts">${r.pts}</td>
      <td style="color:#444">${r.j}</td>
      <td style="color:#777">${r.gf}</td>
      <td style="color:#444">${r.gc}</td>
      <td class="${r.dif>0?"pos":r.dif<0?"neg":"zer"}">${r.dif>0?"+"+r.dif:r.dif}</td>
    </tr>`;
  });
  return h+"</tbody></table></div>";
}

// ── HTML HELPERS ──────────────────────────────────────────────────────────────
function lbl(t,mt){return `<div class="lbl${mt?" mt":""}">${t}</div>`;}
function glbl(g,mt){return `<div class="glbl${mt?" mt":""}" style="color:${GC[g]||"#444"}">▸ GRUPO ${g}${g==="C"?" ⭐ BRASIL":""}</div>`;}

function fmtTime(r){
  if(!r.brTime) return {time:"",date:r.date||""};
  return localTime(r.brTime, r.date);
}

function card(r,live,upcoming){
  const col=GC[r.g]||"#222";
  const wh=r.done&&r.sh>r.sa, wa=r.done&&r.sa>r.sh;
  const {time,date}=fmtTime(r);
  let badge="";
  if(live) badge=`<div class="card-badge live"><span class="live-dot"></span> AO VIVO · ${r.clock?r.clock+"' · ":""}GRUPO ${r.g}</div>`;
  else if(upcoming) badge=`<div class="card-badge today">⏰ ${date} · ${time}${r.venue?" · "+r.venue:""}</div>`;
  let score="";
  if(r.done) score=`<div class="card-score done">${r.sh} – ${r.sa}</div>`;
  else if(live) score=`<div class="card-score live-s">${r.sh??0} – ${r.sa??0}</div>`;
  else score=`<div class="card-score vs">· vs ·</div>`;
  let foot="";
  if(r.done) foot=`<div class="card-foot"><span style="color:${col};letter-spacing:1px;font-size:9px">GRUPO ${r.g} · ${date}</span>${r.note?`<span style="color:#3dbb3d;font-style:italic;font-size:9px;max-width:60%;text-align:right">${r.note}</span>`:""}</div>`;
  return `<div class="card${live?" live":""}" style="${r.done?"border-left-color:"+col:""}">
    ${badge}
    <div class="card-row">
      <div class="card-team ${wh?"win":"lose"}">${r.home}</div>
      ${score}
      <div class="card-team r ${wa?"win":"lose"}">${r.away}</div>
    </div>
    ${foot}
  </div>`;
}

function uc(r){
  const col=GC[r.g]||"#222";
  const {time,date}=fmtTime(r);
  return `<div class="uc" style="--gc:${col};border-left-color:${col}">
    <div><div class="uc-h">${r.home}</div><div class="uc-a">vs ${r.away}</div></div>
    <div><div class="uc-t">${date} · ${time}</div><div class="uc-m" style="color:${col}">GRP ${r.g}${r.venue?" · "+r.venue:""}</div></div>
  </div>`;
}

// ── CONTROLES ─────────────────────────────────────────────────────────────────
function updateTS(){
  const n=new Date();
  document.getElementById("ts").textContent=`${n.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}`;
  const hasLive=RESULTS.some(r=>r.live);
  document.getElementById("live-ind").innerHTML=hasLive?`<span class="live-dot"></span> `:"";
}

function setTab(id,btn){
  currentTab=id;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  if(btn)btn.classList.add("active");
  render();
}

function setGrp(g){currentGrp=g;render();}

function doRefresh(){
  document.getElementById("ts").textContent="Atualizando...";
  fetchData();
}

function startAutoRefresh(){
  if(refreshIv)clearInterval(refreshIv);
  refreshIv=setInterval(fetchData,60000);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
fetchData();
startAutoRefresh();

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
