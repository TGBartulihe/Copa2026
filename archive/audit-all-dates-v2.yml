name: Auditoria Completa v2 - Jogos Perdidos em Qualquer Data

on:
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Comparar todas as datas usando o dicionГЎrio real
        run: |
          node -e "
          const fs = require('fs');
          const ESPN_MAP = {
            'Mexico':'MГ©xico рџ‡Ірџ‡Ѕ','South Africa':'ГЃfrica do Sul рџ‡їрџ‡¦',
            'South Korea':'Coreia do Sul рџ‡°рџ‡·','Czech Republic':'Rep. Tcheca рџ‡Ёрџ‡ї','Czechia':'Rep. Tcheca рџ‡Ёрџ‡ї',
            'Canada':'CanadГЎ рџ‡Ёрџ‡¦','Bosnia and Herzegovina':'BГіsnia рџ‡§рџ‡¦','Bosnia':'BГіsnia рџ‡§рџ‡¦','Bosnia-Herzegovina':'BГіsnia рџ‡§рџ‡¦',
            'Qatar':'Qatar рџ‡¶рџ‡¦','Switzerland':'SuГ­Г§a рџ‡Ёрџ‡­',
            'Brazil':'Brasil рџ‡§рџ‡·','Morocco':'Marrocos рџ‡Ірџ‡¦','Scotland':'EscГіcia рџЏґу Ѓ§у Ѓўу Ѓіу ЃЈу Ѓґу Ѓї','Haiti':'Haiti рџ‡­рџ‡№',
            'United States':'EUA рџ‡єрџ‡ё','USA':'EUA рџ‡єрџ‡ё','Paraguay':'Paraguai рџ‡µрџ‡ѕ',
            'Australia':'AustrГЎlia рџ‡¦рџ‡є','TГјrkiye':'Turquia рџ‡№рџ‡·','Turkey':'Turquia рџ‡№рџ‡·',
            'Germany':'Alemanha рџ‡©рџ‡Є','Curacao':'CuraГ§ao рџ‡Ёрџ‡ј','CuraГ§ao':'CuraГ§ao рџ‡Ёрџ‡ј',
            'Ivory Coast':'C. do Marfim рџ‡Ёрџ‡®',\"CГґte d'Ivoire\":'C. do Marfim рџ‡Ёрџ‡®',\"Cote d'Ivoire\":'C. do Marfim рџ‡Ёрџ‡®',
            'Ecuador':'Equador рџ‡Єрџ‡Ё','Netherlands':'Holanda рџ‡ірџ‡±','Japan':'JapГЈo рџ‡Їрџ‡µ',
            'Sweden':'SuГ©cia рџ‡ёрџ‡Є','Tunisia':'TunГ­sia рџ‡№рџ‡і',
            'Belgium':'BГ©lgica рџ‡§рџ‡Є','Egypt':'Egito рџ‡Єрџ‡¬','Iran':'IrГЈ рџ‡®рџ‡·','New Zealand':'Nova ZelГўndia рџ‡ірџ‡ї',
            'Spain':'Espanha рџ‡Єрџ‡ё','Cape Verde':'Cabo Verde рџ‡Ёрџ‡»','Saudi Arabia':'ArГЎbia Saudita рџ‡ёрџ‡¦','Uruguay':'Uruguai рџ‡єрџ‡ѕ',
            'France':'FranГ§a рџ‡«рџ‡·','Senegal':'Senegal рџ‡ёрџ‡і','Iraq':'Iraque рџ‡®рџ‡¶','Norway':'Noruega рџ‡ірџ‡ґ',
            'Argentina':'Argentina рџ‡¦рџ‡·','Algeria':'ArgГ©lia рџ‡©рџ‡ї','Austria':'ГЃustria рџ‡¦рџ‡№','Jordan':'JordГўnia рџ‡Їрџ‡ґ',
            'Portugal':'Portugal рџ‡µрџ‡№','DR Congo':'RD Congo рџ‡Ёрџ‡©','Congo DR':'RD Congo рџ‡Ёрџ‡©','DRC':'RD Congo рџ‡Ёрџ‡©','Democratic Republic of the Congo':'RD Congo рџ‡Ёрџ‡©','Congo':'RD Congo рџ‡Ёрџ‡©','Uzbekistan':'UzbequistГЈo рџ‡єрџ‡ї','Colombia':'ColГґmbia рџ‡Ёрџ‡ґ',
            'England':'Inglaterra рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї','Croatia':'CroГЎcia рџ‡­рџ‡·','Ghana':'Gana рџ‡¬рџ‡­','Panama':'PanamГЎ рџ‡µрџ‡¦',
            'Ghana':'Gana рџ‡¬рџ‡­', 'Panama':'PanamГЎ рџ‡µрџ‡¦',
          };
          function mapTeam(n){ return ESPN_MAP[n] || n; }
          function tkey(s){ return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]/g,'').toLowerCase(); }
          function toBR(isoDate){
            const d = new Date(isoDate);
            const br = new Date(d.getTime() - 3*3600*1000);
            const p = n => String(n).padStart(2,'0');
            return p(br.getUTCDate())+'/'+p(br.getUTCMonth()+1);
          }

          async function fetchDay(dateStr){
            try{
              const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=' + dateStr);
              const data = await res.json();
              return data.events || [];
            }catch(e){ return []; }
          }

          async function main(){
            const existing = JSON.parse(fs.readFileSync('results.json', 'utf8'));
            const existingKeys = new Set();
            existing.matches.forEach(m => { existingKeys.add(tkey(m.home)+'|'+tkey(m.away)); });

            const start = new Date('2026-06-11T00:00:00Z');
            const today = new Date();
            const reallyMissing = [];

            for (let d = new Date(start); d <= today; d.setUTCDate(d.getUTCDate()+1)){
              const dateStr = d.getUTCFullYear() + String(d.getUTCMonth()+1).padStart(2,'0') + String(d.getUTCDate()).padStart(2,'0');
              const events = await fetchDay(dateStr);
              const finished = events.filter(ev => ev.competitions?.[0]?.status?.type?.completed === true);

              finished.forEach(ev => {
                const comp = ev.competitions[0];
                const homeC = comp.competitors?.find(c=>c.homeAway==='home');
                const awayC = comp.competitors?.find(c=>c.homeAway==='away');
                if(!homeC || !awayC) return;
                const home = mapTeam(homeC.team?.displayName);
                const away = mapTeam(awayC.team?.displayName);
                const key = tkey(home)+'|'+tkey(away);
                const keyRev = tkey(away)+'|'+tkey(home);
                if(!existingKeys.has(key) && !existingKeys.has(keyRev)){
                  reallyMissing.push({date: toBR(ev.date), home, homeScore: homeC.score, away, awayScore: awayC.score, iso: ev.date, venue: comp.venue?.fullName||''});
                  console.log('REALMENTE EM FALTA: ' + toBR(ev.date) + ' вЂ” ' + home + ' ' + homeC.score + ' x ' + awayC.score + ' ' + away);
                }
              });
            }
            console.log('');
            console.log('Total REALMENTE em falta (com dicionГЎrio correto): ' + reallyMissing.length);
            fs.writeFileSync('missing-matches-found.json', JSON.stringify(reallyMissing, null, 2));
          }
          main().catch(e=>{console.error(e);process.exit(1);});
          "

      - name: Guardar lista de jogos em falta como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: missing-matches
          path: missing-matches-found.json
