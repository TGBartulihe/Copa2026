name: Restaurar Mata-Mata Apagado por Engano

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Buscar fresco e adicionar ao knockout (nГЈo aos jogos de grupo)
        run: |
          node -e "
          const fs = require('fs');
          const ESPN_MAP = {
            'Mexico':'MГ©xico рџ‡Ірџ‡Ѕ','South Africa':'ГЃfrica do Sul рџ‡їрџ‡¦','South Korea':'Coreia do Sul рџ‡°рџ‡·',
            'Czech Republic':'Rep. Tcheca рџ‡Ёрџ‡ї','Czechia':'Rep. Tcheca рџ‡Ёрџ‡ї','Canada':'CanadГЎ рџ‡Ёрџ‡¦',
            'Bosnia and Herzegovina':'BГіsnia рџ‡§рџ‡¦','Bosnia':'BГіsnia рџ‡§рџ‡¦','Bosnia-Herzegovina':'BГіsnia рџ‡§рџ‡¦',
            'Qatar':'Qatar рџ‡¶рџ‡¦','Switzerland':'SuГ­Г§a рџ‡Ёрџ‡­','Brazil':'Brasil рџ‡§рџ‡·','Morocco':'Marrocos рџ‡Ірџ‡¦',
            'Scotland':'EscГіcia рџЏґу Ѓ§у Ѓўу Ѓіу ЃЈу Ѓґу Ѓї','Haiti':'Haiti рџ‡­рџ‡№','United States':'EUA рџ‡єрџ‡ё','USA':'EUA рџ‡єрџ‡ё',
            'Paraguay':'Paraguai рџ‡µрџ‡ѕ','Australia':'AustrГЎlia рџ‡¦рџ‡є','TГјrkiye':'Turquia рџ‡№рџ‡·','Turkey':'Turquia рџ‡№рџ‡·',
            'Germany':'Alemanha рџ‡©рџ‡Є','Curacao':'CuraГ§ao рџ‡Ёрџ‡ј','CuraГ§ao':'CuraГ§ao рџ‡Ёрџ‡ј',
            'Ivory Coast':'C. do Marfim рџ‡Ёрџ‡®',\"CГґte d'Ivoire\":'C. do Marfim рџ‡Ёрџ‡®',\"Cote d'Ivoire\":'C. do Marfim рџ‡Ёрџ‡®',
            'Ecuador':'Equador рџ‡Єрџ‡Ё','Netherlands':'Holanda рџ‡ірџ‡±','Japan':'JapГЈo рџ‡Їрџ‡µ','Sweden':'SuГ©cia рџ‡ёрџ‡Є',
            'Tunisia':'TunГ­sia рџ‡№рџ‡і','Belgium':'BГ©lgica рџ‡§рџ‡Є','Egypt':'Egito рџ‡Єрџ‡¬','Iran':'IrГЈ рџ‡®рџ‡·',
            'New Zealand':'Nova ZelГўndia рџ‡ірџ‡ї','Spain':'Espanha рџ‡Єрџ‡ё','Cape Verde':'Cabo Verde рџ‡Ёрџ‡»',
            'Saudi Arabia':'ArГЎbia Saudita рџ‡ёрџ‡¦','Uruguay':'Uruguai рџ‡єрџ‡ѕ','France':'FranГ§a рџ‡«рџ‡·','Senegal':'Senegal рџ‡ёрџ‡і',
            'Iraq':'Iraque рџ‡®рџ‡¶','Norway':'Noruega рџ‡ірџ‡ґ','Argentina':'Argentina рџ‡¦рџ‡·','Algeria':'ArgГ©lia рџ‡©рџ‡ї',
            'Austria':'ГЃustria рџ‡¦рџ‡№','Jordan':'JordГўnia рџ‡Їрџ‡ґ','Portugal':'Portugal рџ‡µрџ‡№','DR Congo':'RD Congo рџ‡Ёрџ‡©',
            'Congo DR':'RD Congo рџ‡Ёрџ‡©','Uzbekistan':'UzbequistГЈo рџ‡єрџ‡ї','Colombia':'ColГґmbia рџ‡Ёрџ‡ґ',
            'England':'Inglaterra рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї','Croatia':'CroГЎcia рџ‡­рџ‡·','Ghana':'Gana рџ‡¬рџ‡­','Panama':'PanamГЎ рџ‡µрџ‡¦',
          };
          function mapTeam(n){ return ESPN_MAP[n] || n; }
          function tkey(s){ return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]/g,'').toLowerCase(); }

          async function fetchDay(dateStr){
            try{
              const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=' + dateStr);
              const data = await res.json();
              return data.events || [];
            }catch(e){ return []; }
          }

          async function main(){
            const existing = JSON.parse(fs.readFileSync('results.json', 'utf8'));
            if(!Array.isArray(existing.knockout)) existing.knockout = [];
            const koByKey = {};
            existing.knockout.forEach(k => { koByKey[tkey(k.home)+'|'+tkey(k.away)] = k; });

            const dates = ['20260628','20260629','20260630'];
            let added = 0;

            for (const dateStr of dates){
              const events = await fetchDay(dateStr);
              events.forEach(ev => {
                const comp = ev.competitions?.[0];
                const homeC = comp?.competitors?.find(c=>c.homeAway==='home');
                const awayC = comp?.competitors?.find(c=>c.homeAway==='away');
                if(!homeC || !awayC) return;

                const home = mapTeam(homeC.team?.displayName);
                const away = mapTeam(awayC.team?.displayName);
                const key = tkey(home)+'|'+tkey(away);
                if(koByKey[key]) return;

                const statusType = comp?.status?.type;
                const done = statusType?.completed === true;
                const live = statusType?.state === 'in';

                koByKey[key] = {
                  round: 'avos', home, away,
                  sh: done||live ? parseInt(homeC.score) : null,
                  sa: done||live ? parseInt(awayC.score) : null,
                  done, live, iso: ev.date, venue: comp?.venue?.fullName || ''
                };
                added++;
                console.log('Restaurado no knockout: ' + home + ' x ' + away + (done?' ('+koByKey[key].sh+'-'+koByKey[key].sa+')':' (agendado)'));
              });
            }

            existing.knockout = Object.values(koByKey);
            fs.writeFileSync('results.json', JSON.stringify(existing, null, 2));
            console.log('');
            console.log('Total restaurado: ' + added + ' | Total no knockout agora: ' + existing.knockout.length);
          }
          main().catch(e=>{console.error(e);process.exit(1);});
          "

      - name: Commit
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add results.json
          git commit -m "Restaura jogos de mata-mata no sГ­tio certo (knockout)" || echo "Nada para comitar"
          git push
