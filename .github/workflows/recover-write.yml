name: Recuperar Jogos Antigos Perdidos - ESCREVER

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Buscar fresco da ESPN e recuperar os 5 jogos de 17/06
        run: |
          node -e "
          const fs = require('fs');

          // Mesmo dicionГҰrio do robГө вЂ” fonte Гғnica de verdade, sem digitar nada Г  mГӘo
          const ESPN_MAP = {
            'Mexico':'MГ©xico рџ‡Ірџ‡Ң','South Africa':'ГЃfrica do Sul рџ‡үрџ‡¦',
            'South Korea':'Coreia do Sul рџ‡°рџ‡·','Czech Republic':'Rep. Tcheca рџ‡Ёрџ‡ү','Czechia':'Rep. Tcheca рџ‡Ёрџ‡ү',
            'Canada':'CanadГҰ рџ‡Ёрџ‡¦','Bosnia and Herzegovina':'BГіsnia рџ‡§рџ‡¦','Bosnia':'BГіsnia рџ‡§рџ‡¦','Bosnia-Herzegovina':'BГіsnia рџ‡§рџ‡¦',
            'Qatar':'Qatar рџ‡¶рџ‡¦','Switzerland':'SuГ­Г§a рџ‡Ёрџ‡­',
            'Brazil':'Brasil рџ‡§рџ‡·','Morocco':'Marrocos рџ‡Ірџ‡¦','Scotland':'EscГіcia рџЏөу Ѓ§у Ѓұу Ѓіу ЃӘу Ѓөу Ѓү','Haiti':'Haiti рџ‡­рџ‡№',
            'United States':'EUA рџ‡ғрџ‡ё','USA':'EUA рџ‡ғрџ‡ё','Paraguay':'Paraguai рџ‡µрџ‡ң',
            'Australia':'AustrГҰlia рџ‡¦рџ‡ғ','TГәrkiye':'Turquia рџ‡№рџ‡·','Turkey':'Turquia рџ‡№рџ‡·',
            'Germany':'Alemanha рџ‡©рџ‡Ғ','Curacao':'CuraГ§ao рџ‡Ёрџ‡ә','CuraГ§ao':'CuraГ§ao рџ‡Ёрџ‡ә',
            'Ivory Coast':'C. do Marfim рџ‡Ёрџ‡®',\"CГөte d'Ivoire\":'C. do Marfim рџ‡Ёрџ‡®',\"Cote d'Ivoire\":'C. do Marfim рџ‡Ёрџ‡®',
            'Ecuador':'Equador рџ‡Ғрџ‡Ё','Netherlands':'Holanda рџ‡ірџ‡±','Japan':'JapГӘo рџ‡Үрџ‡µ',
            'Sweden':'SuГ©cia рџ‡ёрџ‡Ғ','Tunisia':'TunГ­sia рџ‡№рџ‡і',
            'Belgium':'BГ©lgica рџ‡§рџ‡Ғ','Egypt':'Egito рџ‡Ғрџ‡¬','Iran':'IrГӘ рџ‡®рџ‡·','New Zealand':'Nova ZelГұndia рџ‡ірџ‡ү',
            'Spain':'Espanha рџ‡Ғрџ‡ё','Cape Verde':'Cabo Verde рџ‡Ёрџ‡»','Saudi Arabia':'ArГҰbia Saudita рџ‡ёрџ‡¦','Uruguay':'Uruguai рџ‡ғрџ‡ң',
            'France':'FranГ§a рџ‡«рџ‡·','Senegal':'Senegal рџ‡ёрџ‡і','Iraq':'Iraque рџ‡®рџ‡¶','Norway':'Noruega рџ‡ірџ‡ө',
            'Argentina':'Argentina рџ‡¦рџ‡·','Algeria':'ArgГ©lia рџ‡©рџ‡ү','Austria':'ГЃustria рџ‡¦рџ‡№','Jordan':'JordГұnia рџ‡Үрџ‡ө',
            'Portugal':'Portugal рџ‡µрџ‡№','DR Congo':'RD Congo рџ‡Ёрџ‡©','Congo DR':'RD Congo рџ‡Ёрџ‡©','DRC':'RD Congo рџ‡Ёрџ‡©','Democratic Republic of the Congo':'RD Congo рџ‡Ёрџ‡©','Congo':'RD Congo рџ‡Ёрџ‡©','Uzbekistan':'UzbequistГӘo рџ‡ғрџ‡ү','Colombia':'ColГөmbia рџ‡Ёрџ‡ө',
            'England':'Inglaterra рџЏөу Ѓ§у Ѓұу ЃӨу Ѓ®у Ѓ§у Ѓү','Croatia':'CroГҰcia рџ‡­рџ‡·','Ghana':'Gana рџ‡¬рџ‡­','Panama':'PanamГҰ рџ‡µрџ‡¦',
          };
          function mapTeam(n){ return ESPN_MAP[n] || n; }
          function toBR(isoDate){
            const d = new Date(isoDate);
            const br = new Date(d.getTime() - 3*3600*1000);
            const p = n => String(n).padStart(2,'0');
            return { date: \`\${p(br.getUTCDate())}/\${p(br.getUTCMonth()+1)}\`, brTime: \`\${p(br.getUTCHours())}h\` };
          }

          async function main(){
            const existing = JSON.parse(fs.readFileSync('results.json', 'utf8'));
            const byKey = {};
            existing.matches.forEach(m => { byKey[m.home + '|' + m.away] = m; });

            const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260617');
            const data = await res.json();
            let recovered = 0;

            (data.events || []).forEach(ev => {
              const comp = ev.competitions?.[0];
              const homeC = comp?.competitors?.find(c=>c.homeAway==='home');
              const awayC = comp?.competitors?.find(c=>c.homeAway==='away');
              if(!homeC || !awayC) return;

              const home = mapTeam(homeC.team?.displayName);
              const away = mapTeam(awayC.team?.displayName);
              const { date, brTime } = toBR(ev.date);
              const statusType = comp?.status?.type;

              byKey[home+'|'+away] = {
                home, away, date, brTime,
                venue: comp?.venue?.fullName || '',
                iso: ev.date,
                sh: parseInt(homeC.score) ?? null,
                sa: parseInt(awayC.score) ?? null,
                done: statusType?.completed === true,
                live: statusType?.state === 'in',
                clock: '',
                events: []
              };
              recovered++;
              console.log('Recuperado: ' + home + ' ' + homeC.score + ' x ' + awayC.score + ' ' + away);
            });

            existing.matches = Object.values(byKey);
            fs.writeFileSync('results.json', JSON.stringify(existing, null, 2));
            console.log('Total recuperado: ' + recovered + ' jogo(s). Total geral agora: ' + existing.matches.length);
          }
          main().catch(e=>{console.error(e);process.exit(1);});
          "

      - name: Commit
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add results.json
          git commit -m "Recupera jogos de 17/06 perdidos pela janela de datas" || echo "Nada para comitar"
          git push
