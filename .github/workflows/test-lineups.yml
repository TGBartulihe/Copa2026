name: Test Lineups

on:
  workflow_dispatch: {}

jobs:
  test-lineups:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Diagnosticar API-Football
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          node -e "
          async function get(url){
            const r=await fetch(url,{headers:{'x-apisports-key':process.env.API_FOOTBALL_KEY}});
            const data=await r.json();
            console.log('\\nURL:',url);
            console.log('status:',r.status);
            console.log('errors:',JSON.stringify(data.errors));
            console.log('results:',data.results);
            console.log(JSON.stringify((data.response||[]).slice(0,20).map(x=>({
              league:x.league,
              country:x.country,
              seasons:x.seasons?.map(s=>s.year).slice(-5)
            })),null,2));
          }

          async function main(){
            await get('https://v3.football.api-sports.io/leagues?search=World');
            await get('https://v3.football.api-sports.io/leagues?search=FIFA');
            await get('https://v3.football.api-sports.io/leagues?country=World');
            await get('https://v3.football.api-sports.io/leagues?season=2026');
            await get('https://v3.football.api-sports.io/fixtures?date=2026-06-20');
          }

          main().catch(e=>{console.error(e);process.exit(1);});
          "