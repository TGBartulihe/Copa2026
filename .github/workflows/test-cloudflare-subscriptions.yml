name: Testar Cloudflare Subscriptions

on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Buscar subscriptions no Cloudflare
        env:
          CLOUDFLARE_ADMIN_TOKEN: ${{ secrets.CLOUDFLARE_ADMIN_TOKEN }}
        run: |
          curl -s \
            -H "X-Admin-Token: $CLOUDFLARE_ADMIN_TOKEN" \
            https://copa2026-api.tbartulihe.workers.dev/subscriptions